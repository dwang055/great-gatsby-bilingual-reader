              "zh": "回话的力气打断了他摇晃的节奏——他沉默了片刻。接着他暗淡的眼睛里又出现了那种半是明白、半是迷惑的神情。“看看那抽屉里，”他指着桌子说。“哪个抽屉？”“那个抽屉——就那个。”米凯利斯打开离手边最近的抽屉。里面什么也没有，只有一条小巧昂贵的牵狗皮带，皮制的，编着银线。显然是新的。",
              "simpEn": "The effort of answering stopped his rocking—he was quiet for a moment. Then the same confused look returned to his dull eyes. ‘Look in that drawer,’ he said, pointing. ‘Which drawer?’ ‘That one—that one.’ Michaelis opened the nearest drawer. There was nothing but a small, expensive dog leash made of leather and braided silver. It looked brand new.",
              "simpZh": "他费劲答话，打断了摇晃的节奏——他安静了一会儿。然后他那双暗淡的眼睛里又现出半明白半糊涂的神情。“看那个抽屉里面，”他指着桌子说。“哪个抽屉？”“那个——就那个。”米凯利斯打开手边最近的抽屉。里面没有别的，只有一条小巧昂贵的牵狗绳，皮做的，编着银丝。看起来是新的。"
            },
            {
              "en": "‘This?’ he inquired, holding it up. Wilson stared and nodded. ‘I found it yesterday afternoon. She tried to tell me about it but I knew it was something funny.’ ‘You mean your wife bought it?’ ‘She had it wrapped in tissue paper on her bureau.’ Michaelis didn’t see anything odd in that and he gave Wilson a dozen reasons why his wife might have bought the dog leash. But conceivably Wilson had heard some of these same explanations before, from Myrtle, because he began saying ‘Oh, my God!’ again in a whisper—his comforter left several explanations in the air.",
              "zh": "“这个？”他举起它问道。威尔逊盯着点点头。“我昨天下午找到的。她想跟我解释，可我知道这事不对劲。”“你是说你太太买的？”“她用薄纸包着放在梳妆台上。”米凯利斯没看出这有什么奇怪，于是给了威尔逊十几个他太太可能买狗皮带的理由。不过威尔逊可能以前就从默特尔那里听过一些类似的解释，因为他又开始低声说“哦，我的上帝！”了——他这个安慰者只好让几句解释悬在半空。",
              "simpEn": "‘This?’ he asked, lifting it. Wilson stared and nodded. ‘I found it yesterday afternoon. She tried to explain, but I knew something was wrong.’ ‘You mean your wife bought it?’ ‘She had it wrapped in tissue paper on her dresser.’ Michaelis saw nothing strange and gave many reasons why she might have bought a leash. But Wilson had likely heard some of those explanations from Myrtle before, because he started whispering ‘Oh, my God!’ again—leaving the comforter's words hanging.",
              "simpZh": "“这个？”他拿起问。威尔逊瞪着点点头。“我昨天下午找到的。她想跟我解释，可我知道不对劲。”“你是说你太太买的？”“她用薄纸包着放在梳妆台上。”米凯利斯不觉得奇怪，就给了很多理由解释她为什么买狗绳。但威尔逊以前可能从默特尔那里听过类似解释，因为他又开始低声说“哦，我的上帝！”了——那个安慰他的人只好把话停在半空。"
            },
            {
              "en": "‘Then he killed her,’ said Wilson. His mouth dropped open suddenly. ‘Who did?’ ‘I have a way of finding out.’ ‘You’re <span class=\"vocab-trigger\" data-vocab=\"morbid\">morbid<\/span>, George,’ said his friend. ‘This has been a strain to you and you don’t know what you’re saying. You’d better try and sit quiet till morning.’ ‘He murdered her.’ ‘It was an accident, George.’ Wilson shook his head. His eyes narrowed and his mouth widened slightly with the ghost of a superior ‘Hm!’",
              "zh": "“那么是他杀了她。”威尔逊说。他的嘴突然张了开来。“谁杀的？”“我有办法查出来。”“你太病态了，乔治，”他的朋友说，“这件事让你太紧张了，你都不知道自己在说什么。你最好试着安安静静坐到天亮。”“他谋杀了她。”“那是意外，乔治。”威尔逊摇摇头。他眯起眼睛，嘴巴微微一咧，带着一丝高人一等的“哼！”的余韵。",
              "simpEn": "‘Then he killed her,’ Wilson said. His mouth fell open. ‘Who did?’ ‘I have a way of finding out.’ ‘You're being morbid, George,’ his friend said. ‘You've been under strain and you don't know what you're saying. Better sit quietly till morning.’ ‘He murdered her.’ ‘It was an accident, George.’ Wilson shook his head. His eyes narrowed, and his mouth widened slightly with a superior ‘Hm!’",
              "simpZh": "“那就是他杀了她，”威尔逊说。他突然张开了嘴。“谁杀的？”“我有办法查出来。”“你有点病态，乔治，”他的朋友说，“这事让你太紧张了，你都不知道自己在说什么。最好安静坐到天亮。”“他杀了她。”“那是意外，乔治。”威尔逊摇头。他眯起眼睛，嘴巴稍稍咧开，发出一声带点优越感的“哼！”的尾音。"
            },
            {
              "en": "‘I know,’ he said definitely, ‘I’m one of these trusting fellas and I don’t think any harm to NObody, but when I get to know a thing I know it. It was the man in that car. She ran out to speak to him and he wouldn’t stop.’ Michaelis had seen this too but it hadn’t occurred to him that there was any special significance in it. He believed that Mrs. Wilson had been running away from her husband, rather than trying to stop any particular car.",
              "zh": "“我知道，”他肯定地说，“我是个容易相信人的家伙，我从来不想任何人的坏处，可一旦我知道了什么事，我就知道了。就是那辆车上的人。她冲出去是想跟他说话，可他不肯停。”米凯利斯也看到了这一幕，但他没想到其中有什么特别的意义。他原以为威尔逊太太是想逃离丈夫，而不是想拦住哪一辆特定的车。",
              "simpEn": "‘I know,’ he said firmly, ‘I'm a trusting man and I never think badly of anyone, but when I learn something, I know it. It was the man in that car. She ran out to speak to him, and he wouldn't stop.’ Michaelis had seen that too but hadn't thought it was special. He believed Mrs. Wilson was running away from her husband, not trying to stop a particular car.",
              "simpZh": "“我知道，”他肯定地说，“我是个好信人的家伙，从来不把人往坏处想，可我要是知道了什么事，我就知道了。就是那辆车上的男人。她跑出去想跟他说话，他不肯停。”米凯利斯也看见了，但他没觉得有什么特别意思。他原以为威尔逊太太是要逃离丈夫，而不是想拦哪辆特定的车。"
            },
            {
              "en": "‘How could she of been like that?’ ‘She’s a <span class=\"vocab-trigger\" data-vocab=\"deep one\">deep one<\/span>,’ said Wilson, as if that answered the question. ‘Ah-h-h——‘ He began to rock again and Michaelis stood twisting the leash in his hand. ‘Maybe you got some friend that I could telephone for, George?’ This was a <span class=\"vocab-trigger\" data-vocab=\"forlorn hope\">forlorn hope<\/span>—he was almost sure that Wilson had no friend: there was not enough of him for his wife. He was glad a little later when he noticed a change in the room, a <span class=\"vocab-trigger\" data-vocab=\"blue quickening\">blue quickening<\/span> by the window, and realized that dawn wasn’t far off. About five o’clock it was blue enough outside to snap off the light.",
              "zh": "“她怎么会那样呢？”“她是个深沉的人，”威尔逊说，仿佛这就回答了问题。“啊——”他又开始摇晃起来，米凯利斯站在那儿，手里绞着那条皮带。“也许你有什么朋友我可以打电话叫来，乔治？”这是个渺茫的希望——他几乎确信威尔逊没有朋友：他这个人连他太太都不够用。过了一会儿，他发现屋里有了变化，窗边透出一抹蓝色在加快变亮，意识到离天亮不远了，不禁有点高兴。五点钟左右，外面已经蓝得可以关灯了。",
              "simpEn": "‘How could she have been like that?’ ‘She's a deep one,’ Wilson said, as if that explained everything. ‘Ah-h-h—’ He started rocking again, and Michaelis stood twisting the leash. ‘Maybe you have a friend I can call, George?’ This was a hopeless hope—he was almost sure Wilson had no friend: he wasn't enough even for his wife. He felt a little glad later when he saw the room brighten with early blue light and knew dawn was near. Around five, it was light enough outside to turn off the lamp.",
              "simpZh": "“她怎么会那样呢？”“她这个人很深，”威尔逊说，好像这就回答了。“啊——”他又开始晃，米凯利斯站在那儿拧着牵狗绳。“也许你有个朋友我可以打电话叫来，乔治？”这是个没希望的希望——他几乎肯定威尔逊没朋友：他连自己太太都不够用。后来他看到房间亮了一点，窗边有蓝色在变快，知道天快亮了，心里有点高兴。五点左右，外面已经蓝得可以关灯了。"
            },
            {
              "en": "Wilson’s <span class=\"vocab-trigger\" data-vocab=\"glazed eyes\">glazed eyes<\/span> turned out to the ashheaps, where small grey clouds took on fantastic shape and scurried here and there in the faint dawn wind. ‘I spoke to her,’ he muttered, after a long silence. ‘I told her she might fool me but she couldn’t fool God. I took her to the window—’ With an effort he got up and walked to the rear window and leaned with his face pressed against it, ‘—and I said ‘God knows what you’ve been doing, everything you’ve been doing. You may fool me but you can’t fool God!’ ‘",
              "zh": "威尔逊呆滞的眼睛转向窗外的灰烬堆，小小的灰云在微弱的晨风中变幻出奇异的形状，四处乱窜。“我跟她说过，”沉默了许久之后，他喃喃地说。“我告诉她，她可以骗我，可骗不了上帝。我把她带到窗前——”他费力地站起来，走到后窗，把脸贴在上面，“——然后我说，‘上帝知道你都做了些什么，每一件事都知道。你可以骗我，但你骗不了上帝！’”",
              "simpEn": "Wilson's blank eyes looked out at the ashheaps, where little grey clouds formed strange shapes and rushed around in the light morning wind. ‘I spoke to her,’ he mumbled after a long silence. ‘I told her she could fool me but not God. I took her to the window—’ He got up with effort, walked to the back window, and pressed his face against it. ‘—and I said, “God knows what you've been doing, everything. You may fool me, but you can't fool God!”’",
              "simpZh": "威尔逊那双发呆的眼睛转向灰堆，小朵灰云在微弱的晨风里变成怪样子，跑来跑去。“我跟她说过，”沉默了很长时间后，他嘟囔道。“我告诉她，她能骗我，可骗不了上帝。我把她带到窗前——”他费力地站起来，走到后窗，把脸贴上去，“——然后我说，‘上帝知道你做了什么，每件事都知道。你能骗我，可你骗不了上帝！’”"
            },
            {
              "en": "Standing behind him Michaelis saw with a shock that he was looking at the eyes of <span class=\"vocab-trigger\" data-vocab=\"Doctor T. J. Eckleburg\">Doctor T. J. Eckleburg<\/span> which had just emerged pale and enormous from the dissolving night. ‘God sees everything,’ repeated Wilson. ‘That’s an advertisement,’ Michaelis assured him. Something made him turn away from the window and look back into the room. But Wilson stood there a long time, his face close to the window pane, nodding into the twilight.",
              "zh": "米凯利斯站在他身后，吃惊地发现他正望着T. J. 埃克尔堡大夫的眼睛，那双眼睛刚从消融的夜色中浮现出来，苍白而巨大。“上帝什么都看得见，”威尔逊重复道。“那是个广告，”米凯利斯向他保证。不知什么使他从窗口转过身，又朝屋里望去。但威尔逊在那儿站了很久，脸贴近窗玻璃，对着暮色点头。",
              "simpEn": "Behind him, Michaelis was shocked to see he was looking at the giant eyes of Doctor T. J. Eckleburg, which had just appeared pale and huge from the fading darkness. ‘God sees everything,’ Wilson repeated. ‘That's an advertisement,’ Michaelis told him. Something made him turn from the window and look back into the room. But Wilson stood there a long time, face close to the glass, nodding at the twilight.",
              "simpZh": "米凯利斯站在他后面，吃惊地看见他正看着T. J. 埃克尔堡大夫的眼睛，那双眼睛刚从天快亮的夜色里浮现，又白又大。“上帝什么都看得见，”威尔逊重复说。“那是个广告，”米凯利斯告诉他。不知什么东西让他从窗口转过身，朝屋里看。但威尔逊在那儿站了很久，脸贴着玻璃，对着微光点头。"
            },
            {
              "en": "By six o’clock Michaelis was worn out and grateful for the sound of a car stopping outside. It was one of the watchers of the night before who had promised to come back so he cooked breakfast for three which he and the other man ate together. Wilson was quieter now and Michaelis went home to sleep; when he awoke four hours later and hurried back to the garage Wilson was gone.",
              "zh": "到六点钟，米凯利斯已经筋疲力尽，听到外面有辆车停下来的声音，不禁心存感激。那是前晚的一个旁观者，他答应过要回来，于是米凯利斯做了三人份的早餐，他和那个人一起吃了。威尔逊现在安静了些，米凯利斯便回家睡觉；四小时后醒来，急忙赶回车行，威尔逊已经不见了。",
              "simpEn": "By six, Michaelis was exhausted and thankful to hear a car stop outside. It was one of the men who had watched the night before and promised to return. Michaelis cooked breakfast for three and ate with him. Wilson was calmer now, so Michaelis went home to sleep. When he woke four hours later and hurried back, Wilson was gone.",
              "simpZh": "六点钟时，米凯利斯累坏了，听见外面有车停下的声音，心里很感激。那是前晚的一个看热闹的人，他答应过要回来。米凯利斯做了三人份的早餐，和那个人一起吃了。威尔逊现在安静些了，米凯利斯就回家睡觉；四小时后醒来赶紧回车行，威尔逊已经不见了。"
            },
            {
              "en": "His movements—he was on foot all the time—were afterward traced to Port Roosevelt and then to Gad’s Hill where he bought a sandwich that he didn’t eat and a cup of coffee. He must have been tired and walking slowly for he didn’t reach Gad’s Hill until noon. Thus far there was no difficulty in accounting for his time—there were boys who had seen a man ‘acting sort of crazy’ and motorists at whom he stared oddly from the side of the road. Then for three hours he disappeared from view. The police, on the strength of what he said to Michaelis, that he ‘had a way of finding out,’ supposed that he spent that time going from garage to garage thereabouts inquiring for a yellow car. On the other hand no garage man who had seen him ever came forward—and perhaps he had an easier, surer way of finding out what he wanted to know. By half past two he was in West Egg where he asked someone the way to Gatsby’s house. So by that time he knew Gatsby’s name.",
              "zh": "他的行踪——他一直步行——后来被追查到罗斯福港，然后到了盖德山，在那儿他买了一个三明治，没有吃，还有一杯咖啡。他一定很累，走得很慢，因为他直到中午才走到盖德山。到此为止，他那段时间的行踪不难解释——有男孩看见一个“举动有点疯疯癫癫”的男人，还有开车的人被他从路边怪异地瞪着。接着有三个小时他消失在人们的视野之外。根据他对米凯利斯说的话——“他有办法查出来”——警方推测他那段时间在那一带的车行一家家询问，寻找一辆黄色汽车。另一方面，并没有见过他的车行老板出面——也许他有更容易、更可靠的办法查出他想知道的事。到两点半，他已到了西卵，向人打听去盖茨比家的路。所以那个时候，他已经知道了盖茨比的名字。",
              "simpEn": "His movements—he was on foot the whole time—were later traced to Port Roosevelt and then to Gad's Hill, where he bought a sandwich he didn't eat and a cup of coffee. He must have been tired and walking slowly, as he only reached Gad's Hill at noon. Up to that point, his time was easy to explain—boys had seen a man 'acting crazy,' and drivers noticed him staring strangely from the roadside. Then he vanished for three hours. The police, based on his words to Michaelis that he 'had a way of finding out,' guessed he spent that time going from garage to garage asking about a yellow car. But no garage owner ever came forward, so perhaps he found an easier, surer way. By 2:30 he was in West Egg asking directions to Gatsby's house. By then he knew Gatsby's name.",
              "simpZh": "他一直在步行，后来被追查到罗斯福港，然后到盖德山，在那儿买了个三明治没吃，还买了杯咖啡。他肯定很累走得很慢，因为中午才到盖德山。到这为止，他的时间还容易解释——有男孩看见一个男人“举止疯疯癫癫”，开车的人被他从路边怪怪地盯着。然后他消失了三个钟头。警方根据他对米凯利斯说的话——他“有办法查出来”——猜他那段时间在那附近的车行一家家问黄色汽车。可是没有车行老板出来说话——也许他有更容易更稳当的办法查出想知道的事。两点半时他在西卵，问人盖茨比家怎么走。所以那时候他已经知道盖茨比的名字了。"
            },
            {
              "en": "At two o’clock Gatsby put on his bathing suit and left word with the butler that if any one phoned word was to be brought to him at the pool. He stopped at the garage for a <span class=\"vocab-trigger\" data-vocab=\"pneumatic mattress\">pneumatic mattress<\/span> that had amused his guests during the summer, and the chauffeur helped him pump it up. Then he gave instructions that the open car wasn’t to be taken out under any circumstances—and this was strange because the front right fender needed repair.",
              "zh": "两点钟，盖茨比穿上游泳裤，并给管家留话：如果有人打电话来，就到游泳池边通知他。他顺路到车库拿了一个夏天里曾让客人们玩得很开心的充气床垫，司机帮他把气打足。然后他吩咐，任何情况下都不许把敞篷车开出去——这很奇怪，因为前右挡泥板的确需要修理。",
              "simpEn": "At two o'clock, Gatsby put on his swimsuit and told the butler to bring him any phone messages at the pool. He stopped at the garage for an inflatable mattress that had entertained his guests over the summer, and the chauffeur helped him pump it up. Then he ordered that the open car must not be taken out at all—which was strange, since the front right fender needed fixing.",
              "simpZh": "两点时盖茨比穿上泳裤，留话给管家：如果有人打电话，就到泳池边通知他。他到车库拿了一个夏天让客人开心的充气床垫，司机帮他把气打满。然后他吩咐，敞篷车无论如何不准开出去——这很奇怪，因为右前挡泥板明明需要修。"
            },
            {
              "en": "Gatsby shouldered the mattress and started for the pool. Once he stopped and shifted it a little, and the chauffeur asked him if he needed help, but he shook his head and in a moment disappeared among the <span class=\"vocab-trigger\" data-vocab=\"yellowing trees\">yellowing trees<\/span>.",
              "zh": "盖茨比扛起床垫朝游泳池走去。有一次他停下来，把垫子挪了挪，司机问他要不要帮忙，他摇摇头，不一会儿就消失在了发黄的树林间。",
              "simpEn": "Gatsby lifted the mattress onto his shoulder and walked to the pool. Once he stopped to adjust it. The chauffeur offered help, but Gatsby shook his head and soon vanished among the trees that were turning yellow.",
              "simpZh": "盖茨比扛起床垫往泳池走。有一次他停下来挪了挪，司机问要不要帮忙，他摇头，一下子就消失在发黄的树中间了。"
            },
            {
              "en": "No telephone message arrived but the butler went without his sleep and waited for it until four o’clock—until long after there was any one to give it to if it came. I have an idea that Gatsby himself didn’t believe it would come and perhaps he no longer cared. If that was true he must have felt that he had lost the old warm world, paid a high price for living too long with a single dream. He must have looked up at an <span class=\"vocab-trigger\" data-vocab=\"unfamiliar sky\">unfamiliar sky<\/span> through <span class=\"vocab-trigger\" data-vocab=\"frightening leaves\">frightening leaves<\/span> and shivered as he found what a <span class=\"vocab-trigger\" data-vocab=\"grotesque\">grotesque<\/span> thing a rose is and how raw the sunlight was upon the <span class=\"vocab-trigger\" data-vocab=\"scarcely created grass\">scarcely created grass<\/span>. A new world, material without being real, where poor ghosts, breathing dreams like air, drifted <span class=\"vocab-trigger\" data-vocab=\"fortuitously\">fortuitously<\/span> … like that ashen, fantastic figure gliding toward him through the <span class=\"vocab-trigger\" data-vocab=\"amorphous trees\">amorphous trees<\/span>.",
              "zh": "没有电话打来，可是管家没去睡觉，一直等到四点钟——等到即使有电话来，也没有人可以转达了。我觉得盖茨比本人也不相信会有电话来，也许他已经不在乎了。如果真是这样，那他一定感到自己已经失去了那个温暖的旧世界，为在一个梦想中生活得太久而付出了高昂的代价。他一定透过令人不安的树叶仰望过一片陌生的天空，当发现一朵玫瑰竟如此怪诞、阳光照在几乎尚未长成的草地上竟如此刺眼时，他不由得打了个寒噤。一个物质却非真实的新世界，其中可怜的幽灵像呼吸空气一样呼吸着梦想，偶然地飘来飘去……就像那个灰白的、怪诞的身影正穿过朦胧的树丛朝他滑来。",
              "simpEn": "No phone message came, but the butler stayed awake waiting until four—long after anyone would have been there to receive it. I think Gatsby himself didn't believe it would come, and maybe he no longer cared. If so, he must have felt he had lost his warm old world, paying too much for living with one dream too long. He must have looked up at a strange sky through scary leaves and shivered, realizing how ugly a rose could be and how harsh the sunlight was on the new grass. A new world, looking real but not, where sad ghosts drifted like dreams ... just like that pale, weird figure gliding toward him through the shapeless trees.",
              "simpZh": "没有电话来，但管家没睡，一直等到四点——等到就算有电话来也没人能接了。我想盖茨比自己也不相信电话会来，也许他已经不在乎了。要是这样，他一定觉得失去了那个温暖的旧世界，为在一个梦想上活得太久付出了太高代价。他一定透过吓人的叶子仰望陌生的天空，发抖地发现一朵玫瑰竟是怪东西，阳光照在还没长好的草上竟然那么刺眼。一个新的、有物质却不真实的世界，可怜的灵魂像呼吸空气一样呼吸着梦，漫无目的地飘荡……就像那个灰白、怪模样的身影，穿过没有形状的树丛朝他滑过来。"

              "simpZh": "司机是沃尔夫山姆的手下，他听见了枪声，事后只说没觉得有什么大不了。我从车站直接开到盖茨比家，焦急地冲上前面台阶，这才头一次惊动了人。但我坚信那时他们已经知道了。我们四个人——司机、管家、花匠和我——几乎没说话，赶紧跑向泳池。"

          "sectionId": 1,
          "heading": "Aftermath: Reporters and Police",
          "paragraphs": [
            {
              "en": "After two years I remember the rest of that day, and that night and the next day, only as an <span class=\"vocab-trigger\" data-vocab=\"endless drill\">endless drill<\/span> of police and photographers and newspaper men in and out of Gatsby’s front door. A rope stretched across the main gate and a policeman by it kept out the curious, but little boys soon discovered that they could enter through my yard and there were always a few of them <span class=\"vocab-trigger\" data-vocab=\"clustered open-mouthed\">clustered open-mouthed<\/span> about the pool. Someone with a positive manner, perhaps a detective, used the expression ‘mad man’ as he bent over Wilson’s body that afternoon, and the <span class=\"vocab-trigger\" data-vocab=\"adventitious authority\">adventitious authority<\/span> of his voice set the key for the newspaper reports next morning.",
              "zh": "两年以后，我回想起那天余下的时间、那一夜以及第二天，只记得警察、摄影师和报社记者在盖茨比家大门前川流不息地进进出出，像一场没完没了的操练。一道绳子横拉在大门前，一名警察守在旁边，拦住看热闹的人，可是小孩子们很快就发现他们可以从我家院子进去，于是总有那么几个小家伙张着嘴围在游泳池旁边。一个样子很自信的人，也许是个侦探，那天下午弯腰察看威尔逊的尸体时用了“疯子”这个词，他声音里那附带的权威感，为第二天早晨的报纸报道定了调子。",
              "simpEn": "Two years later, I remember that day and night and the next day only as a never-ending coming and going of police, photographers, and reporters at Gatsby's front door. A rope was put across the main gate, and a policeman kept curious people out. But little boys soon found they could get in through my yard, and there were always a few of them standing with open mouths around the pool. Someone with a confident attitude, maybe a detective, said 'mad man' when he looked at Wilson's body. The accidental authority in his voice set the tone for the next morning's newspapers.",
              "simpZh": "两年后，我回忆起那天、那晚和第二天，只记得警察、摄影师和记者没完没了地在盖茨比家门口进进出出。大门口拉了根绳子，一个警察拦住好奇的人。但小男孩们很快发现可以从我院子进去，所以游泳池边总有那么几个小孩张着嘴站着。一个看起来很肯定的人，可能是侦探，看威尔逊尸体时说了句“疯子”。他声音里那种附带的权威，给第二天早上的报纸定了调子。"
            },
            {
              "en": "Most of those reports were a nightmare—<span class=\"vocab-trigger\" data-vocab=\"grotesque\">grotesque<\/span>, <span class=\"vocab-trigger\" data-vocab=\"circumstantial\">circumstantial<\/span>, eager and untrue. When Michaelis’s testimony at the <span class=\"vocab-trigger\" data-vocab=\"inquest\">inquest<\/span> brought to light Wilson’s suspicions of his wife I thought the whole tale would shortly be served up in racy <span class=\"vocab-trigger\" data-vocab=\"pasquinade\">pasquinade<\/span>—but Catherine, who might have said anything, didn’t say a word. She showed a surprising amount of character about it too—looked at the <span class=\"vocab-trigger\" data-vocab=\"coroner\">coroner<\/span> with <span class=\"vocab-trigger\" data-vocab=\"determined eyes\">determined eyes<\/span> under that corrected brow of hers and swore that her sister had never seen Gatsby, that her sister was completely happy with her husband, that her sister had been into no mischief whatever. She <span class=\"vocab-trigger\" data-vocab=\"convinced herself\">convinced herself<\/span> of it and cried into her handkerchief as if the very suggestion was more than she could <span class=\"vocab-trigger\" data-vocab=\"endure\">endure<\/span>. So Wilson was <span class=\"vocab-trigger\" data-vocab=\"reduced to\">reduced to<\/span> a man ‘<span class=\"vocab-trigger\" data-vocab=\"deranged by grief\">deranged by grief<\/span>’ in order that the case might remain in its simplest form. And it rested there.",
              "zh": "那些报道大都像噩梦——荒诞不经，有枝有叶，急不可耐，而且失实。当米凯利斯在验尸讯问中的证词揭露了威尔逊对妻子的怀疑之后，我以为整个故事马上就会被炮制成一场下流的小报闹剧——可是凯瑟琳本来什么都可以说的，她却一个字也没说。她还表现出了惊人的骨气——她在修过的眉毛下用坚定的目光看着验尸官，发誓说她姐姐从没见过盖茨比，说她姐姐跟丈夫过得非常幸福，说她姐姐从未有任何不端行为。她让自己对此深信不疑，用手帕捂着脸哭了，仿佛光是这样的暗示就已超出她所能忍受的极限。于是威尔逊被归结为“因悲伤而精神错乱”的男人，这样案子才能以最简单的方式了结。事情也就此搁下了。",
              "simpEn": "Most of the reports were like a nightmare—strange, full of made-up details, eager, and false. When Michaelis's testimony at the official inquiry brought out Wilson's suspicions about his wife, I thought the whole story would soon become a spicy, mocking scandal. But Catherine, who could have said anything, said nothing. She showed a surprising strength of character—looked at the coroner with firm eyes under her shaped eyebrows and swore that her sister had never met Gatsby, that she was completely happy with her husband, and that she had never done anything bad. She believed it herself and cried, as if the very idea was unbearable. So Wilson was labeled a man 'driven mad by grief' to keep the case simple. And that was the end of it.",
              "simpZh": "那些报道大多是噩梦——怪异，充满编造的细节，急切又不真实。米凯利斯在调查中说出威尔逊怀疑妻子后，我以为整个故事很快就会变成低俗的讽刺闹剧。可凯瑟琳本来什么都能说，却一个字都没说。她表现出惊人的骨气——用修过的眉毛下坚定的眼睛看着验尸官，发誓姐姐从没见过盖茨比，和丈夫完全幸福，从没干过坏事。她说得自己都信了，还哭了，好像这个说法就让她受不了。于是威尔逊被定为“因悲伤发疯”的人，案子就简单结束了。事情就那样停在那里。"
            },
            {
              "en": "But all this part of it seemed <span class=\"vocab-trigger\" data-vocab=\"remote and unessential\">remote and unessential<\/span>. I found myself on Gatsby’s side, and alone. From the moment I telephoned news of the catastrophe to West Egg village, every <span class=\"vocab-trigger\" data-vocab=\"surmise\">surmise<\/span> about him, and every practical question, was referred to me. At first I was surprised and confused; then, as he lay in his house and didn’t move or breathe or speak hour upon hour it <span class=\"vocab-trigger\" data-vocab=\"grew upon me\">grew upon me<\/span> that I was responsible, because no one else was interested—interested, I mean, with that <span class=\"vocab-trigger\" data-vocab=\"intense personal interest\">intense personal interest<\/span> to which every one has some vague right at the end.",
              "zh": "但这部分的一切显得遥远而无关紧要。我发现自己站在盖茨比这边，而且只有我一个人。从我打电话把这场灾祸的消息告诉西卵村那一刻起，所有关于他的猜测和一切实际的问题，都交到了我手里。起初我既惊讶又困惑；后来，随着他在屋里躺着，一小时又一小时一动不动、不呼吸也不说话，我渐渐意识到这责任落到了我身上，因为没有别的人感兴趣——我指的是那种强烈的个人兴趣，在最后的时候，每个人都多少有点模糊的权利享有这种兴趣。",
              "simpEn": "But all that part seemed distant and unimportant. I found myself on Gatsby's side, alone. From the moment I phoned the news of the disaster to West Egg, every guess about him and every practical question was sent to me. At first I was surprised and confused; then, as he lay in his house hour after hour without moving or breathing or speaking, I began to feel that I was responsible, because no one else cared—cared with that deep personal concern that everyone has some vague right to at the end.",
              "simpZh": "但那些事好像很远，不重要。我发现我站在盖茨比那边，而且只有我一个人。从我打电话把悲剧消息告诉西卵村后，所有关于他的猜测和实际问题都来找我。起初我吃惊又困惑；后来他在屋里躺着一小时又一小时不动不呼吸不说话，我渐渐感到责任在我身上，因为别人都不关心——我指的是那种最后的、人人都多少有点模糊权利的深切个人关心。"

          "heading": "Wolfshiem’s Refusal",
          "paragraphs": [
            {
              "en": "Next morning I sent the butler to New York with a letter to Wolfshiem which asked for information and urged him to come out on the next train. That request seemed <span class=\"vocab-trigger\" data-vocab=\"superfluous\">superfluous<\/span> when I wrote it. I was sure he’d start when he saw the newspapers, just as I was sure there’d be a wire from Daisy before noon—but neither a wire nor Mr. Wolfshiem arrived, no one arrived except more police and photographers and newspaper men. When the butler brought back Wolfshiem’s answer I began to have a feeling of <span class=\"vocab-trigger\" data-vocab=\"defiance\">defiance<\/span>, of <span class=\"vocab-trigger\" data-vocab=\"scornful solidarity\">scornful solidarity<\/span> between Gatsby and me against them all.",
              "zh": "第二天早上，我打发管家去纽约给沃尔夫山姆送一封信，信里询问了情况，并催他搭下一班火车来。写这封信时，我就觉得这个请求是多余的。我确信他一看到报纸就会动身，正如我确信中午前一定会收到黛西的电报一样——可电报没来，沃尔夫山姆先生也没来，来的只有更多的警察、摄影师和记者。当管家带回沃尔夫山姆的回信时，我开始产生一种对抗的情绪，一种夹着蔑视的休戚与共之感，把我和盖茨比与他们所有这些人对立了起来。",
              "simpEn": "The next morning I sent the butler to New York with a letter to Wolfshiem, asking for information and begging him to come on the next train. As I wrote it, the request felt unnecessary. I was sure he would leave when he saw the newspapers, just as I was sure a telegram from Daisy would come before noon—but neither arrived. No one came except more police, photographers, and reporters. When the butler returned with Wolfshiem's reply, I began to feel a sense of defiance, a scornful unity between Gatsby and me against all of them.",
              "simpZh": "第二天早上我让管家去纽约送信给沃尔夫山姆，问消息并催他坐下一班火车来。写信的时候，我觉着这个请求是多余的。我肯定他一看到报纸就会出发，也肯定中午前会有黛西的电报——可是电报没来，沃尔夫山姆也没来，只有更多的警察、摄影师和记者来了。管家带回沃尔夫山姆的回信后，我开始感到一种对抗的感觉，一种我和盖茨比一起蔑视所有人的团结感。"
            },
            {
              "en": "Dear Mr. Carraway. This has been one of the most terrible shocks of my life to me I hardly can believe it that it is true at all. Such a mad act as that man did should make us all think. I cannot come down now as I am <span class=\"vocab-trigger\" data-vocab=\"tied up\">tied up<\/span> in some very important business and cannot get <span class=\"vocab-trigger\" data-vocab=\"mixed up\">mixed up<\/span> in this thing now. If there is anything I can do a little later let me know in a letter by Edgar. I hardly know where I am when I hear about a thing like this and am completely <span class=\"vocab-trigger\" data-vocab=\"knocked down and out\">knocked down and out<\/span>. Yours truly MEYER WOLFSHIEM and then hasty <span class=\"vocab-trigger\" data-vocab=\"addenda\">addenda<\/span> beneath: Let me know about the funeral etc do not know his family at all.",
              "zh": "亲爱的卡拉韦先生：这对我来说是一生中最可怕的打击之一，我简直不敢相信这会是真的。那人干出这种疯事，我们大家都得好好想想。眼下我不能来，因为我被一桩非常重要的生意缠住了，现在不能卷进这件事。要是我过些时候能帮上什么忙，请写信托埃德加转告我。听到这种事情，我简直不知道自己在哪儿，我整个人都被打趴下了。你忠实的迈耶·沃尔夫山姆。下面又匆匆附了几句：葬礼的事等等告诉我，我完全不认识他的家属。",
              "simpEn": "Dear Mr. Carraway, this has been one of the worst shocks of my life. I can hardly believe it's true. That man's crazy act should make us all think. I cannot come now because I am stuck in very important business and can't get involved. If there's anything I can do later, let me know by letter through Edgar. I feel completely knocked down by this. Yours truly, Meyer Wolfshiem. Then a quick note underneath: Let me know about the funeral etc; I don't know his family at all.",
              "simpZh": "亲爱的卡拉韦先生：这是我一生中最可怕的打击之一，我几乎不信是真的。那人干出这种疯事，我们大家都该想一想。我现在不能来，因为有很重要的生意缠着，不能卷进这件事。要是以后能帮上什么，托埃德加写信告诉我。听到这种事，我完全被打倒了。你忠实的迈耶·沃尔夫山姆。下面又匆匆补了一句：葬礼等事告诉我，我根本不认识他家人。"
            },
            {
              "en": "When the phone rang that afternoon and Long Distance said Chicago was calling I thought this would be Daisy at last. But the connection came through as a man’s voice, very thin and far away. ‘This is Slagle speaking....’ ‘Yes?’ The name was unfamiliar. ‘<span class=\"vocab-trigger\" data-vocab=\"Hell of a note\">Hell of a note<\/span>, isn’t it? Get my wire?’ ‘There haven’t been any wires.’ ‘Young Parke’s in trouble,’ he said rapidly. ‘They picked him up when he handed the bonds over the counter. They got a circular from New York giving ‘em the numbers just five minutes before. What d’you know about that, hey? You never can tell in these <span class=\"vocab-trigger\" data-vocab=\"hick towns\">hick towns<\/span>——‘ ‘Hello!’ I interrupted breathlessly. ‘Look here—this isn’t Mr. Gatsby. Mr. Gatsby’s dead.’ There was a long silence on the other end of the wire, followed by an <span class=\"vocab-trigger\" data-vocab=\"exclamation\">exclamation<\/span> … then a quick <span class=\"vocab-trigger\" data-vocab=\"squawk\">squawk<\/span> as the connection was broken.",
              "zh": "那天下午电话铃响了，长途台说芝加哥来电，我以为这终于会是黛西了。可是接通后传来的是一个男人的声音，非常微弱而遥远。“我是斯莱格尔……”“什么事？”这名字很陌生。“真是天大的怪事，对吧？收到我的电报了吗？”“没有电报来过。”“小帕克出事了，”他急促地说。“他在把债券交到柜台上的时候被他们逮住了。他们刚好在五分钟前收到纽约发出的通函，上面有那批债券的号码。你说这事怎么搞的，嗯？在这种乡巴佬小镇，什么事都说不准——”“喂！”我上气不接下气地打断了他。“听着——这儿不是盖茨比先生。盖茨比先生死了。”电话那头沉默了许久，接着是一声惊叫……然后是一阵急促的哔咕声，电话断了。",
              "simpEn": "That afternoon the phone rang. Long Distance said Chicago was calling, and I thought it would finally be Daisy. But a man's voice came through, very thin and far away. 'This is Slagle speaking...' 'Yes?' The name was unfamiliar. 'What a mess, huh? Did you get my wire?' 'There haven't been any wires.' 'Young Parke's in trouble,' he said quickly. 'They caught him when he handed over the bonds. They got a notice from New York with the numbers just five minutes before. What do you know about that, huh? You never can tell in these small towns—' 'Hello!' I interrupted out of breath. 'Look, this isn't Mr. Gatsby. Mr. Gatsby's dead.' There was a long silence, then an exclamation, then a quick harsh sound as the call was cut off.",
              "simpZh": "那天下午电话响了，长途说芝加哥打来的。我以为终于会是黛西。可是传来一个男人的声音，又细又远。“我是斯莱格尔……”“什么事？”名字陌生。“真够呛，对吧？收到我的电报了吗？”“没有电报。”“小帕克出事了，”他快说道。“他交债券时被抓住了。纽约来的通知刚好五分钟前到，有号码。你说这叫什么事，嗯？在这种小地方你永远说不准——”“喂！”我喘不上气地打断。“听着，这儿不是盖茨比先生。盖茨比先生死了。”电话那头沉默了好久，然后一声惊叫……接着一阵刺耳的声音，电话断了。"

        {

          "paragraphs": [
            {
              "en": "I think it was on the third day that a telegram signed Henry C. Gatz arrived from a town in Minnesota. It said only that the sender was leaving immediately and to <span class=\"vocab-trigger\" data-vocab=\"postpone\">postpone<\/span> the funeral until he came. It was Gatsby’s father, a <span class=\"vocab-trigger\" data-vocab=\"solemn\">solemn<\/span> old man very helpless and dismayed, <span class=\"vocab-trigger\" data-vocab=\"bundled up\">bundled up<\/span> in a long cheap <span class=\"vocab-trigger\" data-vocab=\"ulster\">ulster<\/span> against the warm September day. His eyes leaked continuously with excitement and when I took the bag and umbrella from his hands he began to pull so <span class=\"vocab-trigger\" data-vocab=\"incessantly\">incessantly<\/span> at his sparse grey beard that I had difficulty in getting off his coat. He was on the point of collapse so I took him into the music room and made him sit down while I sent for something to eat. But he wouldn’t eat and the glass of milk spilled from his <span class=\"vocab-trigger\" data-vocab=\"trembling\">trembling<\/span> hand.",
              "zh": "我想大概是第三天，一封署名亨利·C·盖兹的电报从明尼苏达州一个小镇发来。电报只说发报人马上动身，葬礼等他到了再办。这是盖茨比的父亲，一个神情肃穆的老人，非常无助，惊惶失措，在暖洋洋的九月天里裹着一件廉价的旧长外套。他因为激动，眼睛不停地流泪，当我把旅行袋和伞从他手上接过来时，他便不停使劲揪他那把稀疏的花白胡子，弄得我费了好大劲才帮他把外套脱下来。他眼看就要瘫倒了，于是我领他进了音乐室，让他坐下，派人去拿点吃的。可他不肯吃，手中的那杯牛奶也从颤抖的手里泼了出来。",
              "simpEn": "I think it was on the third day that a telegram signed Henry C. Gatz came from a town in Minnesota. It only said the sender was leaving right away and to delay the funeral until he arrived. It was Gatsby's father, a serious old man, very helpless and upset, wrapped up in a long cheap coat despite the warm September day. His eyes kept watering from excitement. When I took his bag and umbrella, he pulled at his thin gray beard so constantly that I had trouble getting his coat off. He was about to collapse, so I led him to the music room, sat him down, and ordered food. But he wouldn't eat, and the glass of milk spilled from his shaking hand.",
              "simpZh": "大概是第三天，一封署名亨利·C·盖兹的电报从明尼苏达一个小镇发来。只说发报人马上动身，葬礼等他来再办。是盖茨比的父亲，一个严肃的老人，很无助，很惊慌，在温暖的九月天里裹着件廉价的长外套。他激动得眼睛不停流泪，我接过他的包和伞时，他就不停地揪那把稀疏的灰胡子，我好不容易才帮他脱了外套。他快要倒下了，我就带他到音乐室，让他坐下，叫了吃的。但他不肯吃，牛奶也从颤抖的手里洒了出来。"
            },
            {
              "en": "‘I saw it in the Chicago newspaper,’ he said. ‘It was all in the Chicago newspaper. I started right away.’ ‘I didn’t know how to reach you.’ His eyes, seeing nothing, moved ceaselessly about the room. ‘It was a mad man,’ he said. ‘He must have been mad.’ ‘Wouldn’t you like some coffee?’ I urged him. ‘I don’t want anything. I’m all right now, Mr.——‘ ‘Carraway.’ ‘Well, I’m all right now. Where have they got Jimmy?’",
              "zh": "“我是在芝加哥报纸上看到的，”他说。“芝加哥报纸上全登了。我马上就动身了。”“我不知道怎么跟你联系。”他的眼睛什么也看不见，只顾在房间里转个不停。“那是个疯子，”他说。“他一定是疯了。”“你要不要来点咖啡？”我劝他。“我什么也不要。我现在好了，您是——”“卡拉韦。”“嗯，我现在好了。他们把吉米放在哪儿了？”",
              "simpEn": "‘I saw it in the Chicago newspaper,’ he said. ‘It was all in the Chicago newspaper. I started right away.’ ‘I didn't know how to reach you.’ His eyes, seeing nothing, moved restlessly around the room. ‘It was a madman,’ he said. ‘He must have been mad.’ ‘Would you like some coffee?’ I urged. ‘I don't want anything. I'm all right now, Mr.—’ ‘Carraway.’ ‘Well, I'm all right now. Where have they got Jimmy?’",
              "simpZh": "“我在芝加哥报纸上看到的，”他说。“芝加哥报纸上全登了。我马上就出发了。”“我不知道怎么联系你。”他眼睛什么也看不见，不停地在屋里转。“那是个疯子，”他说。“他一定是疯了。”“要不要喝点咖啡？”我劝他。“什么都不要。我现在好了，您是——”“卡拉韦。”“嗯，我现在好了。他们把吉米放在哪里了？”"
            },
            {
              "en": "I took him into the drawing-room, where his son lay, and left him there. Some little boys had come up on the steps and were looking into the hall; when I told them who had arrived they went <span class=\"vocab-trigger\" data-vocab=\"reluctantly\">reluctantly<\/span> away. After a little while Mr. Gatz opened the door and came out, his mouth <span class=\"vocab-trigger\" data-vocab=\"ajar\">ajar<\/span>, his face flushed slightly, his eyes leaking <span class=\"vocab-trigger\" data-vocab=\"isolated and unpunctual tears\">isolated and unpunctual tears<\/span>. He had reached an age where death no longer has the quality of <span class=\"vocab-trigger\" data-vocab=\"ghastly surprise\">ghastly surprise<\/span>, and when he looked around him now for the first time and saw the height and <span class=\"vocab-trigger\" data-vocab=\"splendor\">splendor<\/span> of the hall and the great rooms opening out from it into other rooms his grief began to be mixed with an <span class=\"vocab-trigger\" data-vocab=\"awed pride\">awed pride<\/span>. I helped him to a bedroom upstairs; while he took off his coat and vest I told him that all arrangements had been <span class=\"vocab-trigger\" data-vocab=\"deferred\">deferred<\/span> until he came.",
              "zh": "我带他走进他儿子躺着的客厅，把他留在那儿。有几个小男孩已经走上台阶，正往门厅里张望；我告诉他们谁来了，他们才不大情愿地走开了。过了一会儿，盖兹先生打开门走出来，嘴巴微张着，脸上微微发红，眼睛里不时渗出几滴零落的眼泪。他到了那样的年纪，死亡已不再具有那种恐怖惊骇的性质，当他此刻第一次环顾四周，看到门厅的高敞华美，以及由此伸展开去的一个又一个宏大的房间时，他的悲伤开始掺杂着一种敬畏的自豪。我扶他上楼到一间卧室去；在他脱去外衣和马甲时，我告诉他所有安排都推迟了，等他来了再说。",
              "simpEn": "I took him into the room where his son lay and left him there. Some little boys had come up the steps and were peeking into the hall; when I told them who had come, they went away unwillingly. After a while, Mr. Gatz opened the door and came out, his mouth partly open, his face a little red, and a few stray tears leaking from his eyes. He had reached an age where death no longer was a shocking horror, and when he looked around now for the first time and saw the height and beauty of the hall and the great rooms opening from it, his sadness began to be mixed with a proud wonder. I helped him to a bedroom upstairs; while he took off his coat and vest, I told him all plans had been put off until he came.",
              "simpZh": "我带他进了他儿子躺着的房间，留他在那里。有几个小男孩走到台阶上，往门厅里看；我告诉他们谁来了，他们才不情愿地走了。过了一会儿，盖兹先生开门出来，嘴微张着，脸有点红，眼睛里零散地滴着几滴泪。他已经到了不再觉得死亡多么吓人的年纪，现在第一次环视，看到门厅又高又漂亮，大房间一间连着一间，他的悲伤里开始混着一种敬畏的骄傲。我扶他上楼到卧室；他脱外衣和马甲时，我告诉他所有安排都推迟了，就等他来。"
            },
            {
              "en": "‘I didn’t know what you’d want, Mr. Gatsby——‘ ‘Gatz is my name.’ ‘—Mr. Gatz. I thought you might want to take the body west.’ He shook his head. ‘Jimmy always liked it better down East. He rose up to his position in the East. Were you a friend of my boy’s, Mr.—?’ ‘We were close friends.’ ‘He had a big future before him, you know. He was only a young man but he had a lot of <span class=\"vocab-trigger\" data-vocab=\"brain power\">brain power<\/span> here.’ He touched his head <span class=\"vocab-trigger\" data-vocab=\"impressively\">impressively<\/span> and I nodded. ‘If he’d of lived he’d of been a great man. A man like James J. Hill. He’d of helped build up the country.’",
              "zh": "“我不知道您想要什么，盖茨比先生——”“我姓盖兹。”“——盖兹先生。我原以为您也许想把遗体运回西部去。”他摇了摇头。“吉米一直更喜欢待在东部。他是在东部发迹的。您是我孩子的朋友吗，先生——？”“我们是亲密的朋友。”“他本来有很大的前途，你知道。他还只是个年轻人，可这儿有着很大的脑力。”他意味深长地用手指了指脑袋，我点了点头。“要是他还活着，他会成为一个大人物的。像詹姆斯·J·希尔那样的人。他会帮着建设这个国家。”",
              "simpEn": "‘I didn't know what you would want, Mr. Gatsby—’ ‘Gatz is my name.’ ‘—Mr. Gatz. I thought you might want to take the body west.’ He shook his head. ‘Jimmy always liked it better in the East. He rose to his position in the East. Were you a friend of my boy's, Mr.—?’ ‘We were close friends.’ ‘He had a big future in front of him, you know. He was only a young man, but he had a lot of brain power here.’ He touched his head meaningfully, and I nodded. ‘If he'd lived, he'd have been a great man. A man like James J. Hill. He'd have helped build the country.’",
              "simpZh": "“我不知道您想要什么，盖茨比先生——”“我姓盖兹。”“——盖兹先生。我原以为您可能想把遗体运回西部。”他摇头。“吉米一直更喜欢东部。他是在东部发起来的。你是我孩子的朋友吗，先生——？”“我们是好朋友。”“他本来有大好前途，你知道。他只是个年轻人，但这儿有好多脑子。”他指了指脑袋，很有深意的样子，我点点头。“要是他活着，会成个伟人。像詹姆斯·J·希尔那样的人。他会帮着建设国家。”"
            },
            {
              "en": "‘That’s true,’ I said, uncomfortably. He fumbled at the <span class=\"vocab-trigger\" data-vocab=\"embroidered coverlet\">embroidered coverlet<\/span>, trying to take it from the bed, and lay down stiffly—was instantly asleep.",
              "zh": "“那倒是真的，”我别扭地说。他摸了摸绣花床罩，想把它从床上拽下来，僵硬地躺了下去——立刻就睡着了。",
              "simpEn": "‘That's true,’ I said, feeling uneasy. He fumbled with the fancy blanket, trying to pull it off the bed, then lay down stiffly and was asleep at once.",
              "simpZh": "“那倒是真的，”我说，感觉不太自在。他摸着那绣花的床罩，想从床上拿下来，然后僵硬地躺下，马上就睡着了。"
            },
            {
              "en": "That night an obviously frightened person called up and demanded to know who I was before he would give his name. ‘This is Mr. Carraway,’ I said. ‘Oh—’ He sounded relieved. ‘This is Klipspringer.’ I was relieved too for that seemed to promise another friend at Gatsby’s grave. I didn’t want it to be in the papers and draw a sightseeing crowd so I’d been calling up a few people myself. They were hard to find.",
              "zh": "那天晚上，一个显然吓坏了的人打电话来，非要先知道我是谁才肯说出自己的名字。“我是卡拉韦先生，”我说。“哦——”他听起来松了口气。“我是克利普斯普林格。”我也松了口气，因为这似乎意味着又有一个人会出席盖茨比的葬礼了。我不愿这事见报，引来一群看热闹的人，所以我自己已经在打电话找几个人了。可他们很难找。",
              "simpEn": "That night an obviously frightened person called and demanded to know who I was before giving his name. 'This is Mr. Carraway,' I said. 'Oh,' he sounded relieved. 'This is Klipspringer.' I was relieved too, because that seemed to promise another friend at Gatsby's grave. I didn't want it in the papers to draw a sightseeing crowd, so I had been calling a few people myself. They were hard to find.",
              "simpZh": "那天晚上有个明显吓坏了的人打电话来，非要先问我是谁才肯报名字。“我是卡拉韦先生，”我说。“哦，”他松了口气。“我是克利普斯普林格。”我也松了口气，因为好像又有个人会来参加葬礼了。我不想登报，引来观光客，所以自己也打了一些电话找人。他们很难找。"
            },
            {
              "en": "‘The funeral’s tomorrow,’ I said. ‘Three o’clock, here at the house. I wish you’d tell anybody who’d be interested.’ ‘Oh, I will,’ he broke out hastily. ‘Of course I’m not likely to see anybody, but if I do.’ His tone made me suspicious. ‘Of course you’ll be there yourself.’ ‘Well, I’ll certainly try. What I called up about is——‘ ‘Wait a minute,’ I interrupted. ‘How about saying you’ll come?’ ‘Well, the fact is—the truth of the matter is that I’m staying with some people up here in Greenwich and they rather expect me to be with them tomorrow. In fact there’s a sort of picnic or something. Of course I’ll do my very best to get away.’",
              "zh": "“葬礼明天举行，”我说。“三点钟，就在这房子里。我希望你能转告一下可能感兴趣的人。”“哦，我会的，”他慌忙打断道。“当然我不大可能见到什么人，但要是我见到了。”他的口气让我起了疑。“当然你自己会来的吧。”“嗯，我一定尽量来。我打电话来是因为——”“等一等，”我插话道。“你就不能说你会来吗？”“呃，事实是——实际情况是，我正跟几个朋友待在格林尼治这儿，他们蛮希望我明天陪他们。实际上有个野餐之类的事。当然我会尽量想法脱身的。”",
              "simpEn": "‘The funeral is tomorrow,’ I said. ‘Three o'clock, here at the house. Please tell anyone who might be interested.’ ‘Oh, I will,’ he broke in hurriedly. ‘Of course I'm not likely to see anybody, but if I do.’ His tone made me suspicious. ‘Of course you'll be there yourself.’ ‘Well, I'll certainly try. What I called about is—’ ‘Wait,’ I interrupted. ‘How about just saying you'll come?’ ‘Well, the fact is—the truth is I'm staying with some people up here in Greenwich and they kind of expect me to be with them tomorrow. In fact, there's a picnic or something. Of course I'll do my very best to get away.’",
              "simpZh": "“葬礼明天，”我说。“三点，就在这房子。请转告可能感兴趣的人。”“哦，我会的，”他急忙说。“当然我不太可能见到什么人，但要是见到。”他语气让我起疑。“当然你自己会来吧。”“嗯，我一定尽量。我打电话来是因为——”“等等，”我打断。“你就说会来不行吗？”“呃，事实是——实际情况是我正和几个人在格林尼治这儿，他们挺希望我明天陪他们。其实有个野餐什么的。当然我会尽量想办法离开。”"
            },
            {
              "en": "I <span class=\"vocab-trigger\" data-vocab=\"ejaculated\">ejaculated<\/span> an unrestrained ‘Huh!’ and he must have heard me for he went on nervously: ‘What I called up about was a pair of shoes I left there. I wonder if it’d be too much trouble to have the butler send them on. You see they’re tennis shoes and I’m sort of helpless without them. My address is care of B. F.——‘ I didn’t hear the rest of the name because I hung up the receiver.",
              "zh": "我忍不住“哈！”了一声，他一定听见了，因为他接着紧张地说：“我打电话来是为了我留在那里的一双鞋。我想劳驾管家把它们寄过来是不是太麻烦？你瞧那是双网球鞋，没那双鞋我简直不知道怎么办。我的地址由B. F.——转交。”我没听到那个名字的剩下部分，因为我挂上了听筒。",
              "simpEn": "I let out an unrestrained 'Huh!' and he must have heard me, because he continued nervously: 'What I called about was a pair of shoes I left there. I wonder if it'd be too much trouble to have the butler send them on. You see they're tennis shoes and I'm sort of helpless without them. My address is care of B. F.—' I didn't hear the rest of the name because I hung up the receiver.",
              "simpZh": "我忍不住“哈！”了一声，他肯定听见了，因为他紧张地说下去：“我打电话来是为了我留在那里的一双鞋。我想让管家寄过来是不是太麻烦？你看，那是网球鞋，没那双鞋我简直没办法。我的地址由B. F.——转交。”我没听到后面的名字，因为我挂断了电话。"
            },
            {
              "en": "After that I felt a certain shame for Gatsby—one gentleman to whom I telephoned <span class=\"vocab-trigger\" data-vocab=\"implied\">implied<\/span> that he had got what he deserved. However, that was my fault, for he was one of those who used to sneer most bitterly at Gatsby on the courage of Gatsby’s liquor and I should have known better than to call him.",
              "zh": "那之后我为盖茨比感到一阵羞耻——我打电话找的一位先生暗示说，他是活该。不过那是我自己的错，因为他是那种以前仗着盖茨比的酒劲，却对盖茨比嗤之以鼻的人，我本该更明白些，不去叫他。",
              "simpEn": "After that I felt a certain shame for Gatsby—one gentleman I phoned suggested that he got what he deserved. But that was my fault, because he was one of those who used to sneer most nastily at Gatsby while drinking his liquor, and I should have known better than to call him.",
              "simpZh": "之后我为盖茨比感到有点丢脸——我打电话找的一个人暗示他是活该。不过这是我的错，因为他是那种喝着盖茨比的酒，却对他嗤之以鼻的人，我本该知道不该打给他。"
            }

        {
          "sectionId": 5,
          "heading": "The Funeral and the Owl‑Eyed Man",
          "paragraphs": [
            {
              "en": "The morning of the funeral I went up to New York to see Meyer Wolfshiem; I couldn’t seem to reach him any other way. The door that I pushed open on the advice of an elevator boy was marked ‘The Swastika Holding Company’ and at first there didn’t seem to be any one inside. But when I’d shouted ‘Hello’ several times in vain an argument broke out behind a partition and presently a lovely <span class=\"vocab-trigger\" data-vocab=\"Jewess\">Jewess<\/span> appeared at an interior door and <span class=\"vocab-trigger\" data-vocab=\"scrutinized\">scrutinized<\/span> me with black hostile eyes. ‘Nobody’s in,’ she said. ‘Mr. Wolfshiem’s gone to Chicago.’ The first part of this was obviously untrue for someone had begun to whistle ‘The Rosary,’ tunelessly, inside. ‘Please say that Mr. Carraway wants to see him.’ ‘I can’t get him back from Chicago, can I?’ At this moment a voice, unmistakably Wolfshiem’s called ‘Stella!’ from the other side of the door. ‘Leave your name on the desk,’ she said quickly. ‘I’ll give it to him when he gets back.’ ‘But I know he’s there.’ She took a step toward me and began to slide her hands <span class=\"vocab-trigger\" data-vocab=\"indignantly\">indignantly<\/span> up and down her hips. ‘You young men think you can force your way in here any time,’ she scolded. ‘We’re getting <span class=\"vocab-trigger\" data-vocab=\"sickantired\">sickantired<\/span> of it. When I say he’s in Chicago, he’s in ChiCAgo.’ I mentioned Gatsby. ‘Oh—h!’ She looked at me over again. ‘Will you just—what was your name?’ She vanished. In a moment Meyer Wolfshiem stood <span class=\"vocab-trigger\" data-vocab=\"solemnly\">solemnly<\/span> in the doorway, holding out both hands. He drew me into his office, remarking in a <span class=\"vocab-trigger\" data-vocab=\"reverent\">reverent<\/span> voice that it was a sad time for all of us, and offered me a cigar.",
              "zh": "葬礼那天早上，我上纽约去见迈耶·沃尔夫山姆；用别的办法我似乎就是找不到他。根据一个电梯服务生的指点，我推开了一扇门，门上标着“万字控股公司”，起初里面好像没有人。可是我空喊了几声“喂”之后，隔板后突然爆发出一阵争吵声，紧接着一位可爱的犹太女人出现在内室门口，用带着敌意的黑眼睛打量着我。“没有人在，”她说。“沃尔夫山姆先生去芝加哥了。”这话的前半句显然不真实，因为有人已经开始在里面跑调地吹着《玫瑰经》的曲子了。“请通报一声，说卡拉韦先生要见他。”“我没法把他从芝加哥弄回来，是吧？”就在这时候，一个声音，毫无疑问是沃尔夫山姆，从门那边叫道：“斯特拉！”“把名字留在桌上，”她飞快地说。“等他回来我交给他。”“可我知道他在里面。”她朝我逼近了一步，开始气冲冲地把双手在腰胯间来回搓。“你们这些年轻人，以为随时都可以硬闯进来，”她斥责道。“我们都烦透了。我说他在芝加哥，他就在芝加哥。”我提到了盖茨比。“哦——！”她又把我上上下下看了一遍。“你能不能——刚才说你叫什么来着？”她消失了。转瞬间迈耶·沃尔夫山姆便神情肃穆地站在门口，伸出双手。他把我拉进办公室，用一种虔敬的语气说这真是个让大家悲伤的时刻，又递给我一支雪茄。",
              "simpEn": "The morning of the funeral I went to New York to see Meyer Wolfshiem; I couldn't seem to reach him any other way. Following an elevator boy's advice, I pushed open a door marked 'The Swastika Holding Company.' At first, nobody seemed to be inside. But after I shouted 'Hello' several times with no answer, an argument broke out behind a wall, and soon a beautiful Jewish woman appeared at an inner door and examined me with hostile black eyes. 'Nobody's in,' she said. 'Mr. Wolfshiem's gone to Chicago.' The first part was clearly untrue, because someone had begun whistling 'The Rosary' tunelessly inside. 'Please say Mr. Carraway wants to see him.' 'I can't get him back from Chicago, can I?' At that moment a voice, unmistakably Wolfshiem's, called 'Stella!' from the other side. 'Leave your name on the desk,' she said quickly. 'I'll give it to him when he returns.' 'But I know he's there.' She stepped toward me and slid her hands angrily up and down her hips. 'You young men think you can push your way in any time,' she scolded. 'We're sick and tired of it. When I say he's in Chicago, he's in Chicago.' I mentioned Gatsby. 'Oh!' She looked at me again. 'Will you just—what was your name?' She vanished. A moment later Meyer Wolfshiem stood seriously in the doorway, offering both hands. He drew me into his office, saying in a respectful voice that it was a sad time for us all, and offered me a cigar.",
              "simpZh": "葬礼那天早上，我上纽约去找沃尔夫山姆，用别的办法联系不上他。在电梯男孩指点下，我推开一扇写着“万字控股公司”的门，起初好像没人。可我喊了几声“喂”后，隔板后传出争吵声，一会儿一个漂亮的犹太女人从里门出来，用敌意的黑眼睛上下打量我。“没人在，”她说。“沃尔夫山姆先生去芝加哥了。”前半句明显是假的，因为里面有人正不成调地吹着《玫瑰经》。“请通报卡拉韦先生要见他。”“我没法把他从芝加哥弄回来，是吧？”这时，毫无疑问是沃尔夫山姆的声音从门那边喊“斯特拉！”她赶紧说：“把名字留在桌上，等他回来我给他。”“可我知道他在。”她朝我走近一步，两手气冲冲地在腰上上下搓。“你们年轻人以为随时能硬闯进来，”她骂道。“我们烦透了。我说他在芝加哥，就是在芝加哥。”我提到盖茨比。“哦——！”她又重新打量我。“你能不能——你叫什么来着？”她消失了。一会儿迈耶·沃尔夫山姆就一脸严肃地站在门口，伸出双手。他把我拉进办公室，用恭敬的声音说这是大家都难过的时刻，递给我一支雪茄。"
            },
            {
              "en": "‘My memory goes back to when I first met him,’ he said. ‘A young major just out of the army and covered over with medals he got in the war. He was so hard up he had to keep on wearing his uniform because he couldn’t buy some regular clothes. First time I saw him was when he come into Winebrenner’s poolroom at Forty-third Street and asked for a job. He hadn’t eat anything for a couple of days. ‘Come on have some lunch with me,’ I sid. He ate more than four dollars’ worth of food in half an hour.’",
              "zh": "“我想起了第一次见到他的时候，”他说。“一个刚从部队出来的年轻少校，身上挂满了他在战争中得来的勋章。他穷得厉害，只好继续穿着军服，因为买不起便服。我第一次见到他是他走进四十三街的温布雷纳台球房，要找个工作。他几天没吃东西了。‘走吧，跟我一起吃午饭，’我说。他半个小时内就吃掉了四块钱的东西。”",
              "simpEn": "‘I remember when I first met him,’ he said. ‘A young major just out of the army, covered with medals from the war. He was so broke he had to keep wearing his uniform because he couldn't buy regular clothes. The first time I saw him, he came into Winebrenner's poolroom on Forty-third Street and asked for a job. He hadn't eaten for a couple of days. “Come have lunch with me,” I said. He ate over four dollars' worth of food in half an hour.’",
              "simpZh": "“我记得第一次见到他，”他说。“一个刚出军队的年轻少校，挂满了战功勋章。他穷得只能继续穿军装，没钱买便服。我第一次见他，是他走进四十三街的温布雷纳台球房，想找个工作。他几天没吃东西了。‘来跟我吃午饭，’我说。他半小时内吃了四块钱的东西。”"
            },
            {
              "en": "‘Did you start him in business?’ I inquired. ‘Start him! I made him.’ ‘Oh.’ ‘I raised him up out of nothing, right out of the <span class=\"vocab-trigger\" data-vocab=\"gutter\">gutter<\/span>. I saw right away he was a fine appearing, <span class=\"vocab-trigger\" data-vocab=\"gentlemanly\">gentlemanly<\/span> young man, and when he told me he was an Oggsford I knew I could use him good. I got him to join up in the American Legion and he used to stand high there. Right off he did some work for a client of mine up to Albany. We were so thick like that in everything—’ He held up two <span class=\"vocab-trigger\" data-vocab=\"bulbous\">bulbous<\/span> fingers ‘—always together.’ I wondered if this partnership had included the World’s Series transaction in 1919.",
              "zh": "“是你起用他做生意的吗？”我问道。“起用他！是我造就了他。”“哦。”“我把他从一无所有里提拔起来，直接从臭水沟里捞起来的。我一眼就看出他是个样子好、有绅士风度的年轻人，等他说自己是牛筋大学出来的，我就知道能好好用他。我让他加入了美国退伍军人协会，他在那里一向地位很高。很快他就为我在奥尔巴尼的一个客户做了些事。我们俩在什么事上都亲密得这样——”他竖起两根粗胖的手指，“——总是在一起。”我不禁怀疑这份合伙关系是否也包括了一九一九年的那次世界棒球联赛交易。",
              "simpEn": "‘Did you start him in business?’ I asked. ‘Start him! I made him.’ ‘Oh.’ ‘I lifted him up out of nothing, straight from the gutter. I saw right away he was a fine-looking, gentlemanly young man, and when he told me he was an Oxford man, I knew I could use him well. I got him to join the American Legion, and he stood high there. Right away he did some work for a client of mine up in Albany. We were this close in everything—’ He held up two fat fingers, ‘—always together.’ I wondered if this partnership included the 1919 World Series deal.",
              "simpZh": "“是你起用他做生意的吗？”我问。“起用！是我创造了他。”“哦。”“我把他从什么都没有，从泥坑里提起来的。我一眼看出他是个相貌好、有绅士模样的年轻人，等他说是牛津出来的，我就知道能用好他。我让他加入了美国退伍军人协会，他在那里地位挺高。他很快就为我在奥尔巴尼的一个客户做了事。我们俩什么事都亲得这样——”他竖起两根胖手指，“——老在一起。”我心里想，这合作包不包括一九一九年的世界棒球联赛那档子事。"
            },
            {
              "en": "‘Now he’s dead,’ I said after a moment. ‘You were his closest friend, so I know you’ll want to come to his funeral this afternoon.’ ‘I’d like to come.’ ‘Well, come then.’ The hair in his nostrils quivered slightly and as he shook his head his eyes filled with tears. ‘I can’t do it—I can’t get <span class=\"vocab-trigger\" data-vocab=\"mixed up\">mixed up<\/span> in it,’ he said. ‘There’s nothing to get mixed up in. It’s all over now.’ ‘When a man gets killed I never like to get mixed up in it in any way. I keep out. When I was a young man it was different—if a friend of mine died, no matter how, I stuck with them to the end. You may think that’s <span class=\"vocab-trigger\" data-vocab=\"sentimental\">sentimental<\/span> but I mean it—to the <span class=\"vocab-trigger\" data-vocab=\"bitter end\">bitter end<\/span>.’ I saw that for some reason of his own he was determined not to come, so I stood up. ‘Are you a college man?’ he inquired suddenly. For a moment I thought he was going to suggest a ‘<span class=\"vocab-trigger\" data-vocab=\"gonnegtion\">gonnegtion<\/span>’ but he only nodded and shook my hand. ‘Let us learn to show our friendship for a man when he is alive and not after he is dead,’ he suggested. ‘After that my own rule is to let everything alone.’",
              "zh": "“如今他死了，”我停了一会儿说。“他是你最亲密的朋友，所以我知道你今天下午准会去参加他的葬礼。”“我是想去的。”“那就来吧。”他鼻孔里的毛轻轻翕动了一下，他摇摇头，眼睛里涌满了泪水。“我不能去——我不能卷进这种事，”他说。“没什么可卷进的。事情都过去了。”“每逢有人被杀，我绝不愿以任何方式卷进去。我躲得远远的。我年轻时不一样——要是我有个朋友死了，不管怎么死的，我都会坚持到底。你也许觉得这是多愁善感，可我是当真的——坚持到惨痛的结局。”我看出，为了某种自己的原因，他铁了心不肯来，于是我站了起来。“你上过大学吗？”他突然问道。我一时以为他又要提议一个“关希”，可他只点了点头，握握我的手。“我们得学会在一个活着的时候表达友谊，而不是等他死了之后，”他提议道。“在那之后，我自己的规矩是，一切都别去管了。”",
              "simpEn": "‘Now he's dead,’ I said after a moment. ‘You were his closest friend, so I know you'll want to come to his funeral this afternoon.’ ‘I'd like to come.’ ‘Well, come then.’ The hairs in his nose twitched slightly, and as he shook his head his eyes filled with tears. ‘I can't do it—I can't get involved,’ he said. ‘There's nothing to get involved in. It's all over now.’ ‘When a man gets killed, I never like to get mixed up in it. I keep away. When I was young it was different—if a friend died, no matter how, I stayed with them to the end. You might think that's sentimental, but I mean it—to the bitter end.’ I saw he was determined not to come for his own reasons, so I stood up. ‘Are you a college man?’ he asked suddenly. For a moment I thought he would suggest a 'connection,' but he only nodded and shook my hand. ‘Let us learn to show our friendship for a man while he's alive, not after he's dead,’ he suggested. ‘After that, my rule is to leave everything alone.’",
              "simpZh": "“现在他死了，”我过了一会儿说。“你是他最亲近的朋友，我知道你下午一定想去参加他的葬礼。”“我倒是想去。”“那就来吧。”他鼻孔里的毛轻轻动了一下，他摇着头，眼睛涌满了泪水。“我不能——我不能卷进去，”他说。“没什么好卷进去的。现在都完了。”“一个人被杀，我从来不愿任何方式卷进去。我避开。我年轻时不一样——要是我朋友死了，不管怎么死的，我都陪到最后。你可能觉得这是多愁善感，可我是认真的——直到惨痛的结局。”我看他因为某种自己的原因铁了心不来，就站了起来。“你上过大学吗？”他忽然问。我一时以为他又要提个“关希”，但他只点点头，握了我的手。“我们要学会在人活着时表示友情，而不是死后，”他说。“在那之后，我自己的规矩是什么都别管了。”"
            },
            {
              "en": "When I left his office the sky had turned dark and I got back to West Egg in a <span class=\"vocab-trigger\" data-vocab=\"drizzle\">drizzle<\/span>. After changing my clothes I went next door and found Mr. Gatz walking up and down excitedly in the hall. His pride in his son and in his son’s possessions was continually increasing and now he had something to show me. ‘Jimmy sent me this picture.’ He took out his wallet with trembling fingers. ‘Look there.’ It was a photograph of the house, cracked in the corners and dirty with many hands. He pointed out every detail to me eagerly. ‘Look there!’ and then sought admiration from my eyes. He had shown it so often that I think it was more real to him now than the house itself.",
              "zh": "我离开他办公室时，天已经黑下来了。我回到西卵时正下着毛毛雨。换过衣服后，我走到隔壁，发现盖兹先生正兴奋地在门厅里走来走去。他对自己儿子以及儿子财产的骄傲在不断增长，现在他又有了东西给我看。“吉米寄给我这张照片。”他用颤抖的手指掏出皮夹子。“瞧这儿。”那是一张这栋房子的照片，边角裂开了，被很多只手摸脏了。他热切地指着每个细节给我看。“瞧这儿！”然后又想从我的眼神里寻求赞赏。他把照片拿给人看得次数太多了，以至于我觉得在他眼里，它如今比房子本身还要真实。",
              "simpEn": "When I left his office, the sky had turned dark and I returned to West Egg in a light rain. After changing clothes, I went next door and found Mr. Gatz pacing excitedly in the hall. His pride in his son and his son's things kept growing, and now he had something to show me. 'Jimmy sent me this picture.' He took out his wallet with shaking fingers. 'Look here.' It was a photograph of the house, cracked at the corners and dirty from many hands. He eagerly pointed out every detail. 'Look here!' and then looked for admiration in my eyes. He had shown it so often that I think it was now more real to him than the house itself.",
              "simpZh": "我离开办公室时天已黑了，我回西卵时下着小雨。换好衣服后我去隔壁，看见盖兹先生激动地在门厅里走来走去。他对儿子和儿子财产的自豪感不停增加，现在有东西要给我看。“吉米寄给我这张照片。”他用抖着的手指拿出钱包。“看这儿。”那是房子的照片，角上裂开，被很多人手摸脏了。他热切地指给我看每个细节。“看这儿！”然后想从我眼里找欣赏。他给别人看得太多了，我觉得现在照片比真房子还真实。"
            },
            {
              "en": "‘Jimmy sent it to me. I think it’s a very pretty picture. It shows up well.’ ‘Very well. Had you seen him lately?’ ‘He come out to see me two years ago and bought me the house I live in now. Of course we was broke up when he run off from home but I see now there was a reason for it. He knew he had a big future in front of him. And ever since he made a success he was very generous with me.’ He seemed reluctant to put away the picture, held it for another minute, <span class=\"vocab-trigger\" data-vocab=\"lingeringly\">lingeringly<\/span>, before my eyes. Then he returned the wallet and pulled from his pocket a ragged old copy of a book called ‘Hopalong Cassidy.’",
              "zh": "“吉米寄给我的。我觉得这是张很漂亮的照片。拍得很清楚。”“非常清楚。你最近见过他吗？”“两年前他来看过我，给我买了我现在住的房子。当然他从家里跑走的时候，我们心里都很难过，可我现在明白那是事出有因。他知道自己有大好的前途。而且他发达之后，对我一直很大方。”他好像舍不得把照片收起来，又在眼前依依不舍地端详了一分钟。然后他把皮夹子放回去，又从口袋里掏出一本破旧的旧书，名叫《霍帕隆·卡西迪》。",
              "simpEn": "‘Jimmy sent it to me. I think it's a very pretty picture. It shows up well.’ ‘Very well. Have you seen him lately?’ ‘He came out to see me two years ago and bought me the house I live in now. Of course we were heartbroken when he ran away from home, but I see now there was a reason. He knew he had a big future. And ever since he made a success, he was very generous with me.’ He seemed unwilling to put the picture away, holding it a minute longer in front of my eyes. Then he returned the wallet and pulled from his pocket a tattered old copy of a book called 'Hopalong Cassidy.'",
              "simpZh": "“吉米寄给我的。我觉得是很漂亮的照片，照得很清楚。”“很清晰。你最近见过他吗？”“他两年前来看我，给我买了现在的房子。当然他从家里跑掉时我们很伤心，可现在我明白了，那是有道理的。他知道自己有大前途。而且他成功后对我一直很大方。”他好像不舍得收起照片，又在我眼前拿了一分钟。然后他把钱包放回去，从口袋里掏出一本破旧的《霍帕隆·卡西迪》。"
            },
            {
              "en": "‘Look here, this is a book he had when he was a boy. It just shows you.’ He opened it at the back cover and turned it around for me to see. On the last fly-leaf was printed the word SCHEDULE, and the date September 12th, 1906. And underneath: Rise from bed … … 6.00 A.M. Dumbbell exercise and wall-scaling … 6.15-6.30 A.M. Study electricity, etc … 7.15-8.15 A.M. Work … 8.30-4.30 P.M. Baseball and sports … 4.30-5.00 P.M. Practice elocution, poise and how to attain it 5.00-6.00 P.M. Study needed inventions … 7.00-9.00 P.M. GENERAL RESOLVES No wasting time at Shafters or [a name, indecipherable] No more smokeing or chewing Bath every other day Read one improving book or magazine per week Save $5.00 [crossed out] $3.00 per week Be better to parents.",
              "zh": "“瞧这儿，这是他小时候的书。真能说明问题。”他翻到封底，转过来让我看。在最后的空白页上，印着“作息时间表”几个字，日期是一九○六年九月十二日。下面写着： 起床 ……………………………… 上午6:00 哑铃锻炼和爬墙 ………………… 上午6:15–6:30 学习电学等等 …………………… 上午7:15–8:15 工作 ……………………………… 上午8:30–下午4:30 棒球和运动 …………………… 下午4:30–5:00 练习演说、风度及修养 ……… 下午5:00–6:00 研究有用的发明 ……………… 下午7:00–9:00 一般誓约 不在沙夫特家或[一个无法辨认的名字]家浪费时间 不再吸烟或嚼烟 隔天洗澡一次 每周读一本有益的书或杂志 每周储蓄 $5.00 [划掉] $3.00 对父母更好些",
              "simpEn": "‘Look here, this is a book he had as a boy. It just shows you.’ He opened it to the back cover and turned it around for me to see. On the last blank page was printed the word SCHEDULE, and the date September 12, 1906. And underneath: Rise from bed… 6:00 A.M. Dumbbell exercise and wall-scaling… 6:15-6:30 A.M. Study electricity, etc… 7:15-8:15 A.M. Work… 8:30-4:30 P.M. Baseball and sports… 4:30-5:00 P.M. Practice elocution, poise and how to attain it 5:00-6:00 P.M. Study needed inventions… 7:00-9:00 P.M. GENERAL RESOLVES: No wasting time at Shafters or [illegible name]; No more smoking or chewing; Bath every other day; Read one improving book or magazine per week; Save $5.00 [crossed out] $3.00 per week; Be better to parents.",
              "simpZh": "“看这儿，这是他小时候的书。这就说明问题了。”他翻到封底，转过来给我看。最后一页空白上印着“作息表”和日期1906年9月12日。下面写着：起床……早上6:00；哑铃和爬墙……6:15-6:30；学电学等……7:15-8:15；工作……8:30-下午4:30；棒球和运动……4:30-5:00；练口才、仪态及修养……5:00-6:00；研究需要的新发明……7:00-9:00；一般守则：不在沙夫特家或[看不清名字]家浪费时间；不再抽烟或嚼烟；隔天洗澡；每周读一本有益的书或杂志；每周存$5.00[划掉]$3.00；对父母更好些。"
            },
            {
              "en": "‘I come across this book by accident,’ said the old man. ‘It just shows you, don’t it?’ ‘It just shows you.’ ‘Jimmy was bound to get ahead. He always had some resolves like this or something. Do you notice what he’s got about improving his mind? He was always great for that. He told me I et like a hog once and I beat him for it.’ He was reluctant to close the book, reading each item aloud and then looking eagerly at me. I think he rather expected me to copy down the list for my own use.",
              "zh": "“这本书我是偶然发现的，”老人说。“这真能说明问题，是不是？”“真能说明问题。”“吉米是注定要出人头地的。他总是有这种决心之类的东西。你注意到他关于增进心智的这些话了吗？他一向在这一方面很了不起。他有次说我吃饭像猪一样，我还为这个揍了他一顿。”他不肯合上书，把每一条都大声读出来，然后殷切地望着我。我想他大概颇为指望我把这张表抄下来供我自己用。",
              "simpEn": "‘I came across this book by accident,’ the old man said. ‘It just shows you, doesn't it?’ ‘It just shows you.’ ‘Jimmy was bound to get ahead. He always had resolves like this. Do you notice what he wrote about improving his mind? He was always big on that. He once told me I ate like a hog, and I beat him for it.’ He was unwilling to close the book, reading each item aloud and then looking eagerly at me. I think he half expected me to copy the list for my own use.",
              "simpZh": "“这本书我是偶然找到的，”老人说。“这真能说明问题，对吧？”“真能说明。”“吉米注定要成功。他总有这种决心什么的。你注意到他关于提高心智的话了吗？他一向在这方面很行。有次他说我吃饭像猪，我还为这个揍了他。”他不肯合上书，每一条都大声念，然后热切地看着我。我想他挺希望我把这张表抄下来自己用。"
            }

        {
          "sectionId": 6,
          "heading": "The Funeral and the Owl‑Eyed Man",
          "paragraphs": [
            {
              "en": "A little before three the Lutheran minister arrived from Flushing and I began to look <span class=\"vocab-trigger\" data-vocab=\"involuntarily\">involuntarily<\/span> out the windows for other cars. So did Gatsby’s father. And as the time passed and the servants came in and stood waiting in the hall, his eyes began to blink anxiously and he spoke of the rain in a worried uncertain way. The minister glanced several times at his watch so I took him aside and asked him to wait for half an hour. But it wasn’t any use. Nobody came.",
              "zh": "快到三点时，那位路德宗牧师从弗拉兴赶来了，我也开始不由自主地从窗口张望，想看看有没有别的车。盖茨比的父亲也是这样。随着时间过去，仆人都进来站在门厅里等着，老人的眼睛开始不安地眨动，他忧心忡忡、含含糊糊地说起下雨的事。牧师频频看表，于是我把他拉到一边，请他再等半小时。可是毫无用处。没有一个人来。",
              "simpEn": "A little before three, the Lutheran minister arrived from Flushing, and I began to look out the windows without meaning to, searching for other cars. So did Gatsby's father. As time passed and the servants came in and stood waiting in the hall, his eyes began to blink nervously, and he talked about the rain in a worried, unsure way. The minister glanced at his watch several times, so I took him aside and asked him to wait half an hour. But it was no use. Nobody came.",
              "simpZh": "快三点时，路德会牧师从弗拉兴来了，我开始不由自主地从窗户往外看有没有别的车。盖茨比的父亲也这样。时间过去，仆人们进来站在门厅里等着，他的眼睛开始不安地眨，还忧心忡忡地、不确定地说起下雨的事。牧师几次看表，我把他拉到一边，请他再等半小时。可是没用。没有一个人来。"
            },
            {
              "en": "About five o’clock our procession of three cars reached the cemetery and stopped in a thick drizzle beside the gate—first a motor hearse, horribly black and wet, then Mr. Gatz and the minister and I in the limousine, and, a little later, four or five servants and the postman from West Egg in Gatsby’s station wagon, all wet to the skin. As we started through the gate into the cemetery I heard a car stop and then the sound of someone splashing after us over the <span class=\"vocab-trigger\" data-vocab=\"soggy\">soggy<\/span> ground. I looked around. It was the man with <span class=\"vocab-trigger\" data-vocab=\"owl-eyed glasses\">owl-eyed glasses<\/span> whom I had found marvelling over Gatsby’s books in the library one night three months before. I’d never seen him since then. I don’t know how he knew about the funeral or even his name. The rain poured down his thick glasses and he took them off and wiped them to see the protecting canvas unrolled from Gatsby’s grave.",
              "zh": "五点钟左右，我们三辆车组成的送葬行列到达墓地，停在稠密的毛毛雨中，紧挨着大门——最前面是灵车，黑沉沉湿漉漉的，可怕得很，然后是盖兹先生、牧师和我坐的豪华轿车，稍后是四五个仆人和西卵的邮差坐在盖茨比的旅行车里，大家都湿透了。我们刚穿过大门朝墓区走去，就听见一辆车停了下来，然后有人踩着湿软的地面哗啦哗啦地跟着我们走来。我回头看去。原来是那个戴着猫头鹰眼镜的人，三个月前的一天夜里，我曾发现他在图书室里对着盖茨比的书惊叹不已。从那以后我再没见过他。我不知道他是怎么知道葬礼消息的，甚至不知道他叫什么名字。雨水从他那厚厚的镜片上流下来，他摘下眼镜擦了擦，好看着人们把遮雨的帆布从盖茨比的坟上卷开。",
              "simpEn": "About five o'clock, our line of three cars reached the cemetery and stopped in heavy drizzle beside the gate—first a motor hearse, terribly black and wet, then Mr. Gatz, the minister, and I in the limousine, and a little later four or five servants and the West Egg postman in Gatsby's station wagon, all soaked to the skin. As we started through the gate into the cemetery, I heard a car stop and then the sound of someone splashing after us over the wet ground. I looked around. It was the man with the owl-eyed glasses whom I had found marveling at Gatsby's books in the library one night three months before. I had never seen him since. I don't know how he knew about the funeral, or even his name. Rain poured down his thick glasses, and he took them off and wiped them to see the protective canvas unrolled from Gatsby's grave.",
              "simpZh": "大概五点钟，我们三辆车组成的行列到了墓地，停在门边的浓密细雨中——最前面是灵车，又黑又湿，很可怕，然后盖兹先生、牧师和我坐豪车，稍后四五个仆人和西卵邮差坐盖茨比的旅行车，全湿透了。我们刚穿过门进墓园，就听见一辆车停下，然后有人踩着湿软地面扑哧扑哧地跟着我们过来。我回头，是那个戴猫头鹰眼镜的人，三个月前有一晚我在图书室看见他对盖茨比的书惊叹不已。从那以后我再没见过他。我不知道他怎么知道葬礼的，甚至不知道他的名字。雨水从他厚镜片上流下，他摘下眼镜擦干，好看着盖茨比坟上那遮雨的帆布卷开。"
            },
            {
              "en": "I tried to think about Gatsby then for a moment but he was already too far away and I could only remember, without resentment, that Daisy hadn’t sent a message or a flower. Dimly I heard someone murmur ‘<span class=\"vocab-trigger\" data-vocab=\"Blessed are the dead that the rain falls on\">Blessed are the dead that the rain falls on<\/span>,’ and then the owl-eyed man said ‘Amen to that,’ in a brave voice. We straggled down quickly through the rain to the cars. Owl-Eyes spoke to me by the gate. ‘I couldn’t get to the house,’ he remarked. ‘Neither could anybody else.’ ‘Go on!’ He started. ‘Why, my God! they used to go there by the hundreds.’ He took off his glasses and wiped them again outside and in. ‘The poor son-of-a-bitch,’ he said.",
              "zh": "我试图想一下盖茨比，可是他此刻已经离得太远了，我只能记起，没有丝毫怨恨地，黛西既没捎个口信，也没送一朵花。我隐约听见有人喃喃地说“雨水降在死者身上，他们是有福的”，接着那猫头鹰眼镜的人用勇敢的声音说“阿门”。我们很快在雨中散散落落地走回车里。猫头鹰眼镜在大门口对我说：“我没能到宅子去。”“别的人也没能去。”“得了吧！”他吃了一惊。“怎么，我的上帝！他们过去可是成百上千地去那儿啊。”他摘下眼镜，又把镜片里里外外擦了一遍。“那可怜的狗娘养的，”他说。",
              "simpEn": "I tried to think about Gatsby then, but he was already too far away, and I could only remember, without anger, that Daisy hadn't sent a message or a flower. I faintly heard someone murmur 'Blessed are the dead that the rain falls on,' and then the owl-eyed man said 'Amen to that' in a brave voice. We straggled quickly through the rain back to the cars. Owl-Eyes spoke to me at the gate. 'I couldn't get to the house,' he said. 'Neither could anyone else.' 'Go on!' He started. 'Why, my God! They used to go there by the hundreds.' He took off his glasses and wiped them again, inside and out. 'The poor son-of-a-bitch,' he said.",
              "simpZh": "我试着想盖茨比，可他已太远了，我只记得，没有怨恨，黛西没捎信也没送花。隐隐约约听见有人低语“雨落在死者身上，他们有福了”，然后猫头鹰眼镜勇敢地说了声“阿门”。我们赶快散散落落穿过雨走回车里。猫头鹰眼镜在门口对我说：“我没能到房子去。”“也没别人能到。”“别开玩笑了！”他愣了下，“怎么，天哪！他们以前成百上千地去那儿啊。”他摘下眼镜，又里外擦了一遍。“那可怜的狗娘养的，”他说。"

        {

          "paragraphs": [
            {
              "en": "One of my most vivid memories is of coming back west from prep school and later from college at Christmas time. Those who went farther than Chicago would gather in the old dim Union Station at six o’clock of a December evening with a few Chicago friends already caught up into their own holiday gayeties to bid them a hasty goodbye. I remember the fur coats of the girls returning from Miss This or That’s and the chatter of frozen breath and the hands waving overhead as we caught sight of old acquaintances and the matchings of invitations: ‘Are you going to the Ordways’? the Herseys’? the Schultzes’?’ and the long green tickets clasped tight in our gloved hands. And last the <span class=\"vocab-trigger\" data-vocab=\"murky\">murky<\/span> yellow cars of the Chicago, Milwaukee and St. Paul Railroad looking cheerful as Christmas itself on the tracks beside the gate.",
              "zh": "我最鲜明的记忆之一，是从预科学校和后来从大学回西部过圣诞节的时候。那些要去比芝加哥更远地方的人，会在十二月傍晚六点钟聚集在昏暗的老联合车站里，几个已经沉浸在自己节日欢乐中的芝加哥朋友匆匆向他们道别。我记得那些从某某小姐学校回来的姑娘们穿着的皮大衣，记得结着白气的说笑声，当我们看见老朋友时在空中挥舞的手，以及彼此比较邀请的热闹：“你去奥德韦家吗？赫西家？舒尔茨家？”那些紧握在戴手套的手中的长长的绿色车票。最后是芝加哥—密尔沃基—圣保罗铁路那暗黄色的车厢，停在门口的铁轨上，看起来就像圣诞节本身一样喜庆。",
              "simpEn": "One of my clearest memories is of coming back West from prep school and later from college at Christmas. Those going farther than Chicago would meet in the old dim Union Station at six on a December evening. A few Chicago friends, already caught up in their holiday fun, would bid them a quick goodbye. I remember the fur coats of girls returning from Miss So-and-so's school, the chatter of frosty breath, the waving hands as we spotted old friends, and the matching of invitations: 'Are you going to the Ordways'? The Herseys'? The Schultzes'?' And the long green tickets held tight in our gloved hands. Finally, the dark yellow cars of the Chicago, Milwaukee and St. Paul Railroad, looking as cheerful as Christmas itself on the tracks beside the gate.",
              "simpZh": "我记忆最鲜明之一，是从预科和大学回西部过圣诞。那些去更远地方的人，在十二月晚上六点聚在昏暗的旧联合车站，几个已沉浸在节日欢乐里的芝加哥朋友匆匆告别。我记得从某某小姐学校回来的女孩们穿的皮大衣，冻得呵出白气的说笑声，看到老朋友时头上挥舞的手，还有比较请帖：“你去奥德韦家吗？赫西家？舒尔茨家？”以及戴手套手里紧攥的长绿色车票。最后是芝加哥—密尔沃基—圣保罗铁路暗黄色的车厢，停在门边铁轨上，像圣诞节一样欢快。"
            },
            {
              "en": "When we pulled out into the winter night and the real snow, our snow, began to stretch out beside us and <span class=\"vocab-trigger\" data-vocab=\"twinkle\">twinkle<\/span> against the windows, and the dim lights of small Wisconsin stations moved by, a sharp wild <span class=\"vocab-trigger\" data-vocab=\"brace\">brace<\/span> came suddenly into the air. We drew in deep breaths of it as we walked back from dinner through the cold <span class=\"vocab-trigger\" data-vocab=\"vestibules\">vestibules<\/span>, <span class=\"vocab-trigger\" data-vocab=\"unutterably\">unutterably<\/span> aware of our identity with this country for one strange hour before we melted indistinguishably into it again.",
              "zh": "当火车驶入冬夜，真正的雪，我们的雪，开始在我们身旁延伸开来，贴着车窗闪烁，威斯康星州那些小站昏暗的灯光一一掠过的时候，空气中突然涌进一股清冽而粗犷的劲气。我们吃完饭从餐车走回冰冷的车厢连廊时，深深地呼吸着它，在那奇怪的一小时内，我们莫名地意识到自己与这个国家融为了一体，然后又不留痕迹地重新融入其中。",
              "simpEn": "When we pulled out into the winter night and the real snow—our snow—began to stretch beside us and sparkle against the windows, and the dim lights of small Wisconsin stations slid past, a sharp, wild freshness suddenly filled the air. We breathed it deeply as we walked back from dinner through the cold train corridors, unspeakably aware of being one with this country for one strange hour before we melted invisibly back into it.",
              "simpZh": "火车驶入冬夜，真正的雪——我们的雪——在窗外铺开，贴窗闪烁，威斯康星小站昏暗的灯光一一掠过，一阵清冽粗犷的新鲜空气突然涌入。吃完饭走回冷冰冰的车厢连接处时，我们深深呼吸着，在那奇怪的一小时里，无法形容地意识到自己与这片土地融为一体，然后又不分彼此地融了回去。"
            },
            {
              "en": "That’s my middle west—not the wheat or the prairies or the lost Swede towns but the thrilling, returning trains of my youth and the street lamps and sleigh bells in the frosty dark and the shadows of holly wreaths thrown by lighted windows on the snow. I am part of that, a little <span class=\"vocab-trigger\" data-vocab=\"solemn\">solemn<\/span> with the feel of those long winters, a little <span class=\"vocab-trigger\" data-vocab=\"complacent\">complacent<\/span> from growing up in the Carraway house in a city where dwellings are still called through decades by a family’s name. I see now that this has been a story of the West, after all—Tom and Gatsby, Daisy and Jordan and I, were all Westerners, and perhaps we possessed some <span class=\"vocab-trigger\" data-vocab=\"deficiency\">deficiency<\/span> in common which made us subtly unadaptable to Eastern life.",
              "zh": "那才是我心目中的中西部——不是麦田，不是草原，也不是那些早已消失的瑞典移民小镇，而是我年轻时那些激动人心的归乡列车，是寒冷黑夜中的街灯和雪橇铃声，是亮着灯的窗户投在雪地上的冬青花环的影子。我是它的一部分，那些漫长的冬日让我有点庄严，在卡拉韦家那座城市长大的经历让我有点自得，在那座城市里，一栋栋房子在几十年间依然用家族的姓氏来称呼。我现在明白，这说到底是一个关于西部的故事——汤姆和盖茨比，黛西、乔丹和我，我们都是西部人，也许我们共同具有某种缺陷，使得我们不知不觉地无法适应东部的生活。",
              "simpEn": "That's my Midwest—not the wheat or the prairies or the lost Swede towns, but the thrilling return trains of my youth, the streetlights and sleigh bells in the frosty dark, and the shadows of holiday wreaths thrown on the snow by lit windows. I am part of that, a bit serious from the feeling of those long winters, a bit self-satisfied from growing up in the Carraway house in a city where homes are still called by a family's name decades later. I see now that this has been a story of the West after all—Tom and Gatsby, Daisy and Jordan and I were all Westerners, and maybe we shared some weakness that made us subtly unable to fit into Eastern life.",
              "simpZh": "那才是我心中的中西部——不是麦田或草原或消失的瑞典小镇，而是我年轻时兴奋的回乡火车，是霜夜里的街灯和雪橇铃声，是亮窗透出的冬青花环影子落在雪上。我是那里的一部分，漫长冬季的感触让我有点严肃，在卡拉韦家长大让我有点自满，那个城里房子几十年还叫着家族的名字。我现在明白，这终究是一个关于西部的故事——汤姆、盖茨比、黛西、乔丹和我，都是西部人，也许我们共同有种缺陷，让我们不知不觉适应不了东部生活。"
            },
            {
              "en": "Even when the East excited me most, even when I was most keenly aware of its superiority to the bored, sprawling, <span class=\"vocab-trigger\" data-vocab=\"swollen\">swollen<\/span> towns beyond the Ohio, with their <span class=\"vocab-trigger\" data-vocab=\"interminable inquisitions\">interminable inquisitions<\/span> which spared only the children and the very old—even then it had always for me a quality of <span class=\"vocab-trigger\" data-vocab=\"distortion\">distortion<\/span>. West Egg especially still figures in my more fantastic dreams. I see it as a night scene by El Greco: a hundred houses, at once conventional and grotesque, crouching under a <span class=\"vocab-trigger\" data-vocab=\"sullen, overhanging sky\">sullen, overhanging sky<\/span> and a <span class=\"vocab-trigger\" data-vocab=\"lustreless moon\">lustreless moon<\/span>. In the foreground four solemn men in dress suits are walking along the sidewalk with a stretcher on which lies a drunken woman in a white evening dress. Her hand, which dangles over the side, sparkles cold with jewels. Gravely the men turn in at a house—the wrong house. But no one knows the woman’s name, and no one cares.",
              "zh": "即使在东部令我最为激动的时候，即使在我最敏锐地觉察到它比俄亥俄河对岸那些沉闷、蔓延、臃肿的城镇——那里没完没了的盘查只放过了儿童和老人——优越得多的时候，东部对我而言也总带有一种扭曲的性质。西卵尤其仍然出现在我那些最离奇的梦境里。在我眼中，它就像埃尔·格列柯画中的一幅夜景：上百座房子，既规整又怪诞，蹲伏在一轮阴沉沉的、低垂的天空和一盏没有光泽的月亮之下。前景里，四个穿燕尾服的严肃男子沿着人行道走着，抬着一副担架，上面躺着一个身穿白色晚礼服、醉醺醺的女人。她垂在担架边的手上，珠宝冷冷地闪烁着光芒。那些男子沉着脸拐进一栋房子——走错了房子。但没有人知道那女人的名字，也没有人在乎。",
              "simpEn": "Even when the East excited me the most, even when I most strongly felt it was better than the bored, sprawling, bloated towns beyond the Ohio, with their endless snooping that only spared children and the very old—even then, the East always had a quality of being twisted for me. West Egg especially still appears in my strangest dreams. I see it as a night scene painted by El Greco: a hundred houses, both normal and freakish, crouching under a heavy, low sky and a dull moon. In the front, four serious men in suits carry a stretcher with a drunk woman in a white evening dress. Her hand, hanging over the side, sparkles coldly with jewels. The men gravely enter a house—the wrong house. But no one knows the woman's name, and no one cares.",
              "simpZh": "即便东部最让我激动的时候，即便我最清楚它比俄亥俄河对岸那些沉闷、蔓延、臃肿的城镇强，那些城镇没完没了的打听只放过小孩和老人——即便那时，东部对我来说总有种扭曲感。西卵尤其还在我最怪的梦里。我看它像埃尔·格列柯画的一幅夜景：上百座房子，又规矩又怪诞，蹲在阴沉的、低低的天和没有光的月亮下面。前景里四个穿礼服的严肃男人抬着担架，上面躺着一个穿白晚礼服、喝醉的女人。她垂在旁边的吊着的手，珠宝冷闪闪。男人们沉着脸走进一座房子——走错了房子。但没人知道那女人的名字，也没人关心。"
            },
            {
              "en": "After Gatsby’s death the East was haunted for me like that, distorted beyond my eyes’ power of correction. So when the blue smoke of brittle leaves was in the air and the wind blew the wet laundry stiff on the line I decided to come back home.",
              "zh": "盖茨比死后，东部就这样在我心里闹鬼，扭曲得超出了我眼睛矫正的能力。因此，当空气中飘起枯脆树叶的蓝烟，风把晾在绳子上的湿衣服吹得硬邦邦的时候，我决定回家了。",
              "simpEn": "After Gatsby's death, the East felt haunted like that for me, twisted beyond my ability to see clearly. So when the blue smoke of dry leaves was in the air and the wind stiffened the wet laundry on the line, I decided to go back home.",
              "simpZh": "盖茨比死后，东部对我来说就这样闹鬼，扭曲得我眼睛都矫正不过来。所以当干枯树叶的蓝烟飘在空气里，风把晾绳上的湿衣服吹得发硬时，我决定回家去。"
            }
          ],
          "quiz": [
