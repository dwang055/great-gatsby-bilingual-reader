            {
              "en": "‘Is it a boy or a girl?’ she asked delicately. ‘That dog? That dog’s a boy.’ ‘It’s a bitch,’ said Tom decisively. ‘Here’s your money. Go and buy ten more dogs with it.’ We drove over to Fifth Avenue, so warm and soft, almost <span class=\"vocab-trigger\" data-vocab=\"pastoral\">pastoral<\/span>, on the summer Sunday afternoon that I wouldn’t have been surprised to see a great flock of white sheep turn the corner.",
              "zh": "‘它是男孩还是女孩？’她娇滴滴地问。‘这只狗？这只狗是男孩。’‘是只母狗，’汤姆断然说道，‘给你钱，再去买十只狗吧。’我们驶向第五大道，在夏季的星期天下午，那里温暖柔和，几乎带着田园气息，我要是在街角看见一大群白羊也不会感到惊讶。",
              "simpEn": "‘Is it a boy or a girl?’ she asked softly. ‘That dog? It’s a boy.’ ‘It’s a female,’ Tom said firmly. ‘Here’s your money. Go buy ten more.’ We drove to Fifth Avenue, which felt so warm and soft, almost like the countryside, that I wouldn’t have been shocked to see a flock of sheep around the corner.",
              "simpZh": "‘它是公的还是母的？’她娇声问。‘这只狗？是公的。’‘是母狗，’汤姆笃定地说，‘给你钱，再去买十只。’我们开到了第五大道，这个夏日的周日下午，街道温暖柔和，简直像田园一样，我要是看见拐角来一大群白羊也不会吃惊。"
            },
            {
              "en": "‘Hold on,’ I said, ‘I have to leave you here.’ ‘No, you don’t,’ interposed Tom quickly. ‘Myrtle’ll be hurt if you don’t come up to the apartment. Won’t you, Myrtle?’ ‘Come on,’ she urged. ‘I’ll telephone my sister Catherine. She’s said to be very beautiful by people who ought to know.’ ‘Well, I’d like to, but——‘ We went on, cutting back again over the Park toward the West Hundreds. At 158th Street the cab stopped at one slice in a long white cake of apartment houses. Throwing a <span class=\"vocab-trigger\" data-vocab=\"regal\">regal<\/span> homecoming glance around the neighborhood, Mrs. Wilson gathered up her dog and her other purchases and went <span class=\"vocab-trigger\" data-vocab=\"haughtily\">haughtily<\/span> in.",
              "zh": "‘等等，’我说，‘我该在这儿走了。’‘不，不行，’汤姆马上插嘴道，‘你要是不上去，梅特尔会伤心的。对吧，梅特尔？’‘来吧，’她催促道，‘我给我妹妹凯瑟琳打电话。据说她很漂亮，知道的人都说好。’‘嗯，我很想去，可是——’我们继续前行，又穿过公园折向西百老汇一带。在158街，出租车停在一片长长的白色公寓楼中的一个单元前。威尔逊太太向周围投去一个女王般的归家目光，抱起她的狗和其他买到的东西，傲慢地走了进去。",
              "simpEn": "‘Hold on,’ I said, ‘I have to leave you here.’ ‘No, you don’t,’ Tom said quickly. ‘Myrtle’ll be hurt if you don’t come up. Won’t you, Myrtle?’ ‘Come on,’ she urged. ‘I’ll telephone my sister Catherine. They say she’s very beautiful.’ ‘Well, I’d like to, but—’ We drove on, through the park to the West Hundreds. At 158th Street the cab stopped at one slice of a long white apartment building. Myrtle gave the neighborhood a queenly look, gathered her dog and purchases, and walked in proudly.",
              "simpZh": "‘等一下，’我说，‘我得在这儿走了。’‘不行，’汤姆赶紧说，‘你不上去梅特尔会难过的。对吧，梅特尔？’‘来吧，’她催道，‘我给我妹妹凯瑟琳打电话。认识她的人都说她很漂亮。’‘嗯，我想去，可——’我们继续开，又穿过公园往西几百号那边去。在158街，出租车停在一长条白色公寓楼的一个单元前。梅特尔高傲地环视了一下周围，抱起狗和其他东西，趾高气扬地走了进去。"
            },
            {
              "en": "‘I’m going to have the McKees come up,’ she announced as we rose in the elevator. ‘And of course I got to call up my sister, too.’ The apartment was on the top floor—a small living room, a small dining room, a small bedroom and a bath. The living room was crowded to the doors with a set of <span class=\"vocab-trigger\" data-vocab=\"tapestried\">tapestried<\/span> furniture entirely too large for it so that to move about was to stumble continually over scenes of ladies swinging in the gardens of <span class=\"vocab-trigger\" data-vocab=\"Versailles\">Versailles<\/span>.",
              "zh": "‘我要叫麦基夫妇上来，’我们在电梯里上升时她宣布道，‘当然我也得把我妹妹叫来。’公寓在顶层——一间小客厅、一间小饭厅、一间小卧室和一个浴室。客厅里挤满了一套带织锦面的家具，大得完全不合比例，走动起来就会不停地被那些描绘着仕女们在凡尔赛花园里荡秋千的场景绊倒。",
              "simpEn": "‘I’m going to have the McKees come up,’ she said as the elevator rose. ‘And I’ve got to call my sister, too.’ The apartment was on the top floor—a small living room, dining room, bedroom, and bath. The living room was packed with huge tapestry-covered furniture that was too big for it, so you kept tripping over scenes of ladies swinging in Versailles gardens.",
              "simpZh": "‘我要叫麦基夫妇上来，’电梯往上升时她说，‘当然还得给我妹妹打电话。’公寓在顶层——小客厅、小饭厅、小卧室和浴室。客厅里塞满了太大套的织锦面家具，走动起来老是被绊在那些凡尔赛花园里荡秋千的仕女画面上。"
            },
            {
              "en": "The only picture was an over-enlarged photograph, apparently a hen sitting on a <span class=\"vocab-trigger\" data-vocab=\"blurred\">blurred<\/span> rock. Looked at from a distance however the hen resolved itself into a <span class=\"vocab-trigger\" data-vocab=\"bonnet\">bonnet<\/span> and the <span class=\"vocab-trigger\" data-vocab=\"countenance\">countenance<\/span> of a stout old lady beamed down into the room. Several old copies of ‘Town Tattle’ lay on the table together with a copy of ‘Simon Called Peter’ and some of the small scandal magazines of Broadway. Mrs. Wilson was first concerned with the dog. A reluctant elevator boy went for a box full of straw and some milk to which he added on his own initiative a tin of large hard dog biscuits—one of which <span class=\"vocab-trigger\" data-vocab=\"decomposed\">decomposed<\/span> <span class=\"vocab-trigger\" data-vocab=\"apathetically\">apathetically<\/span> in the saucer of milk all afternoon. Meanwhile Tom brought out a bottle of whiskey from a locked <span class=\"vocab-trigger\" data-vocab=\"bureau\">bureau<\/span> door.",
              "zh": "唯一的画是一幅过度放大的照片，乍看像一只母鸡蹲在一块模糊的石头上。但远远看去，母鸡变成了一顶无边女帽，一位胖老太太的脸庞向下朝房间灿烂地微笑着。桌上放着几本旧《Town Tattle》，还有一本《西门彼得》和一些百老汇的小绯闻杂志。威尔逊太太首先关心的是狗。一个不情愿的电梯男孩去拿了一箱干草和一些牛奶，自己还主动加了一罐又大又硬的狗饼干——其中一块整个下午都冷淡地在牛奶碟里分解着。与此同时，汤姆从一个锁着的柜门里取出一瓶威士忌。",
              "simpEn": "The only picture was a huge blurry photo that looked like a hen on a rock, but from afar it became a bonnet and an old lady's smiling face. Old gossip magazines and one book lay on the table. Myrtle first fussed over the dog; an elevator boy brought a box of straw and milk, adding some hard dog biscuits on his own—one of which slowly dissolved in the milk all afternoon. Tom meanwhile pulled out a whiskey bottle from a locked cabinet.",
              "simpZh": "唯一一幅画是一张超大模糊的照片，看着像母鸡蹲在石头上，离远点就变成了一顶软帽和一位胖老太太的笑脸。桌上放着几本旧八卦杂志和一本《西门彼得》。梅特尔先忙狗的事，一个不情愿的电梯男孩弄来一箱干草和牛奶，还自己加了一罐硬狗饼干——其中一块整整一下午都懒洋洋地在牛奶里泡着。汤姆这时从锁着的柜子里拿出一瓶威士忌。"
            }

          "heading": "The Party Spirals & Tom Breaks Myrtle’s Nose",
          "paragraphs": [
            {
              "en": "I have been drunk just twice in my life and the second time was that afternoon so everything that happened has a <span class=\"vocab-trigger\" data-vocab=\"dim hazy\">dim hazy<\/span> cast over it although until after eight o’clock the apartment was full of cheerful sun. Sitting on Tom’s lap Mrs. Wilson called up several people on the telephone; then there were no cigarettes and I went out to buy some at the drug store on the corner. When I came back they had disappeared so I sat down <span class=\"vocab-trigger\" data-vocab=\"discreetly\">discreetly<\/span> in the living room and read a chapter of ‘Simon Called Peter’—either it was terrible stuff or the whiskey distorted things because it didn’t make any sense to me.",
              "zh": "我这辈子只喝醉过两次，第二次就是那个下午，所以所有发生的事都罩上了一层朦胧的暗影，尽管直到八点以后公寓里还满是为明媚的阳光。威尔逊太太坐在汤姆的膝上给好几个人打了电话；然后香烟抽完了，我去街角药房买了一些。等我回来时他们都不见了，于是我识趣地在客厅里坐下，读了一章《西门彼得》——要么这书实在是糟糕，要么是威士忌扭曲了东西，反正我完全看不懂。",
              "simpEn": "I've been truly drunk only twice, and the second time was that afternoon, so everything is blurry, even though the apartment was sunny until after eight. Myrtle, on Tom's lap, phoned several people; then we ran out of cigarettes and I went to buy some. When I returned, they'd vanished, so I sat quietly and read a chapter of 'Simon Called Peter'—either the book was awful or the whiskey made it nonsensical.",
              "simpZh": "我这辈子只真醉过两次，第二次就是那天下午，所以啥事都模模糊糊的，尽管到八点之后公寓里还阳光灿烂。梅特尔坐在汤姆腿上打了好几个电话；然后烟没了，我去街角药房买烟。回来时他们都不见了，我就识相地坐在客厅读了一章《西门彼得》——要么书太烂，要么是威士忌搅的，我一点也看不懂。"
            },
            {
              "en": "Just as Tom and Myrtle—after the first drink Mrs. Wilson and I called each other by our first names—reappeared, company commenced to arrive at the apartment door. The sister, Catherine, was a slender, <span class=\"vocab-trigger\" data-vocab=\"worldly\">worldly<\/span> girl of about thirty with a solid sticky bob of red hair and a complexion powdered milky white. Her eyebrows had been plucked and then drawn on again at a more rakish angle but the efforts of nature toward the restoration of the old alignment gave a <span class=\"vocab-trigger\" data-vocab=\"blurred\">blurred<\/span> air to her face. When she moved about there was an <span class=\"vocab-trigger\" data-vocab=\"incessant\">incessant<\/span> clicking as innumerable pottery bracelets jingled up and down upon her arms.",
              "zh": "当汤姆和梅特尔——喝过第一杯酒后，我和威尔逊太太已经直呼其名——再次出现时，公寓门口开始有客人到来了。妹妹凯瑟琳是个苗条、世故的三十岁左右女孩，一头浓密的红色短发涂得油亮，脸上的粉搽得奶白。她的眉毛拔了又重新画上，而且画得更加流气，但先天那想要恢复原状的力道让她的脸带上了一种模糊的气息。她一走动，胳膊上数不清的陶制手镯就上下叮当作响，发出持续不断的碰撞声。",
              "simpEn": "Just as Tom and Myrtle—by then we were on first-name terms—reappeared, guests started arriving. Catherine, Myrtle's sister, was slim, worldly, around thirty, with a stiff bob of red hair and a very white powdered face. Her eyebrows were plucked and redrawn at a mischievous angle, giving her face a blurry look. As she moved, countless pottery bracelets clinked and jangled on her arms.",
              "simpZh": "汤姆和梅特尔——喝过第一杯后我们已互称名字——重新出现时，客人们开始到门口。妹妹凯瑟琳是个苗条、老练的三十岁左右姑娘，一头油亮的红短发，脸上粉搽得雪白。眉毛拔了又画过，画得更风骚，但天生的眉形往回顶让脸看起来模糊糊的。她一动，胳膊上无数个陶制手镯就叮叮当当响个不停。"
            },
            {
              "en": "She came in with such a <span class=\"vocab-trigger\" data-vocab=\"proprietary\">proprietary<\/span> haste and looked around so <span class=\"vocab-trigger\" data-vocab=\"possessively\">possessively<\/span> at the furniture that I wondered if she lived here. But when I asked her she laughed <span class=\"vocab-trigger\" data-vocab=\"immoderately\">immoderately<\/span>, repeated my question aloud and told me she lived with a girl friend at a hotel. Mr. McKee was a pale feminine man from the flat below. He had just shaved for there was a white spot of lather on his cheekbone and he was most respectful in his greeting to everyone in the room.",
              "zh": "她进来时带着一种主人般的匆忙，占有性地环视着家具，我差点以为她就住在这儿。但当我问她时，她放声大笑，大声重复了我的问题，然后告诉我她和一个女友住在酒店里。麦基先生是个苍白、有点娘气的男人，住在楼下的公寓。他刚刚刮过脸，脸颊骨上还有一点白色的肥皂沫，他跟房间里所有人打招呼都极其恭敬。",
              "simpEn": "She came in so quickly and looked at the furniture in such a possessive way that I thought she lived here. But when I asked, she laughed loudly, repeated my question, and said she lived with a girlfriend at a hotel. Mr. McKee was a pale, feminine man from the apartment below. He had just shaved, so a spot of lather remained on his cheek; he greeted everyone very politely.",
              "simpZh": "她进来得很急，又那么占有式地打量家具，我都以为她住这儿。但一问，她大笑起来，大声重复了我的问题，说她和一个女朋友住在酒店。麦基先生是个苍白、有点娘的男人，住在楼下公寓。他刚刮过脸，脸颊上还留着一小块肥皂沫，他毕恭毕敬地和每个人打招呼。"
            },
            {
              "en": "He informed me that he was in the ‘artistic game’ and I gathered later that he was a photographer and had made the dim enlargement of Mrs. Wilson’s mother which <span class=\"vocab-trigger\" data-vocab=\"hovered\">hovered<\/span> like an <span class=\"vocab-trigger\" data-vocab=\"ectoplasm\">ectoplasm<\/span> on the wall. His wife was <span class=\"vocab-trigger\" data-vocab=\"shrill\">shrill<\/span>, <span class=\"vocab-trigger\" data-vocab=\"languid\">languid<\/span>, handsome and horrible. She told me with pride that her husband had photographed her a hundred and twenty-seven times since they had been married.",
              "zh": "他告诉我他是搞‘艺术行当’的，我后来才明白他是个摄影师，墙上那幅威尔逊太太母亲的模糊放大照片就是他拍的，像一团灵异雾气悬浮在墙上。他的妻子尖声刺耳、懒洋洋的，漂亮却又令人讨厌。她得意地告诉我，结婚以来她丈夫给她拍了一百二十七次照片。",
              "simpEn": "He told me he was in the ‘artistic game’—later I found out he was a photographer, the one who made the blurry enlargement of Myrtle's mother that floated ghostly on the wall. His wife was loud, lazy, good-looking yet awful. She proudly said her husband had photographed her 127 times since they married.",
              "simpZh": "他告诉我他是搞‘艺术行当’的，后来我才知道他是个摄影师，墙上那张梅特尔母亲的模糊放大照就是他弄的，像个鬼影似的飘在墙上。他老婆又吵又懒，长得漂亮却讨人嫌。她得意地说，结婚以来她老公给她拍了一百二十七次照片。"

            {
              "en": "Mrs. Wilson had changed her costume some time before and was now attired in an elaborate afternoon dress of cream colored <span class=\"vocab-trigger\" data-vocab=\"chiffon\">chiffon<\/span>, which gave out a continual rustle as she swept about the room. With the influence of the dress her personality had also undergone a change. The intense <span class=\"vocab-trigger\" data-vocab=\"vitality\">vitality<\/span> that had been so remarkable in the garage was converted into impressive <span class=\"vocab-trigger\" data-vocab=\"hauteur\">hauteur<\/span>. Her laughter, her gestures, her assertions became more violently affected moment by moment and as she expanded the room grew smaller around her until she seemed to be revolving on a noisy, creaking pivot through the smoky air.",
              "zh": "威尔逊太太早些时候换了衣服，现在穿着一件精致的奶油色雪纺下午裙，她满屋子扫荡时，裙子发出持续的沙沙声。受裙子影响，她的个性也变了。修车厂里那惊人的强烈活力转化成了令人印象深刻的傲慢。她的笑声、手势、主张变得越来越夸张做作，随着她膨胀起来，房间在她周围变得越来越小，直到她仿佛在烟雾缭绕的空气中绕着一个嘎吱作响的轴旋转。",
              "simpEn": "Myrtle had changed into a fancy cream-colored chiffon dress that rustled as she moved around. With that dress, her personality changed: the raw energy from the garage turned into impressive arrogance. Her laughter, gestures, and claims grew more and more theatrical, and as she expanded, the room seemed to shrink, so that she was like a noisy, creaking pivot turning in the smoky air.",
              "simpZh": "梅特尔早换了一身精致的奶油色雪纺裙子，走动起来沙沙直响。穿上这裙子，她人也不一样了：修车厂里那惊人的活力变成了十足的傲慢。她的笑声、动作、说话越来越做作夸张，人越来越膨胀，房间好像被挤小了，最后她就像在烟雾里绕着一个吱嘎作响的轴转。"
            },
            {
              "en": "‘My dear,’ she told her sister in a high mincing shout, ‘most of these fellas will cheat you every time. All they think of is money. I had a woman up here last week to look at my feet and when she gave me the bill you’d of thought she had my <span class=\"vocab-trigger\" data-vocab=\"appendicitus\">appendicitus<\/span> out.’ ‘What was the name of the woman?’ asked Mrs. McKee. ‘Mrs. Eberhardt. She goes around looking at people’s feet in their own homes.’ ‘I like your dress,’ remarked Mrs. McKee, ‘I think it’s adorable.’ Mrs. Wilson rejected the compliment by raising her eyebrow in <span class=\"vocab-trigger\" data-vocab=\"disdain\">disdain<\/span>. ‘It’s just a crazy old thing,’ she said. ‘I just slip it on sometimes when I don’t care what I look like.’",
              "zh": "‘亲爱的，’她对自己的妹妹用又高又装腔作势的喊声说道，‘这些男人十次有十次要骗你。他们只想着钱。上周我约了个女人来家里看我的脚，她给我账单时你能以为她给我做了阑尾切除。’‘那女人叫什么？’麦基太太问。‘埃伯哈特太太。她专门上门到别人家给人看脚。’‘我喜欢你的裙子，’麦基太太说，‘我觉得特别漂亮。’威尔逊太太轻蔑地扬起眉毛拒绝了这番恭维。‘只是件疯里疯气的旧玩意，’她说，‘我只是不在乎自己样子的时候随便往身上一套。’",
              "simpEn": "‘My dear,’ Myrtle shouted to her sister in a high, fake voice, ‘most men will cheat you every time. All they think about is money. I had a woman here last week to look at my feet, and her bill was so high you’d think she removed my appendix.’ ‘What was her name?’ asked Mrs. McKee. ‘Mrs. Eberhardt. She goes to people’s homes to check their feet.’ ‘I love your dress, it’s adorable,’ said Mrs. McKee. Myrtle raised an eyebrow in disdain. ‘It’s just a silly old thing,’ she said. ‘I just throw it on when I don't care how I look.’",
              "simpZh": "‘亲爱的，’梅特尔用又高又假的声音对她妹妹嚷道，‘这些男人个个骗你。他们就想着钱。上周我叫了个女人来家里看脚，她给我的账单高得像是给我割了盲肠。’‘那女人叫什么？’麦基太太问。‘埃伯哈特太太。她专门上门给人看脚。’‘我喜欢你的裙子，特别可爱，’麦基太太说。梅特尔扬起眉毛，一脸不屑。‘就是件疯旧的玩意儿，’她说，‘我有时候不在乎样子就随便往身上一套。’"
            },
            {
              "en": "But it looks wonderful on you, if you know what I mean,’ pursued Mrs. McKee. ‘If Chester could only get you in that pose I think he could make something of it.’ We all looked in silence at Mrs. Wilson who removed a strand of hair from over her eyes and looked back at us with a brilliant smile. Mr. McKee regarded her intently with his head on one side and then moved his hand back and forth slowly in front of his face. ‘I should change the light,’ he said after a moment. ‘I’d like to bring out the modelling of the features. And I’d try to get hold of all the back hair.’",
              "zh": "‘可你穿上就妙极了，你明白我的意思吧，’麦基太太继续说道，‘要是切斯特能让你摆那个姿势，我觉得他能拍出点名堂。’我们全都默默看着威尔逊太太，她把眼前的一绺头发拨开，灿烂地笑着回看我们。麦基先生歪着头专注地打量她，然后用手在脸前慢慢地来回比划着。‘我得调整一下光线，’他过了一会儿说，‘我想把面部的轮廓拍出来，而且会试着把后面的头发全拢起来。’",
              "simpEn": "‘But it looks wonderful on you,’ Mrs. McKee went on. ‘If Chester could capture you in that pose, I think he could make something of it.’ We all silently watched Myrtle, who brushed a strand of hair from her eyes and gave us a brilliant smile. Mr. McKee studied her, head tilted, moving his hand slowly in front of his face. ‘I should change the light,’ he said. ‘I want to bring out the facial structure. And I’d try to get all the hair back.’",
              "simpZh": "‘可你穿着好看极了，’麦基太太又说，‘要是我老公能让你摆那个姿势拍照，肯定能拍出点什么来。’我们都默默看着梅特尔，她把眼前一绺头发拨开，对我们灿烂地微笑。麦基先生侧着头仔细打量她，手在脸前慢慢比划。‘得调一下光线，’他过了会儿说，‘我想把五官的轮廓拍出来，还想把后面的头发都拢起来。’"
            },
            {
              "en": "Tom Buchanan yawned audibly and got to his feet. ‘You McKees have something to drink,’ he said. ‘Get some more ice and mineral water, Myrtle, before everybody goes to sleep.’ ‘I told that boy about the ice.’ Myrtle raised her eyebrows in despair at the <span class=\"vocab-trigger\" data-vocab=\"shiftlessness\">shiftlessness<\/span> of the lower orders. ‘These people! You have to keep after them all the time.’ She looked at me and laughed pointlessly. Then she flounced over to the dog, kissed it with ecstasy and swept into the kitchen, implying that a dozen chefs awaited her orders there.",
              "zh": "汤姆·布坎南大声打了个哈欠，站了起来。‘麦基两口子喝点什么吧，’他说，‘再去弄点冰和矿泉水，梅特尔，别让大家睡着了。’‘我早就跟那小子说过冰的事。’梅特尔扬起眉毛，对下层人的无能表示绝望。‘这些人！你非得时时刻刻盯着他们。’她看看我，毫无来由地笑了笑，然后转身扑向那只狗，心醉神迷地亲了亲，就神气活现地走进厨房，那架势仿佛里面有十几个厨师在听候她的吩咐。",
              "simpEn": "Tom yawned loudly and stood up. ‘You McKees have a drink,’ he said. ‘Get some more ice and mineral water, Myrtle, before everyone falls asleep.’ ‘I already told that boy about the ice.’ Myrtle raised her eyebrows in despair at the laziness of the lower class. ‘These people! You have to chase after them all the time.’ She laughed at me for no reason, then rushed to the dog, kissed it passionately, and swept into the kitchen as if a dozen chefs were waiting for her.",
              "simpZh": "汤姆大声打了个哈欠，站了起来。‘麦基两口子喝点吧，’他说，‘再去拿点冰和矿泉水，梅特尔，别让大家睡着了。’‘我早跟那小子说过冰的事。’梅特尔扬起眉毛，对下等人的懒散感到绝望。‘这些人！你得整天追着他们。’她看看我，没来由地笑了笑，然后扑向狗，使劲亲了亲，神气活现地走进厨房，好像里面有十几个厨师在等着她发话。"
            },
            {
              "en": "It was nine o’clock—almost immediately afterward I looked at my watch and found it was ten. Mr. McKee was asleep on a chair with his fists clenched in his lap, like a photograph of a man of action. Taking out my handkerchief I wiped from his cheek the remains of the spot of dried lather that had worried me all the afternoon. The little dog was sitting on the table looking with <span class=\"vocab-trigger\" data-vocab=\"blind\">blind<\/span> eyes through the smoke and from time to time groaning faintly. People disappeared, reappeared, made plans to go somewhere, and then lost each other, searched for each other, found each other a few feet away. Some time toward midnight Tom Buchanan and Mrs. Wilson stood face to face discussing in <span class=\"vocab-trigger\" data-vocab=\"impassioned\">impassioned<\/span> voices whether Mrs. Wilson had any right to mention Daisy’s name.",
              "zh": "九点钟了——可几乎紧接着我一看表发现已经十点。麦基先生睡在椅子上，双拳紧握在腿上，像一张行动男人的照片。我掏出手帕，把他脸颊上那点干了的肥皂沫擦掉，那污渍让我担心了一下午。小狗坐在桌上，透过烟雾睁着盲目的眼睛，不时轻轻地呻吟。人们消失、重现，计划着去哪，然后互相走散，再彼此寻找，最后在几英尺外找到对方。快到午夜时，汤姆·布坎南和威尔逊太太面对面站着，激烈地讨论着威尔逊太太有没有权利提到黛西的名字。",
              "simpEn": "It felt like nine, but soon I checked my watch and it was ten. Mr. McKee was asleep, fists clenched, like a photo of a man of action. I wiped the dried lather off his cheek, which had bothered me all afternoon. The little dog sat on the table, blind-looking in the smoke, occasionally groaning. People vanished, reappeared, made plans, got lost, and found each other nearby. Near midnight, Tom and Myrtle stood face to face arguing passionately about whether she had any right to mention Daisy's name.",
              "simpZh": "感觉才九点，可很快我看表已经十点。麦基先生在椅子上睡着了，拳头紧攥在腿上，活像一张行动男子的照片。我掏手帕把他脸上那块干肥皂沫擦掉，这印子烦了我一下午。小狗坐在桌上，在烟雾里盲眨着眼，偶尔轻轻哼哼。人们消失又出现，计划去哪儿，再互相走散，又互相找，最后在不远处找到。将近半夜时，汤姆和梅特尔面对面站着，激烈地争论着梅特尔有没有权利提黛西的名字。"
            },
            {
              "en": "‘Daisy! Daisy! Daisy!’ shouted Mrs. Wilson. ‘I’ll say it whenever I want to! Daisy! Dai——‘ Making a short deft movement Tom Buchanan broke her nose with his open hand. Then there were bloody towels upon the bathroom floor, and women’s voices scolding, and high over the confusion a long broken wail of pain. Mr. McKee awoke from his doze and started in a daze toward the door. When he had gone half way he turned around and stared at the scene—his wife and Catherine scolding and <span class=\"vocab-trigger\" data-vocab=\"consoling\">consoling<\/span> as they stumbled here and there among the crowded furniture with articles of aid, and the despairing figure on the couch bleeding fluently and trying to spread a copy of ‘Town Tattle’ over the tapestry scenes of <span class=\"vocab-trigger\" data-vocab=\"Versailles\">Versailles<\/span>. Then Mr. McKee turned and continued on out the door. Taking my hat from the chandelier I followed.",
              "zh": "‘黛西！黛西！黛西！’威尔逊太太叫道，‘我想什么时候说就什么时候说！黛西！黛——’汤姆·布坎南用张开的手果断地一记动作砸断了她的鼻子。接着浴室地板上出现了血淋淋的毛巾，女人们的斥骂声响起，混乱之上是一声长长的、断断续续的痛苦哀号。麦基先生从瞌睡中醒来，迷迷糊糊地朝门口走去。走到一半时，他回过头，盯着那景像——他妻子和凯瑟琳一边责骂一边安慰着，在拥挤的家具间跌跌撞撞，手里拿着救助物品，而沙发上的绝望身影血流不止，正试图把一本《Town Tattle》铺在凡尔赛花园的织锦画面上。然后麦基先生转身继续走出了门。我从吊灯上取下帽子，跟着他出去了。",
              "simpEn": "‘Daisy! Daisy! Daisy!’ Myrtle screamed. ‘I’ll say her name whenever I want! Daisy! Dai—’ With a quick, expert move Tom broke her nose with his open hand. Then bloody towels lay on the bathroom floor, women scolded, and above the chaos rose a long, broken wail of pain. Mr. McKee woke up in a daze and headed for the door. Halfway, he turned and stared: his wife and Catherine were stumbling about, scolding and comforting, while Myrtle bled on the couch, trying to cover the Versailles tapestry with a magazine. Then McKee left; I grabbed my hat from the chandelier and followed.",
              "simpZh": "‘黛西！黛西！黛西！’梅特尔尖叫，‘我随时想说就说！黛西！黛——’汤姆用一个快速利落的动作用手掌打断了她的鼻子。接着浴室地板上扔着血毛巾，女人们斥骂声一片，混乱之上传来一声长长的、断断续续的惨叫。麦基先生从瞌睡中惊醒，晕晕乎乎地向门口走去。走到一半他回头看着：他老婆和凯瑟琳跌跌撞撞，又骂又安慰，沙发上的梅特尔血流不止，正试图把一本杂志铺在凡尔赛织锦画面上。然后麦基转身走了；我从吊灯上摘下帽子跟了出去。"
            },
            {
              "en": "‘Come to lunch some day,’ he suggested, as we groaned down in the elevator. ‘Where?’ ‘Anywhere.’ ‘Keep your hands off the lever,’ snapped the elevator boy. ‘I beg your pardon,’ said Mr. McKee with dignity, ‘I didn’t know I was touching it.’ ‘All right,’ I agreed, ‘I’ll be glad to.’ … I was standing beside his bed and he was sitting up between the sheets, clad in his underwear, with a great portfolio in his hands. ‘Beauty and the Beast … Loneliness … Old Grocery Horse … Brook’n Bridge ….’ Then I was lying half asleep in the cold lower level of the Pennsylvania Station, staring at the morning ‘Tribune’ and waiting for the four o’clock train.",
              "zh": "‘哪天来吃午饭吧，’我们随着嘎吱作响的电梯下降时他建议道。‘哪儿？’‘随便哪儿。’‘把手从控制杆上拿开，’电梯男孩厉声说道。‘真抱歉，’麦基先生尊严十足地说，‘我不知道我碰着了。’‘好的，’我同意，‘我很乐意。’……我站在他的床边，他穿着内衣坐在被单中间，手里捧着一本巨大的作品集。‘美女与野兽……孤独……老杂货马……布鲁克林的桥……’然后我半睡半醒地躺在宾州车站寒冷的下层大厅里，盯着早晨的《论坛报》，等着四点钟的火车。",
              "simpEn": "‘Come to lunch some day,’ McKee said as we groaned down in the elevator. ‘Where?’ ‘Anywhere.’ ‘Keep your hands off the lever,’ the elevator boy snapped. ‘I beg your pardon,’ McKee said with dignity, ‘I didn’t know I was touching it.’ ‘All right,’ I said, ‘I’ll be glad to.’ … I was standing beside his bed; he was sitting up in his underwear, holding a big portfolio. ‘Beauty and the Beast … Loneliness … Old Grocery Horse … Brooklyn Bridge ….’ Then I was half asleep in the cold lower level of Penn Station, staring at the morning Tribune, waiting for the four o’clock train.",
              "simpZh": "‘哪天来吃午饭吧，’电梯嘎嘎下降时麦基说。‘哪儿？’‘随便哪儿。’‘手别碰操纵杆，’电梯男孩厉声道。‘对不起，’麦基庄重地说，‘我不知道我碰着了。’‘好的，’我说，‘我很乐意。’……我站在他床边，他穿着内衣坐在床单里，手里捧着个大作品集。‘美女与野兽……孤独……老杂货马……布鲁克林桥……’然后我半睡半醒地躺在宾州车站寒冷的下层，盯着早上的《论坛报》，等着四点的火车。"
            }
          ],
          "quiz": [

              "answer": true
            },

              "text": "The party ended peacefully and everyone went home sober.",
              "answer": false
            },
            {
              "text": "Nick took a cab home immediately after the violence.",
              "answer": false

          ]
        }
      ]

    {
      "id": 3,
      "title": "Chapter 3",
      "sections": [
        {
          "sectionId": 1,
          "heading": "The Gorgeous Parties",
          "paragraphs": [
            {
              "en": "There was music from my neighbor’s house through the summer nights. In his <span class=\"vocab-trigger\" data-vocab=\"blue gardens\">blue gardens<\/span> men and girls came and went like moths among the whisperings and the champagne and the stars. At high tide in the afternoon I watched his guests diving from the tower of his raft or taking the sun on the hot sand of his beach while his two motor-boats slit the waters of the Sound, drawing <span class=\"vocab-trigger\" data-vocab=\"aquaplanes\">aquaplanes<\/span> over <span class=\"vocab-trigger\" data-vocab=\"cataracts of foam\">cataracts of foam<\/span>. On week-ends his Rolls-Royce became an <span class=\"vocab-trigger\" data-vocab=\"omnibus\">omnibus<\/span>, bearing parties to and from the city, between nine in the morning and long past midnight, while his station wagon <span class=\"vocab-trigger\" data-vocab=\"scampered\">scampered<\/span> like a brisk yellow bug to meet all trains. And on Mondays eight servants including an extra gardener toiled all day with mops and scrubbing-brushes and hammers and garden-shears, repairing the <span class=\"vocab-trigger\" data-vocab=\"ravages\">ravages<\/span> of the night before.",
              "zh": "整个夏夜，我邻居的房子里都传来音乐声。在他蓝色的花园里，男男女女像飞蛾一般在低语、香槟和星光间来来往往。下午涨潮时，我看着他的客人们从筏子塔上跳水，或在他海滩滚烫的沙子上晒太阳，而他的两艘摩托艇划破海湾的水面，拖着滑水板越过层层飞沫。每到周末，他的劳斯莱斯便成了一辆公共汽车，从早上九点到午夜过后很久，往返于城里接送客人，而他的旅行车则像一只敏捷的黄色小虫，跑去迎接每一班火车。每逢星期一，八名仆人——包括一个额外雇来的园丁——用拖把、刷子、锤子和园艺剪辛劳一整天，来修复前一晚的破坏。",
              "simpEn": "All summer nights I heard music from my neighbor's house. In his blue gardens, men and women came and went like moths, with quiet talking, champagne, and stars. In the afternoon at high tide, guests dived from a raft tower or sunbathed on the hot sand. Two motor-boats cut through the water, pulling surfboards over foam. On weekends, his Rolls-Royce acted like a bus, carrying people to and from the city from 9 a.m. until after midnight, while his station wagon rushed to meet every train. On Mondays, eight servants worked all day to repair the damage from the night before.",
              "simpZh": "整个夏天夜晚，我都能听见邻居家传出音乐声。他蓝色的花园里，男男女女像飞蛾一样来来往往，伴随着窃窃私语、香槟和星星。下午涨潮时，客人们从筏子塔上跳水，或在热沙上晒太阳。两艘摩托艇在水中飞驰，拖着滑水板激起白色泡沫。周末，他的劳斯莱斯像公交车一样接送城里来的客人，从上午九点一直到午夜之后，而他的旅行车像只黄色的小虫子，急忙去接每一趟火车。到了星期一，八个仆人忙一整天，收拾前一晚留下的烂摊子。"
            },
            {
              "en": "Every Friday five crates of oranges and lemons arrived from a <span class=\"vocab-trigger\" data-vocab=\"fruiterer\">fruiterer<\/span> in New York—every Monday these same oranges and lemons left his back door in a pyramid of <span class=\"vocab-trigger\" data-vocab=\"pulpless halves\">pulpless halves<\/span>. There was a machine in the kitchen which could extract the juice of two hundred oranges in half an hour, if a little button was pressed two hundred times by a butler’s thumb.",
              "zh": "每个星期五，五箱橙子和柠檬从纽约的一个水果商那里运来——每个星期一，这些橙子和柠檬就变成一堆干瘪的半块从后门运走。厨房里有一台机器，半小时就能榨干两百个橙子的汁，只要一个男管家用拇指把一个小按钮按上两百次。",
              "simpEn": "Every Friday, five boxes of oranges and lemons came from a New York fruit seller. By Monday, the same fruit left the back door as a pile of empty halves. A kitchen machine could squeeze 200 oranges in 30 minutes if a servant pressed a button 200 times.",
              "simpZh": "每周五，五箱橙子和柠檬从纽约的水果商送来。到了周一，这些水果就变成了没有果肉的半块，从后门搬出。厨房里有台机器，只要佣人用拇指按两百下按钮，就能在半小时内榨完两百个橙子的汁。"
            },
            {
              "en": "At least once a fortnight a <span class=\"vocab-trigger\" data-vocab=\"corps of caterers\">corps of caterers<\/span> came down with several hundred feet of <span class=\"vocab-trigger\" data-vocab=\"canvas\">canvas<\/span> and enough colored lights to make a Christmas tree of Gatsby’s enormous garden. On buffet tables, <span class=\"vocab-trigger\" data-vocab=\"garnished\">garnished<\/span> with <span class=\"vocab-trigger\" data-vocab=\"glistening hors-d’oeuvre\">glistening hors-d’oeuvre<\/span>, spiced baked hams crowded against salads of <span class=\"vocab-trigger\" data-vocab=\"harlequin designs\">harlequin designs<\/span> and pastry pigs and turkeys bewitched to a dark gold. In the main hall a bar with a real brass rail was set up, and stocked with gins and liquors and with <span class=\"vocab-trigger\" data-vocab=\"cordials\">cordials<\/span> so long forgotten that most of his female guests were too young to know one from another.",
              "zh": "至少每两周就有一队餐饮承办商带着几百英尺的帆布和足够装点一棵圣诞树的彩灯下来，将盖茨比巨大的花园装点得如圣诞树般璀璨。自助餐桌上，闪闪发亮的开胃小菜旁，香料烤火腿与布满小丑图案的沙拉、糕点做成的小猪以及烤至暗金色的火鸡争相媲美。主厅里搭起了一个配真正铜制扶手的吧台，摆满了杜松子酒、烈酒，以及被遗忘太久的甜露酒，以至于多数女客太年轻，根本分辨不出它们的区别。",
              "simpEn": "Every two weeks, a team of caterers arrived with lots of canvas and colored lights to decorate Gatsby’s big garden like a Christmas tree. The tables held shiny snacks, baked hams, fancy salads, pig-shaped pastries, and turkeys cooked to a dark gold. In the main room, a bar with a real brass rail was set up with gin, liquor, and sweet liqueurs so old that the young women guests couldn't tell them apart.",
              "simpZh": "每两周都有餐饮服务队运来大量帆布和彩灯，把盖茨比的花园弄得像圣诞树一样。自助餐桌上摆着亮闪闪的开胃菜、香料烤火腿、有彩色图案的沙拉、小猪形状的糕点和烤成深金色的火鸡。大厅里搭了个带铜扶手的吧台，放着金酒、烈酒，还有年代久远的甜酒，来参加派对的年轻女客人根本分不清哪种是哪种。"
            },
            {
              "en": "By seven o’clock the orchestra has arrived—no thin five-piece affair but a whole <span class=\"vocab-trigger\" data-vocab=\"pitful\">pitful<\/span> of oboes and trombones and saxophones and viols and cornets and piccolos and low and high drums. The last swimmers have come in from the beach now and are dressing upstairs; the cars from New York are parked five deep in the drive, and already the halls and salons and verandas are <span class=\"vocab-trigger\" data-vocab=\"gaudy\">gaudy<\/span> with primary colors and hair shorn in strange new ways and shawls beyond the dreams of Castile. The bar is in full swing and floating rounds of cocktails <span class=\"vocab-trigger\" data-vocab=\"permeate\">permeate<\/span> the garden outside until the air is alive with chatter and laughter and casual <span class=\"vocab-trigger\" data-vocab=\"innuendo\">innuendo<\/span> and introductions forgotten on the spot and enthusiastic meetings between women who never knew each other’s names.",
              "zh": "七点不到，管弦乐队已经到了——不是那种寒碜的五人乐队，而是整整一乐池的双簧管、长号、萨克斯管、中提琴、短号、短笛以及高低音鼓。最后一批游泳的客人已经从海滩上来，正在楼上穿衣服；从纽约来的汽车在车道上停得水泄不通，排了五层，大厅、沙龙和游廊已经被原色、怪异的短发和超乎卡斯提尔梦境般的披肩装点得花哨俗气。吧台生意兴隆，浮动的鸡尾酒托盘飘入花园，直到空气中充满欢声笑语、随口的暗讽、转眼就忘的介绍，以及互不相识的女人们热情洋溢的相遇。",
              "simpEn": "By seven, a big orchestra arrived with many instruments—oboes, trombones, saxophones, violins, and many drums. The last swimmers were dressing upstairs. New York cars were parked very close, five deep. The rooms were very colorful with bright clothes, strange short haircuts, and fancy shawls. The bar was busy and floating trays of cocktails filled the garden, where people chatted, laughed, made casual jokes, forgot introductions, and met enthusiastically even without knowing names.",
              "simpZh": "七点前，来了一个大乐队，有很多乐器：双簧管、长号、萨克斯、提琴和各种鼓。最后一批游泳的人正在楼上换衣服。纽约来的车子停得很挤，里外五层。大厅和走廊里满是鲜艳的原色，奇怪的短发型和超出想象的披肩。吧台很热闹，端着鸡尾酒的托盘飘进花园，到处是说笑声、不经意的玩笑、转眼就忘的介绍，还有根本不认识对方的女人热情地打招呼。"

            {

              "zh": "随着地球转离太阳，灯光更加明亮，此刻乐队奏起黄色的鸡尾酒音乐，人声的歌剧也升了一个调。笑声越来越容易迸发，一分钟比一分钟更肆意挥洒，一句玩笑话就能泼出一大串。人群的变化更迅速，随着新来者膨胀，又在同一瞬间解散并重新组合——已经出现了游荡者，自信的姑娘们在更稳重的人群中穿来穿去，在某一刻成为一群人的中心，接着得意洋洋地在不断变幻的灯光下，滑过这面目、声音和色彩的海变。",
              "simpEn": "The lights got brighter as evening came. The orchestra played lively music and voices got louder. Laughter came easier, spilling freely with happy words. Groups changed quickly—some girls walked around confidently, became the center for a moment, then moved on through the changing crowd and colors.",
              "simpZh": "天黑了，灯光更亮了。乐队奏着欢快的鸡尾酒音乐，人们的说话声也高了起来。笑声变得轻松，一句开心话就惹得大家大笑。人群快速变换，自信的姑娘在较稳重的人群中穿梭，一下子成为焦点，又得意地穿过不停变化的面孔、声音和色彩向别处滑去。"

              "zh": "突然，这群吉普赛女郎中的一个，穿着闪烁蛋白色衣裳，从空中抓过一杯鸡尾酒，一饮而尽壮了胆，双手像跳弗里斯科舞似地舞动，独自跳上帆布舞台。片刻的寂静；乐队指挥讨好地为她变换节奏，然后一阵议论声爆发，误传她是吉尔达·格雷在《富丽秀》中的替补演员。派对这就开始了。",
              "simpEn": "Suddenly one of these wild girls in a shiny pale dress grabbed a cocktail, drank it for courage, and danced alone on the platform, moving her hands like a Frisco dancer. The crowd briefly became quiet, the band leader changed the beat for her, and people started chatting, wrongly thinking she was Gilda Gray's understudy from the Follies. Now the party had truly started.",
              "simpZh": "突然，一个穿着亮闪闪浅色衣服的狂野姑娘，从空中抓过鸡尾酒，喝下去壮胆，然后像跳弗里斯科舞那样比划着，一个人跳上了帆布舞台。人群静了一下，乐队领队讨好地为她改节奏，然后大家议论开来，错误地传言她是富丽秀剧团吉尔达·格雷的替补。派对正式开始了。"

            {

              "simpEn": "I think that on the first night I went to Gatsby's house, I was one of the few guests who were really invited. Most people were not invited—they just showed up. They took cars to Long Island and ended up at Gatsby's door. Someone who knew Gatsby introduced them, and then they acted like they were at an amusement park. Sometimes they never even met Gatsby, but their simple wish to party was enough to get in.",
              "simpZh": "我第一次去盖茨比家的时候，大概是少数真正被邀请的人。多数人根本没被请过——他们自己跑来。坐着车到长岛，莫名其妙就到了盖茨比家门口。由认识他的人介绍一下，然后就跟逛游乐园似的。有时候他们连盖茨比的面都没见到，心里那份想来玩的单纯劲儿就是入场券。"

              "zh": "我是真正被邀请的。那个星期六一早，一个穿着知更鸟蛋蓝制服的司机穿过我的草坪，送来一张出奇正式的便条，他的主人说，如果我肯赏光参加当晚他的“小派对”，那将完全是盖茨比的荣幸。他见过我几次，早就打算来拜访，只是一系列特殊的情况妨碍了他——落款是杰伊·盖茨比，笔迹气派恢宏。",

              "zh": "我穿上白色法兰绒裤，七点刚过就走过去，在他的草坪上拘束不安地在一群群我根本不认识的人中间周旋——虽然偶尔也会看到一两个在通勤火车上见过的面孔。我立刻注意到四下里散落着许多年轻的英国人；个个衣着考究，看起来都带点饥饿相，全都用低沉热切的嗓音对着结实富有的美国人说话。我可以肯定他们在推销什么：债券、保险，或是汽车。至少，他们痛苦地意识到这附近有的是容易到手的钱，并深信只需几句合适的措辞，那些钱就归他们了。",

              "simpEn": "The leader announced that at Gatsby's request they would play Vladimir Tostoff's latest work, which had caused a sensation at Carnegie Hall last May. He added with a grand, cheerful smile, 'Some sensation!', and everyone laughed.",
              "simpZh": "指挥宣布，应盖茨比先生要求，演奏弗拉基米尔·托斯托夫的最新作品，去年五月在卡内基音乐厅引起轰动。他得意地笑着说“真是个轰动！”，大家都笑了。"
            },
            {
              "en": "‘The piece is known,’ he concluded lustily, ‘as ‘Vladimir Tostoff’s Jazz History of the World.’ ’",
              "zh": "“这首曲子，”他兴致高昂地结束道，“就叫《弗拉基米尔·托斯托夫的爵士世界史》。”",
              "simpEn": "He finished loudly by saying the piece was called 'Vladimir Tostoff's Jazz History of the World.'",
              "simpZh": "他大声宣布作品名：弗拉基米尔·托斯托夫的爵士世界史。"
            },
            {
              "en": "The nature of Mr. Tostoff’s composition eluded me, because just as it began my eyes fell on Gatsby, standing alone on the marble steps and looking from one group to another with approving eyes. His tanned skin was drawn attractively tight on his face and his short hair looked as though it were trimmed every day. I could see nothing <span class=\"vocab-trigger\" data-vocab=\"sinister\">sinister<\/span> about him. I wondered if the fact that he was not drinking helped to set him off from his guests, for it seemed to me that he grew more correct as the fraternal hilarity increased. When the ‘Jazz History of the World’ was over girls were putting their heads on men’s shoulders in a puppyish, convivial way, girls were swooning backward playfully into men’s arms, even into groups knowing that some one would arrest their falls—but no one swooned backward on Gatsby and no French bob touched Gatsby’s shoulder and no singing quartets were formed with Gatsby’s head for one link.",
              "zh": "托斯托夫先生的乐曲究竟是什么模样，我无暇领会，因为音乐刚起，我的目光就落在盖茨比身上，他独自站在大理石台阶上，用赞赏的目光从一个群体扫向另一个群体。他那晒黑的皮肤紧致地贴在脸上，显得很英俊，短发仿佛每天修剪。我看不出他有任何邪气。我揣测，他不喝酒这一点是否使他与宾客们区别开来，因为在我看来，随着兄弟般的欢闹加剧，他反而越发得体起来。待到《爵士世界史》演奏完毕，姑娘们已经把头靠在男人的肩膀上，像小狗一样亲昵起来，姑娘们撒娇般向后倒进男人的怀里，甚至倒进人群中，知道总会有人接住她们——但没有一个人向后倒在盖茨比身上，没有法式短发碰到过盖茨比的肩膀，也没有四方合唱团是用盖茨比的脑袋连成一环的。",
              "simpEn": "I couldn't figure out Tostoff's music because just as it began, I noticed Gatsby standing alone on the steps, looking at different groups with approval. His skin was tan and tightly smooth, and his hair looked freshly cut every day. He didn't seem evil at all. I wondered if his not drinking separated him from the guests, as he seemed to become more proper while the party grew wilder. After the piece, girls were resting their heads on men's shoulders playfully, falling back into men's arms, sure someone would catch them—but nobody fell on Gatsby, nobody touched his shoulder, and no group formed a singing circle with him.",
              "simpZh": "我没弄清楚托斯托夫的音乐，因为演奏开始后，我看到盖茨比独自站在台阶上，用赞许的眼光看着一个个小团体。他晒黑的皮肤紧绷在脸上，短发像天天修剪似的。我看不出他有什么阴险之处。我在想，他不喝酒是不是让他和客人们不一样，因为随着大家越发亲密地胡闹，他反而越来越正经。等爵士世界史奏完，女孩子们已经亲昵地把头靠在男人肩上，撒娇地往后倒进人家怀里，甚至倒进人群，知道有人会接住——可没人倒在盖茨比怀里，没人的短发蹭到他肩头，也没有人组成合唱队拿他的脑袋当其中一环。"
            }

            {

            {
              "en": "She got up slowly, raising her eyebrows at me in astonishment, and followed the butler toward the house. I noticed that she wore her evening dress, all her dresses, like sports clothes—there was a jauntiness about her movements as if she had first learned to walk upon golf courses on clean, crisp mornings.",
              "zh": "她慢慢站起身，惊讶地对我扬了扬眉毛，就跟着管家朝屋子走去。我留意到，她穿晚礼服，乃至所有衣裳，都像是穿运动服一样——她的动作带着一种活泼潇洒，仿佛她最初是在干净清冽的早晨，于高尔夫球场上学走路似的。",
              "simpEn": "She got up slowly, giving me an astonished look, and followed the butler. She wore her evening dress like sports clothes—she moved with a light, springy step, as if she had learned to walk on golf courses on fresh, clear mornings.",

            {
              "en": "I was alone and it was almost two. For some time confused and intriguing sounds had issued from a long many-windowed room which overhung the terrace. Eluding Jordan’s undergraduate who was now engaged in an obstetrical conversation with two chorus girls, and who implored me to join him, I went inside.",
              "zh": "我独自一人，时间已近凌晨两点。从一间悬于露台上方、有着许多窗户的长房间里，已经有一阵子传出混乱而撩人的声响。我躲开乔丹的那个大学生——他此刻正同两个合唱团女孩滔滔不绝地谈着产科般的话题，还恳求我加入——径自走进了屋。",
              "simpEn": "Alone and at nearly two in the morning, I heard odd, intriguing sounds from a long room overhanging the terrace. I avoided Jordan's date, who was now talking loudly with two chorus girls about childbirth and begged me to join them, and I went inside.",
              "simpZh": "就剩我一个人，快两点了。一阵乱糟糟又诱人的声音从露台上方一间有很多窗户的长房间传来。我躲开乔丹的大学生男伴——他正和两个合唱团女孩大聊产科话题，还求我加入——自己走进了屋里。"

              "en": "The large room was full of people. One of the girls in yellow was playing the piano and beside her stood a tall, red haired young lady from a famous chorus, engaged in song. She had drunk a quantity of champagne and during the course of her song she had decided ineptly that everything was very very sad—she was not only singing, she was weeping too. Whenever there was a pause in the song she filled it with gasping broken sobs and then took up the lyric again in a quavering soprano. The tears coursed down her cheeks—not freely, however, for when they came into contact with her heavily beaded eyelashes they assumed an inky color, and pursued the rest of their way in slow black rivulets. A humorous suggestion was made that she sing the notes on her face whereupon she threw up her hands, sank into a chair and went off into a deep vinous sleep.",
              "zh": "那间大房间挤满了人。一个黄裙姑娘在弹钢琴，旁边站着一个高个子红发年轻女人，来自一个著名的合唱团，正唱着歌。她喝了不少香槟，唱歌过程中竟傻乎乎地认定一切都是非常非常悲伤的——她不仅在唱，还在哭泣。每当歌声一停，她便用抽抽搭搭的哽咽填满空隙，然后又用颤抖的女高音接着唱下去。泪水顺着她的脸颊流下来——却并不畅快，因为一碰到她那缀满珠子的睫毛，泪水便染上了墨色，顺着脸颊缓缓流淌出一条条黑色的细流。有人幽默地建议她不如把脸上的音符唱出来，她立刻双手一摊，倒进椅子，沉沉地醉睡过去了。",

              "simpZh": "大房间里挤满了人。一个黄衣服女孩在弹钢琴，旁边站着一个高个红发姑娘，是著名合唱团的成员，她一边唱一边哭。她喝了太多香槟，觉得一切都很悲哀。歌声一停她就抽泣，然后用颤抖的女高音接着唱。眼泪流下来，碰到她涂了浓密睫毛膏的眼睫毛就变成了黑色，顺着脸淌成黑道道。有人开玩笑让她把脸上的谱子唱出来，她把手一甩，倒在椅子上，醉睡过去。"

              "simpZh": "我环视周围，剩下的女人大多在跟说是丈夫的男人吵架。就连乔丹那拨东卵来的四人组也闹翻了。有个男的特别热情地和一个年轻女演员聊天，他老婆起先还想装得端庄无所谓地笑笑，后来彻底崩溃，搞起突袭，时不时像颗愤怒的钻石突然冒到他身旁，嘶声说“你答应过我的！”"

              "en": "Rather ashamed that on my first appearance I had stayed so late, I joined the last of Gatsby’s guests who were clustered around him. I wanted to explain that I’d hunted for him early in the evening and to apologize for not having known him in the garden.",

              "en": "Most of the time I worked. In the early morning the sun threw my shadow westward as I hurried down the white chasms of lower New York to the Probity Trust. I knew the other clerks and young bond-salesmen by their first names and lunched with them in dark crowded restaurants on little pig sausages and mashed potatoes and coffee. I even had a short affair with a girl who lived in Jersey City and worked in the accounting department, but her brother began throwing mean looks in my direction so when she went on her vacation in July I let it blow quietly away.",
              "zh": "大多数时间我都在工作。清晨，太阳把我的影子投向西方，我匆忙穿过纽约下城那些白色峡谷般的街道，去诚信信托公司上班。我同其他办事员和年轻的债券推销员互相直呼名字，和他们一起在昏暗拥挤的餐厅里吃午餐，吃的是小猪肉香肠、土豆泥、喝咖啡。我甚至和一个住在泽西城、在会计部工作的姑娘有过一段短暂的交往，但她哥哥开始朝我投来阴狠的目光，所以当她七月去度假时，我就让这事悄悄地无疾而终了。",
              "simpEn": "I worked most of the time. Early mornings, I hurried through the white streets of lower New York to the Probity Trust. I knew the other clerks and young bond salesmen by their first names, and we ate lunch together in dark, crowded restaurants: little pork sausages, mashed potatoes, coffee. I even had a brief romance with a girl from the accounting department who lived in Jersey City, but her brother started giving me nasty looks, so when she went on vacation in July, I let the relationship quietly end.",
              "simpZh": "我大多时候在工作。清晨，我赶去纽约下城的诚信信托公司，穿过像白色峡谷的街道。我和其他职员和年轻债券推销员彼此称呼名字，在拥挤昏暗的小饭馆吃午饭：小猪肉香肠、土豆泥、咖啡。我还和一个在会计部上班、住在泽西城的女孩短暂交往过，但她哥哥开始对我横眉竖眼，等她七月去度假时，我就让这事儿悄悄过去了。"
            },
            {
              "en": "I took dinner usually at the Yale Club—for some reason it was the gloomiest event of my day—and then I went upstairs to the library and studied investments and securities for a conscientious hour. There were generally a few rioters around but they never came into the library so it was a good place to work. After that, if the night was mellow I strolled down Madison Avenue past the old Murray Hill Hotel and over Thirty-third Street to the Pennsylvania Station.",
              "zh": "我通常在那鲁俱乐部吃晚饭——不知为何，那是我一天中最阴沉的事——然后便上楼去图书馆，认认真真地研读一个钟头的投资和证券。通常有几个闹腾的家伙在周围，但他们从不进图书馆，所以那里是工作的好地方。此后，如果夜色温和，我就沿着麦迪逊大道散步，经过旧日的默里山饭店，再越过三十三街，去宾夕法尼亚车站。",
              "simpEn": "I usually had dinner at the Yale Club—for some reason it was the most depressing part of my day—then I went upstairs to the library and studied investments for a careful hour. A few noisy people were usually around, but they never entered the library, so it was a good place to work. Afterwards, if the night was mild, I would walk down Madison Avenue past the old Murray Hill Hotel and across Thirty-third Street to Pennsylvania Station.",
              "simpZh": "我一般在那鲁俱乐部吃晚饭——不知怎的这是一天里最阴沉的事——然后上楼到图书馆，认认真真学一小时投资和证券。通常有几个闹哄哄的人在外面，但从不进图书馆，所以是个好工作的地方。之后，如果晚上天气温和，我就沿着麦迪逊大道散步，经过老默里山饭店，穿过三十三街到宾夕法尼亚车站。"
            },
            {
              "en": "I began to like New York, the racy, adventurous feel of it at night and the satisfaction that the constant flicker of men and women and machines gives to the <span class=\"vocab-trigger\" data-vocab=\"restless\">restless<\/span> eye. I liked to walk up Fifth Avenue and pick out romantic women from the crowd and imagine that in a few minutes I was going to enter into their lives, and no one would ever know or disapprove. Sometimes, in my mind, I followed them to their apartments on the corners of hidden streets, and they turned and smiled back at me before they faded through a door into warm darkness. At the enchanted metropolitan <span class=\"vocab-trigger\" data-vocab=\"twilight\">twilight<\/span> I felt a haunting loneliness sometimes, and felt it in others—poor young clerks who loitered in front of windows waiting until it was time for a <span class=\"vocab-trigger\" data-vocab=\"solitary\">solitary<\/span> restaurant dinner—young clerks in the dusk, wasting the most poignant moments of night and life.",
              "zh": "我开始喜欢上纽约了，喜欢它夜里那种奔放、冒险的感觉，以及那川流不息的男人、女人和机器给不安分的眼睛带来的满足。我喜欢沿着第五大道走，从人群里挑出一些浪漫的女人，想象几分钟后我就要走进她们的生活，而且无人知晓，也无人反对。有时，在脑海中，我跟随她们到藏在隐秘街角的公寓，她们在消失进一扇门、隐入温暖的黑暗之前，会转过身对我嫣然一笑。在这令人着迷的大都会暮色中，我有时感到一种难以排遣的孤寂，而且觉得别人身上也有同样的感受——那些可怜的小职员，在橱窗前徘徊，等着去独自一人吃晚餐的时刻到来——这些在黄昏中的年轻职员，正在虚掷夜晚和生命中最心酸难耐的时刻。",
              "simpEn": "I started to like New York—its exciting, adventurous feeling at night, and the satisfaction the constant movement of people and machines gave to my restless eyes. I liked to walk up Fifth Avenue and choose romantic-looking women from the crowd, imagining that soon I would enter their lives, and no one would ever know or mind. Sometimes I mentally followed them to their apartments on hidden street corners; they turned and smiled back at me before disappearing into warm darkness. In the magical city twilight, I sometimes felt a deep loneliness, and sensed it in others—poor young clerks lingering in front of windows, waiting until it was time for a lonely restaurant dinner—young clerks at dusk, wasting the most touching moments of night and life.",
              "simpZh": "我开始喜欢纽约了，喜欢它夜晚那活泼冒险的感觉，还有不停穿梭的男女和机器让不安分的眼睛感到满足。我喜欢沿第五大道走，从人群中挑出浪漫的女人，想象自己几分钟后就要进入她们的生活，而且没人知道、没人反对。有时我在脑海中跟着她们到隐秘街角的公寓，她们转身对我微笑，然后消失在温暖的黑暗中。在这迷人的都市黄昏里，我有时感到挥之不去的孤寂，也从别人身上感到——那些可怜的年轻职员，在橱窗前游荡，等着一人吃晚餐的时间——黄昏里的年轻职员，正浪费着夜晚和生命中最令人心酸的时刻。"
            },
            {
              "en": "Again at eight o’clock, when the dark lanes of the Forties were five deep with throbbing taxi cabs, bound for the theatre district, I felt a sinking in my heart. Forms leaned together in the taxis as they waited, and voices sang, and there was laughter from unheard jokes, and lighted cigarettes outlined unintelligible gestures inside. Imagining that I, too, was hurrying toward gayety and sharing their intimate excitement, I wished them well.",
              "zh": "再到八点钟，当四十几街那些黑暗的车道里挤满了五排颤动着驶向剧院区的出租马车时，我的心便往下一沉。车里，等着的乘客身影倚在一起，歌声飘出，还有听不见的笑话引出的笑声，点燃的香烟在暗处勾勒出难以理解的姿态。我想象自己也正奔向欢乐，分享着他们亲密无间的兴奋，于是在心里祝福他们。",
              "simpEn": "And at eight o'clock, when the dark streets of the Forties were filled five deep with throbbing taxi cabs heading for the theatre district, my heart sank. Inside the waiting cabs, forms leaned together, voices sang, laughter came from unheard jokes, and lit cigarettes traced unclear gestures. Imagining I too was hurrying toward fun and sharing their close excitement, I wished them well.",
              "simpZh": "再到八点，四十几街的暗巷里排了五排轰轰驶往剧院区的出租车时，我心里一沉。等着的车里，人们互相靠着，歌声传出，听不见的笑话惹出笑声，点着的香烟勾画出看不懂的手势。我想象自己也正赶着去找快乐，分享他们那种亲密的兴奋，于是默默祝他们好。"
            },
            {
              "en": "For a while I lost sight of Jordan Baker, and then in midsummer I found her again. At first I was flattered to go places with her because she was a golf champion and every one knew her name. Then it was something more. I wasn’t actually in love, but I felt a sort of tender curiosity. The bored haughty face that she turned to the world <span class=\"vocab-trigger\" data-vocab=\"concealed\">concealed<\/span> something—most affectations conceal something eventually, even though they don’t in the beginning—and one day I found what it was. When we were on a house-party together up in Warwick, she left a borrowed car out in the rain with the top down, and then lied about it—and suddenly I remembered the story about her that had eluded me that night at Daisy’s. At her first big golf tournament there was a <span class=\"vocab-trigger\" data-vocab=\"row\">row<\/span> that nearly reached the newspapers—a suggestion that she had moved her ball from a bad lie in the semi-final round. The thing approached the proportions of a scandal—then died away. A caddy retracted his statement and the only other witness admitted that he might have been mistaken. The incident and the name had remained together in my mind.",
              "zh": "有一阵子我没见到乔丹·贝克，然后在仲夏时我又找到了她。起初，能和她去各种地方让我觉得很有面子，因为她是高尔夫冠军，人人都知道她的名字。后来就不止如此了。我并非真的爱上了她，但怀有一种温柔的、好奇的感觉。她投向世界的那副厌倦、傲慢的面孔背后藏着什么——大多数装腔作势到头来都会藏些什么，尽管起初并不如此——有一天我发现了是什么。我们一起在沃里克参加乡间别墅派对时，她把一辆借来的汽车丢在雨里，敞着车篷，事后还为此撒了谎——我突然间想起那晚在黛西家，那个我回想不起来的关于她的传闻。在她第一次参加的大型高尔夫锦标赛上，发生了一场险些闹上报纸的争吵——有人暗示她在半决赛中从一个不好的落点移动了球。事情几乎发展成一桩丑闻——后来却不了了之。一个球童收回了他的说法，而唯一一位其他目击者也承认自己可能弄错了。这个事件和她的名字一同留在了我的脑子里。",
              "simpEn": "For a while I lost touch with Jordan Baker, then in midsummer I found her again. At first I was flattered to be seen with her because she was a famous golf champion. Then it became more. I wasn't really in love, but I felt a kind of gentle curiosity. Her bored, proud face hid something—most pretenses eventually hide something, even if not at first—and one day I discovered what it was. When we were at a house party in Warwick, she left a borrowed car out in the rain with the top down and then lied about it. Suddenly I remembered the story about her that I couldn't recall that night at Daisy's. At her first big golf tournament, there was a dispute that almost made the papers—someone suggested she had moved her ball from a bad position in the semi-final. It nearly became a scandal, then faded away. A caddy took back his statement, and the only other witness admitted he might have been mistaken. The incident and her name had stayed in my mind.",
              "simpZh": "有一阵子我没见到乔丹·贝克，后来仲夏又遇见了。起初和她一起出去很有面子，因为她是高尔夫冠军，大家都知道她名字。后来就不止如此了。我其实没爱上她，但有种温柔的好奇。她那副厌倦傲慢的面孔下面藏着什么——大多数装样子最后都会藏着点什么，尽管开始没有——一天我发现了。在沃里克参加乡下派对时，她把一辆借来的车敞着篷丢在雨里，还撒了谎。我忽然想起那晚在黛西家没想起来的关于她的传闻。她第一次参加大型高尔夫赛时，差点闹上报——有人说她在半决赛里从一个差的落球点移动了球。差点变成丑闻，后来平息了。一个球童收回了说法，唯一的另一个目击者承认可能看错了。这事件和她的名字就一起留在了我脑海里。"
            },
            {
              "en": "Jordan Baker instinctively avoided clever shrewd men and now I saw that this was because she felt safer on a plane where any divergence from a code would be thought impossible. She was incurably dishonest. She wasn’t able to endure being at a disadvantage, and given this unwillingness I suppose she had begun dealing in subterfuges when she was very young in order to keep that cool, insolent smile turned to the world and yet satisfy the demands of her hard jaunty body.",
              "zh": "乔丹·贝克本能地避开那些精明、敏锐的男人，如今我看出来了，这是因为她在一种平面上感到更安全——在这种平面上，任何背离规则的行为都会被认为是绝不可能的。她不可救药地不诚实。她无法忍受处于劣势，而鉴于这种不肯吃亏的秉性，我想她很小的时候就开始耍弄花招了，为的是能保持那面向世界的冷静、傲慢的微笑，同时又能满足她那结实而活泼的身体的需要。",
              "simpEn": "Jordan Baker instinctively avoided clever, sharp men, and now I saw it was because she felt safer where any breaking of the rules was thought impossible. She was incurably dishonest. She couldn't stand being at a disadvantage, and I suppose because of that, she had started using tricks when she was very young, in order to keep that cool, insolent smile on her face while still satisfying the demands of her tough, lively body.",
              "simpZh": "乔丹·贝克本能地避开那些精明厉害的男人，现在我明白了，她是在一个规矩不可能被打破的地方才觉得安全。她就是不诚实，没得救。她受不了吃亏，估计从小就开始耍手段，这样才能保持那副冷静傲慢的笑脸，同时满足她那结实活跃的身体的需求。"
            },
            {
              "en": "It made no difference to me. Dishonesty in a woman is a thing you never blame deeply—I was casually sorry, and then I forgot. It was on that same house party that we had a <span class=\"vocab-trigger\" data-vocab=\"curious\">curious<\/span> conversation about driving a car. It started because she passed so close to some workmen that our fender flicked a button on one man’s coat.",
              "zh": "这对我来说无关紧要。女人不诚实，是你从不会太认真去责备的事——我随意地感到惋惜，随后也就忘了。就在那次同一个乡间派对上，我们有过一段关于开车的有趣对话。事情起因是她从一些工人身边经过时，贴得太近，我们的挡泥板把一个工人外套上的扣子给蹭掉了。",
              "simpEn": "It didn't matter to me. Dishonesty in a woman is something you never deeply blame—I was casually sorry, then forgot. At that same house party, we had a strange talk about driving. It started because she drove so close to some workmen that our fender flicked a button off one man's coat.",
              "simpZh": "这对我来说没区别。女人不诚实，你从不会太较真去责怪——我随便惋惜了一下，就忘了。还是那次乡下派对，我们有了一次关于开车的古怪谈话。起因是她开车贴工人太近，挡泥板把一个工人外套上的扣子蹭掉了。"
            },
            {
              "en": "‘You’re a rotten driver,’ I protested. ‘Either you ought to be more careful or you oughtn’t to drive at all.’",
              "zh": "“你开车真够呛，”我抗议道，“要么你该更小心些，要么你就根本不该开车。”",
              "simpEn": "I told her she was a terrible driver and should be more careful or not drive at all.",
              "simpZh": "我抗议说她车技太烂，要么小心点，要么别开。"
            },
            {
              "en": "‘I am careful.’",
              "zh": "“我很小心的。”",
              "simpEn": "She said she was careful.",
              "simpZh": "她说自己很小心。"
            },
            {
              "en": "‘No, you’re not.’",
              "zh": "“不，你不小心。”",
              "simpEn": "I said no, she wasn't.",
              "simpZh": "我说不是。"
            },
            {
              "en": "‘Well, other people are,’ she said lightly.",
              "zh": "“嗯，可别人小心呀。”她轻描淡写地说。",
              "simpEn": "She said lightly that other people were careful.",
              "simpZh": "她轻松地说，可别人小心啊。"
            },
            {
              "en": "‘What’s that got to do with it?’",
              "zh": "“那跟这有什么关系？”",
              "simpEn": "I asked what that had to do with it.",
              "simpZh": "我问那有什么关系。"
            },
            {
              "en": "‘They’ll keep out of my way,’ she insisted. ‘It takes two to make an accident.’",
              "zh": "“他们会躲开我的，”她坚持道，“出事故需要两个人。”",
              "simpEn": "She insisted other people would get out of her way, because an accident takes two.",
              "simpZh": "她坚持说别人会给她让路，出事故得两个人才行。"
            },
            {
              "en": "‘Suppose you met somebody just as careless as yourself.’",
              "zh": "“假如你碰上个跟你一样不小心的呢？”",
              "simpEn": "I asked what if she met someone just as careless.",
              "simpZh": "我问要是碰上跟她一样不小心的呢。"
            },
            {
              "en": "‘I hope I never will,’ she answered. ‘I hate careless people. That’s why I like you.’",
              "zh": "“我希望我永远别碰上，”她答道，“我讨厌粗心大意的人。所以我喜欢你。”",
              "simpEn": "She hoped she never would, because she hated careless people. That's why she liked me.",
              "simpZh": "她希望永远别碰上，她讨厌粗心的人。所以她喜欢我。"
            },
            {
              "en": "Her grey, sun-strained eyes stared straight ahead, but she had deliberately shifted our relations, and for a moment I thought I loved her. But I am slow-thinking and full of interior rules that act as brakes on my desires, and I knew that first I had to get myself definitely out of that tangle back home. I’d been writing letters once a week and signing them: ‘Love, Nick,’ and all I could think of was how, when that certain girl played tennis, a faint mustache of perspiration appeared on her upper lip. Nevertheless there was a vague understanding that had to be tactfully broken off before I was free.",
              "zh": "她那被阳光灼伤的灰色眼睛直直地盯着前方，但她已刻意改变了我们之间的关系，一时间我以为自己爱上了她。可我是个思维缓慢、内里装满清规戒律的人，这些规矩像刹车一样制约着我的欲望，而我知道首先我得把自己从家乡的那团乱麻里彻底解脱出来。我一直每周写一封信，署名都是“爱你的，尼克”，而我能想起来的，只是那个姑娘打网球时，上唇会沁出一抹淡淡的汗须。不管怎样，是有个模糊的默契需要我巧妙地断开，我才能真正自由。",
              "simpEn": "Her grey, sun-strained eyes stared ahead, but she had purposely shifted our relationship, and for a moment I thought I loved her. But I'm slow-thinking, full of internal rules that brake my desires, and I knew I first had to free myself from the mess back home. I'd been writing letters once a week, signing them 'Love, Nick,' and all I could think about was how, when that girl played tennis, a faint moustache of sweat appeared on her upper lip. Still, there was a vague understanding that had to be tactfully ended before I was free.",
              "simpZh": "她那双被太阳晒得发灰的眼睛直盯着前方，但她已经故意把我们的关系推了一步，一瞬间我以为自己爱上了她。但我这个人想得慢，心里有很多条条框框像刹车一样管着我的欲望，我知道先得把老家的那摊子事彻底了结。我每周写一封信，署名“爱你的，尼克”，可我满脑子只想着那个女孩打网球时上唇会沁出一层细汗珠。不过，确实有个含糊的约定需要委婉地断了，我才能真正自由。"
            },
            {
              "en": "Every one suspects himself of at least one of the cardinal virtues, and this is mine: I am one of the few honest people that I have ever known.",
              "zh": "每个人都觉得自己至少拥有一种基本美德，而我的正是：我是我有生以来认识的为数不多的诚实的人之一。",
              "simpEn": "Everyone believes they have at least one of the main virtues, and this is mine: I am one of the few honest people I have ever known.",
              "simpZh": "每个人都觉得自己至少有一种基本美德，我的就是：我是我认识的人中少有的几个诚实的人之一。"

          "heading": "The Summer Guests",
          "paragraphs": [
            {
              "en": "On Sunday morning while church bells rang in the villages along shore the world and its <span class=\"vocab-trigger\" data-vocab=\"mistress\">mistress<\/span> returned to Gatsby's house and twinkled <span class=\"vocab-trigger\" data-vocab=\"hilariously\">hilariously<\/span> on his lawn.",
              "zh": "星期天早上，岸边的村庄里教堂钟声响起，花花世界连同它的姘头都回到盖茨比的宅邸，在他的草坪上明晃晃地寻欢作乐。",
              "simpEn": "On Sunday morning, with church bells ringing along the shore, the rich and fashionable people came back to Gatsby's house and partied noisily on his lawn.",
              "simpZh": "星期天早上，岸边教堂敲钟，那些有钱时髦的人又回到盖茨比家，在草坪上闹哄哄地玩乐。"

            {
              "en": "One October day in nineteen-seventeen—— (said Jordan Baker that afternoon, sitting up very straight on a straight chair in the tea-garden at the Plaza Hotel) —I was walking along from one place to another half on the sidewalks and half on the lawns. I was happier on the lawns because I had on shoes from England with rubber <span class=\"vocab-trigger\" data-vocab=\"nobs\">nobs<\/span> on the soles that bit into the soft ground. I had on a new <span class=\"vocab-trigger\" data-vocab=\"plaid\">plaid<\/span> skirt also that blew a little in the wind and whenever this happened the red, white and blue banners in front of all the houses stretched out stiff and said TUT-TUT-TUT-TUT in a disapproving way.",

              "en": "She was the first ‘nice’ girl he had ever known. In various unrevealed capacities he had come in contact with such people but always with <span class=\"vocab-trigger\" data-vocab=\"indiscernible barbed wire\">indiscernible barbed wire<\/span> between. He found her excitingly desirable. He went to her house, at first with other officers from Camp Taylor, then alone. It amazed him—he had never been in such a beautiful house before. But what gave it an air of <span class=\"vocab-trigger\" data-vocab=\"breathless intensity\">breathless intensity<\/span> was that Daisy lived there—it was as casual a thing to her as his tent out at camp was to him. There was a <span class=\"vocab-trigger\" data-vocab=\"ripe mystery\">ripe mystery<\/span> about it, a hint of bedrooms upstairs more beautiful and cool than other bedrooms, of gay and <span class=\"vocab-trigger\" data-vocab=\"radiant\">radiant<\/span> activities taking place through its corridors and of romances that were not musty and laid away already in lavender but fresh and breathing and <span class=\"vocab-trigger\" data-vocab=\"redolent\">redolent<\/span> of this year’s shining motor cars and of dances whose flowers were <span class=\"vocab-trigger\" data-vocab=\"scarcely withered\">scarcely withered<\/span>. It excited him too that many men had already loved Daisy—it increased her value in his eyes. He felt their presence all about the house, <span class=\"vocab-trigger\" data-vocab=\"pervading\">pervading<\/span> the air with the shades and echoes of still <span class=\"vocab-trigger\" data-vocab=\"vibrant emotions\">vibrant emotions<\/span>.",
              "zh": "她是他认识的第一个“好人家”女孩。他以各种未公开的身份与这类人有过接触，但中间总隔着一层看不见的铁丝网。他觉得她有一种令人激动的魅力。他到她家去，起初是跟泰勒营的其他军官一起，后来就独自去了。这让他大吃一惊——他从没进过这么漂亮的房子。但使它带有一种让人屏息的紧张气氛的，是黛西住在里面——这对她来说就像他的营帐对于他一样平常。这房子有一种成熟的秘密味道，暗示着楼上的卧室比其他卧室更美丽更凉爽，走廊里进行着快乐而灿烂的活动，还有那些并非发霉而是早已被薰衣草收藏起来的罗曼史，而是新鲜、有生命力、散发着今年闪亮汽车和舞会气味的罗曼史，那些舞会上的花还几乎没有枯萎。许多男人已经爱过黛西这件事也让他兴奋——这更增加了她在眼中的价值。他感觉到他们在房子里的存在，让空气中弥漫着仍然活跃的激情的影子和回音。",
              "simpEn": "Daisy was the first rich, proper girl he knew. He had met people like her before, but there was always an invisible barrier. He found her very desirable. He visited her house, first with other soldiers, then alone. The beautiful house amazed him. But what made it exciting was that Daisy lived there so easily, like his tent was to him. The house had a deep sense of mystery, with suggestions of even nicer rooms upstairs and happy, bright activities. It smelled of new cars and recent parties. He also liked that many men had loved her, which made her seem more valuable. He felt their feelings still in the air.",
              "simpZh": "黛西是他认识的第一个有钱的好女孩。他以前也遇到过这类人，可总有看不见的隔阂。他觉得她非常吸引人。他去了她家，起初和别的军官一起，后来一个人去。那漂亮的房子让他很吃惊。但让房子有股紧张感的是，黛西住在里面就像他住帐篷一样平常。房子有种很深的神秘感，楼上好像有更好看更凉爽的卧室，走廊里好像有快乐明亮的活动。房子里有新汽车和刚刚开过的舞会的气味。他也很兴奋，因为很多男人爱过她，这让黛西在他眼里更值钱了。他感觉那些人的感情还在空气里飘着。"

            {
              "en": "But he knew that he was in Daisy’s house by a <span class=\"vocab-trigger\" data-vocab=\"colossal accident\">colossal accident<\/span>. However glorious might be his future as Jay Gatsby, he was at present a <span class=\"vocab-trigger\" data-vocab=\"penniless\">penniless<\/span> young man without a past, and at any moment the <span class=\"vocab-trigger\" data-vocab=\"invisible cloak\">invisible cloak<\/span> of his uniform might slip from his shoulders. So he made the most of his time. He took what he could get, <span class=\"vocab-trigger\" data-vocab=\"ravenously\">ravenously<\/span> and <span class=\"vocab-trigger\" data-vocab=\"unscrupulously\">unscrupulously<\/span>—eventually he took Daisy one still October night, took her because he had no real right to touch her hand.",
              "zh": "但他知道自己进黛西的家全凭一场巨大的意外。无论作为杰伊·盖茨比的未来多么辉煌，此刻他不过是个没有过去的穷光蛋，而且随时可能卸下他那套军服的无形斗篷。于是他抓紧时间。他贪婪而不择手段地攫取他能得到的一切——终于在一个寂静的十月之夜，他占有了黛西，他占有她，因为他并没有真正的权利去碰她的手。",
              "simpEn": "He knew he was in Daisy's house only by a huge accident. Even if his future as Gatsby was bright, right then he was a poor young man with no background. His uniform gave him a temporary cover that could disappear anytime. So he used his time well. He took whatever he could, selfishly and without morals. Finally, one quiet October night, he slept with Daisy, because he had no real right to even touch her hand.",
              "simpZh": "他知道自己能进黛西家完全是个大意外。就算他将来当盖茨比很风光，那时候他还是个没钱的年轻人，没有背景。他的军装像一件看不见的披风，随时会滑下来。所以他就抓紧时间。他贪心地、不择手段地拿到他能拿的一切。最后，在一个安静的十月晚上，他和黛西发生了关系，因为他连碰她手的权利都没有。"
            },
            {
              "en": "He might have despised himself, for he had certainly taken her under <span class=\"vocab-trigger\" data-vocab=\"false pretenses\">false pretenses<\/span>. I don’t mean that he had traded on his <span class=\"vocab-trigger\" data-vocab=\"phantom millions\">phantom millions<\/span>, but he had deliberately given Daisy a sense of security; he let her believe that he was a person from much the same <span class=\"vocab-trigger\" data-vocab=\"stratum\">stratum<\/span> as herself—that he was fully able to take care of her. As a matter of fact he had no such <span class=\"vocab-trigger\" data-vocab=\"facilities\">facilities<\/span>—he had no comfortable family standing behind him and he was liable at the <span class=\"vocab-trigger\" data-vocab=\"whim\">whim<\/span> of an impersonal government to be blown anywhere about the world.",
              "zh": "他本来也许会鄙视自己，因为他确实是用假象骗取了黛西。我不是说他利用他那虚幻的百万财富去交换，而是他有意让黛西产生一种安全感；他让她相信他是跟她来自差不多同一个阶层的人——完全有能力照顾她。事实上他根本没有这样的条件——他没有殷实的家庭背景，而且随时可能因为一个冷漠的政府的一时起意，被抛到世界任何角落。",

              "simpZh": "他可能会讨厌自己，因为他骗了黛西。他不是用假钱，而是让她觉得安心。他让她以为他们门当户对，他能照顾她。实际上他没有这些条件——没有有钱的家，军队随时可能把他派到世界任何地方。"
            },
            {
              "en": "But he didn’t despise himself and it didn’t turn out as he had imagined. He had intended, probably, to take what he could and go—but now he found that he had committed himself to the following of a <span class=\"vocab-trigger\" data-vocab=\"grail\">grail<\/span>. He knew that Daisy was extraordinary but he didn’t realize just how extraordinary a ‘nice’ girl could be. She vanished into her rich house, into her rich, full life, leaving Gatsby—nothing. He felt married to her, that was all.",
              "zh": "但他并没有鄙视自己，事情的结果也和他设想的不一样。他或许本打算拿走能得到的东西就走——可现在却发现，自己已经献身于追求一个圣杯。他知道黛西不同凡响，但他没料到一个“好人家”女孩能不同凡响到这种地步。她消失在她那富丽堂皇的房子里，消失在她那丰富美满的生活里，只留给盖茨比——一无所有。他觉得自己跟她已经结了婚，仅此而已。",
              "simpEn": "But he didn't hate himself, and things didn't happen as he planned. He probably meant to take what he could and leave, but now he found himself chasing a holy goal. He knew Daisy was special, but he didn't realize how special a rich girl could be. She went back into her wealthy life and left Gatsby with nothing. He felt like he was already married to her.",
              "simpZh": "但他没讨厌自己，事情也没像他想的那样。他本来打算拿到好处就走，可现在他发现自己像在追求一个圣杯。他知道黛西特别，但没料到有钱的女孩能这么特别。她回到她那富贵的房子和充实的生活里，留给盖茨比什么都没有。他觉得他们已经结婚了，就这样。"
            },
            {
              "en": "When they met again two days later it was Gatsby who was breathless, who was somehow betrayed. Her porch was bright with the bought luxury of <span class=\"vocab-trigger\" data-vocab=\"star-shine\">star-shine<\/span>; the <span class=\"vocab-trigger\" data-vocab=\"wicker\">wicker<\/span> of the <span class=\"vocab-trigger\" data-vocab=\"settee\">settee<\/span> squeaked fashionably as she turned toward him and he kissed her curious and lovely mouth. She had caught a cold and it made her voice huskier and more charming than ever and Gatsby was <span class=\"vocab-trigger\" data-vocab=\"overwhelmingly aware\">overwhelmingly aware<\/span> of the youth and mystery that wealth imprisons and preserves, of the freshness of many clothes and of Daisy, gleaming like silver, safe and proud above the hot struggles of the poor.",
              "zh": "两天后他们重逢时，喘不过气来的却是盖茨比，感觉被背叛的也是他。她家的门廊在买来的星光般奢侈的灯光下亮晃晃的；当她转向他、他吻上她奇妙可爱的嘴唇时，长椅的藤条时髦地吱嘎作响。她着了凉，嗓音比以往更沙哑迷人，盖茨比强烈地意识到财富所禁锢和保存的青春与神秘，意识到许多衣服的清新，以及黛西，像银子一样闪光，安然又骄傲地凌驾于穷人的苦苦挣扎之上。",
              "simpEn": "Two days later, when they met again, Gatsby was the one out of breath and felt betrayed. Her porch was brightly lit like bought starshine. The wicker seat made a fashionable sound as she turned and he kissed her. She had a cold, making her voice even more charming. Gatsby deeply felt how money keeps youth and mystery, how fresh her clothes were, and how Daisy seemed shiny and safe above the struggles of the poor.",
              "simpZh": "两天后又见面时，盖茨比却喘不过气来，好像被骗了。她家门廊被买来的星光照得很亮。她转身时，藤椅时髦地吱嘎响，他就吻了她奇怪又可爱的嘴唇。她感冒了，声音更沙哑更迷人。盖茨比强烈地感到，财富把青春和神秘关起来并保存好，衣服那么新，黛西像银子一样闪光，安全又骄傲，高高在穷人的挣扎上面。"

            {
              "en": "‘I can’t describe to you how surprised I was to find out I loved her, old sport. I even hoped for a while that she’d throw me over, but she didn’t, because she was in love with me too. She thought I knew a lot because I knew different things from her…. Well, there I was, way off my ambitions, getting deeper in love every minute, and all of a sudden I didn’t care. What was the use of doing great things if I could have a better time telling her what I was going to do?’",
              "zh": "“我无法向你形容我发现自己爱上她时有多惊讶，老兄。我甚至一度希望她会甩掉我，但她没有，因为她也爱着我。她以为我懂得很多，因为我知道的东西跟她不一样……唉，我那时早已远离了我的雄心壮志，每分钟都陷得更深，突然我就不在乎了。如果我告诉她我打算做什么更让我开心，那做那些了不起的事又有什么意思呢？”",

              "simpZh": "“我没办法告诉你，我发现我爱上她时有多吃惊，老兄。我甚至还希望她甩了我，可是她没有，因为她也爱我。她以为我懂得多，因为我懂的东西和她不一样。那时候我早就离我的大志很远了，每分钟都爱得更深，突然我就不在乎了。如果我把自己要做的事告诉她更开心，那做大事又有什么用呢？”"

            {
              "en": "On the last afternoon before he went abroad he sat with Daisy in his arms for a long, silent time. It was a cold fall day with fire in the room and her cheeks flushed. Now and then she moved and he changed his arm a little and once he kissed her dark shining hair. The afternoon had made them <span class=\"vocab-trigger\" data-vocab=\"tranquil\">tranquil<\/span> for a while as if to give them a deep memory for the long parting the next day promised. They had never been closer in their month of love nor communicated more <span class=\"vocab-trigger\" data-vocab=\"profoundly\">profoundly<\/span> one with another than when she brushed silent lips against his coat’s shoulder or when he touched the end of her fingers, gently, as though she were asleep.",
              "zh": "出国前的最后一个下午，他把黛西搂在怀里，默默地坐了很久。那是一个寒冷的秋日，房间里生着火，她的面颊红红的。她不时动一下，他便稍微换一换手臂，有一次他吻了吻她那深色闪亮的头发。那个下午让他们平静了一会儿，仿佛是为第二天漫长的离别留下一个深刻的记忆。在他们相爱的一个月里，他们从未比她用无声的嘴唇轻触他外套肩膀，或者他轻触她指尖，像她睡着了一样温柔时，更亲近，交流得更深刻。",
              "simpEn": "On his last afternoon before going overseas, he held Daisy for a long, quiet time. It was a cold autumn day, with a fire in the room and her cheeks red. Sometimes she moved, and he moved his arm. Once he kissed her dark, shiny hair. That afternoon made them calm, as if to give them a strong memory for the long goodbye the next day. They were never closer than when her silent lips touched his coat or when he gently touched her fingers as if she were sleeping.",
              "simpZh": "他出国前最后一个下午，抱着黛西坐了很久，很安静。天冷，房里有火，她的脸红红的。她偶尔动一动，他就换个手臂姿势，还亲过她黑亮的头发。那个下午让他们平静了一会儿，好像为了给明天久久的分别留个深深的记忆。他们相爱一个月里，从没有比她用沉默的嘴唇碰他外套肩膀，或者他轻轻碰她指尖，像她睡着了那样，更亲近，更没有隔阂。"

          "paragraphs": [
            {
              "en": "He did extraordinarily well in the war. He was a captain before he went to the front and following the Argonne battles he got his majority and the command of the <span class=\"vocab-trigger\" data-vocab=\"divisional machine guns\">divisional machine guns<\/span>. After the <span class=\"vocab-trigger\" data-vocab=\"Armistice\">Armistice<\/span> he tried <span class=\"vocab-trigger\" data-vocab=\"frantically\">frantically<\/span> to get home but some <span class=\"vocab-trigger\" data-vocab=\"complication\">complication<\/span> or <span class=\"vocab-trigger\" data-vocab=\"misunderstanding\">misunderstanding<\/span> sent him to Oxford instead. He was worried now—there was a quality of <span class=\"vocab-trigger\" data-vocab=\"nervous despair\">nervous despair<\/span> in Daisy’s letters. She didn’t see why he couldn’t come. She was feeling the pressure of the world outside and she wanted to see him and feel his presence beside her and be <span class=\"vocab-trigger\" data-vocab=\"reassured\">reassured<\/span> that she was doing the right thing after all.",
              "zh": "他在战争中表现得格外出色。上前线之前他已是上尉，经历了阿尔贡战役之后他晋升为少校，并受命指挥师属机关枪队。停战之后，他发疯似的想方设法回家，可是某种复杂情形或误会却把他送去了牛津。这时他担心起来——黛西的信中有一种神经质的绝望。她不明白他为什么不能回来。她感受到外部世界的压力，想见到他，感觉他在身边，好让自己安心，确信自己终究做得对。",

              "simpZh": "他在战争中表现特别好。他是上尉，在阿尔贡战役后升为少校，负责指挥机枪部队。停战后，他拼命想回家，但一个复杂的误会把他送去了牛津。他很担心，因为黛西的信里有种神经质的绝望。她不明白他为什么不能回来。她感到外面的世界给她压力，她想见到他，有他在身边，才能安心，觉得自己没做错。"

            {

              "simpEn": "Daisy was young, and her fake world smelled of orchids, with happy snobbishness and music that set the year's rhythm. The music summed up life's sadness and hidden meanings. All night, saxophones played the sad 'Beale Street Blues' while many fancy slippers danced on the shiny floor. In the late afternoons, some rooms kept pulsing with this sweet, low excitement, and young faces drifted around like flower petals blown by sad horns.",

            {

          "paragraphs": [
            {
              "en": "It was dawn now on Long Island and we went about opening the rest of the windows downstairs, filling the house with grey turning, gold turning light. The shadow of a tree fell <span class=\"vocab-trigger\" data-vocab=\"abruptly\">abruptly<\/span> across the dew and <span class=\"vocab-trigger\" data-vocab=\"ghostly birds\">ghostly birds<\/span> began to sing among the <span class=\"vocab-trigger\" data-vocab=\"blue leaves\">blue leaves<\/span>. There was a slow pleasant movement in the air, <span class=\"vocab-trigger\" data-vocab=\"scarcely a wind\">scarcely a wind<\/span>, promising a cool lovely day.",
              "zh": "此时长岛已破晓，我们走过去把楼下的窗户都打开，让屋里灌满由灰转金的光线。一棵树的影子突然落在露水上，幽灵般的鸟儿开始在蓝色的树叶间歌唱。空气中有一种缓慢宜人的流动，几乎没有风，预示着即将迎来一个凉爽可爱的日子。",

              "simpZh": "长岛天亮了。我们把楼下的窗户都打开，光线从灰变成金。树影突然落在露水上，幽灵一样的鸟在蓝叶子里开始唱歌。空气慢慢地轻轻流动，几乎没有风，预告今天是个凉快的好天。"
            },
            {
              "en": "‘I don’t think she ever loved him.’ Gatsby turned around from a window and looked at me <span class=\"vocab-trigger\" data-vocab=\"challengingly\">challengingly<\/span>. ‘You must remember, old sport, she was very excited this afternoon. He told her those things in a way that frightened her—that made it look as if I was some kind of <span class=\"vocab-trigger\" data-vocab=\"cheap sharper\">cheap sharper<\/span>. And the result was she hardly knew what she was saying.’",
              "zh": "“我觉得她从来没有爱过他。”盖茨比从一扇窗前转过身，用挑衅的目光看着我。“你一定得记住，老兄，她今天下午非常激动。他把那些话说得吓坏了她——弄得我好像是个廉价的骗子。结果她几乎不知道自己在说什么。”",
              "simpEn": "‘I don't think she ever loved him,’ Gatsby said, turning from the window with a challenging look. ‘Remember, she was very upset this afternoon. Tom said things that scared her, making me look like a cheap trickster. So she hardly knew what she was saying.’",
              "simpZh": "“我觉得她从没爱过他，”盖茨比从窗边转身，用挑衅的眼光看我。“你记住，她下午太激动了。汤姆说那些话把她吓到了，弄得我像个廉价骗子。所以她几乎不知道自己在说什么。”"

            {
              "en": "He sat down <span class=\"vocab-trigger\" data-vocab=\"gloomily\">gloomily<\/span>. ‘Of course she might have loved him, just for a minute, when they were first married—and loved me more even then, do you see?’ Suddenly he came out with a curious remark: ‘In any case,’ he said, ‘it was just personal.’ What could you make of that, except to suspect some <span class=\"vocab-trigger\" data-vocab=\"intensity\">intensity<\/span> in his <span class=\"vocab-trigger\" data-vocab=\"conception\">conception<\/span> of the affair that couldn’t be measured?",
              "zh": "他闷闷不乐地坐下来。“当然，她可能爱过他，刚结婚那会儿，就一分钟——可即使那时她爱我更多，你明白吗？”突然他冒出一句奇怪的话：“不管怎样，”他说，“那只是私人的事。”这话你能怎么理解呢，除非猜想他对这件事的观念里有一种无法衡量的强烈程度？",
              "simpEn": "He sat down sadly. ‘Of course, she might have loved him for a minute when they first married—but she loved me more even then, you see?’ Then he said a strange thing: ‘Anyway, it was just personal.’ The only way to understand that was to guess he felt something very deep about the affair that couldn't be measured.",
              "simpZh": "他闷闷不乐地坐下。“当然，她可能刚结婚时爱过他一下，就一会儿——可就算那时候她也更爱我，你明白吗？”然后他说了句怪话：“不管怎样，这只是私人的事。”这话只能让人猜想，他对这件事的感情强烈得没法衡量。"

            {
              "en": "He came back from France when Tom and Daisy were still on their wedding trip, and made a miserable but <span class=\"vocab-trigger\" data-vocab=\"irresistible journey\">irresistible journey<\/span> to Louisville on the last of his army pay. He stayed there a week, walking the streets where their footsteps had clicked together through the November night and revisiting the out-of-the-way places to which they had driven in her white car. Just as Daisy’s house had always seemed to him more mysterious and gay than other houses so his idea of the city itself, even though she was gone from it, was <span class=\"vocab-trigger\" data-vocab=\"pervaded\">pervaded<\/span> with a <span class=\"vocab-trigger\" data-vocab=\"melancholy beauty\">melancholy beauty<\/span>.",
              "zh": "汤姆和黛西还在新婚旅行的时候，他从法国回来，用最后的军饷做了一次凄惨却无法抗拒的旅行，去了路易斯维尔。他在那里待了一个星期，走过他们曾在十一月夜晚一起踏响脚步声的街道，重访他们曾开着她那辆白车去过的偏僻地方。正如黛西的房子在他眼里总比其他房子更神秘更欢乐一样，这个城市本身，即便她已经离去，在他心里也弥漫着一种忧郁的美。",
              "simpEn": "He returned from France while Tom and Daisy were still on their honeymoon. He used his last army money to make a sad but unstoppable trip to Louisville. He stayed a week, walking the streets they had walked together on November nights, and revisiting the quiet places they had driven to in her white car. Just like Daisy's house seemed special, the city itself, even without her, had a sad, beautiful feeling for him.",
              "simpZh": "汤姆和黛西还在度蜜月时，他从法国回来，用最后的军饷做了趟又苦又忍不住的旅行，去了路易斯维尔。他待了一周，走他们十一月夜里一起走过的街道，又去了他们开白色汽车去过的偏僻地方。就像黛西的房子在他眼里特别神秘、特别欢乐一样，这座城市，虽然她已经不在了，对他来说也充满了一种忧伤的美。"
            },
            {
              "en": "He left feeling that if he had searched harder he might have found her—that he was leaving her behind. The day-coach—he was <span class=\"vocab-trigger\" data-vocab=\"penniless\">penniless<\/span> now—was hot. He went out to the open vestibule and sat down on a folding-chair, and the station slid away and the backs of unfamiliar buildings moved by. Then out into the spring fields, where a yellow trolley raced them for a minute with people in it who might once have seen the pale magic of her face along the casual street.",
              "zh": "他走的时候觉得，要是他再找得仔细些，也许就能找到她——而他是在把她抛在身后。普通客车——他现在身无分文了——很热。他走到敞开的车廊，在一把折叠椅上坐下，车站滑开了，陌生建筑物的背面一一掠过。接着到了春天的田野，一辆黄色电车与他们并行了一会儿，电车里的人也许曾经在随便哪条街上见过她那张苍白而富有魔力的脸。",
              "simpEn": "He left thinking that if he had looked harder, he might have found her—and that he was leaving her behind. The cheap train was hot; he was now penniless. He went to the open part between cars and sat on a fold-up chair. The station slid away, and the backs of strange buildings passed by. Then they reached spring fields, where a yellow trolley raced alongside for a minute, and the people inside might have once seen her magical face on some ordinary street.",
              "simpZh": "他离开时想，要是他再找得努力一点，也许就能找到她——他是在把她丢在后面。那趟普通火车很热，他现在没钱了。他走到车厢连接处的开放地方，坐在一把折叠椅上。车站滑走了，陌生楼房的背面闪过。然后到了春天的田野，一辆黄色电车跟他们并排跑了一会儿，车里的人可能以前在随便哪条街上见过她那苍白而迷人的脸。"
            },
            {
              "en": "The track curved and now it was going away from the sun which, as it sank lower, seemed to spread itself in <span class=\"vocab-trigger\" data-vocab=\"benediction\">benediction<\/span> over the vanishing city where she had drawn her breath. He stretched out his hand desperately as if to snatch only a <span class=\"vocab-trigger\" data-vocab=\"wisp of air\">wisp of air<\/span>, to save a <span class=\"vocab-trigger\" data-vocab=\"fragment\">fragment<\/span> of the spot that she had made lovely for him. But it was all going by too fast now for his <span class=\"vocab-trigger\" data-vocab=\"blurred eyes\">blurred eyes<\/span> and he knew that he had lost that part of it, the freshest and the best, forever.",
              "zh": "铁轨拐了个弯，现在火车背离太阳驶去，太阳渐渐西沉，仿佛在向那座她曾呼吸过的渐行渐远的城市布下祝福。他拼命伸出手去，仿佛只想抓回一缕空气，留住她为他变得可爱的那个地方的一小片。可是此刻对于他那双模糊的眼睛来说，一切都过得实在太快了，他知道他已经永远失去了那部分——那最新鲜最美好的部分。",
              "simpEn": "The tracks curved, and the train moved away from the setting sun. The sun seemed to bless the fading city where she had lived. He reached out his hand hopelessly, as if to grab a tiny piece of air, to save a bit of the place she made beautiful for him. But everything moved too fast for his tearful eyes, and he knew he had lost that part—the freshest and best—forever.",

            {

              "simpZh": "可他听到自己说出这话，就退缩了一下，又用痛苦的嗓音喊起“哦，我的上帝！”米凯利斯笨手笨脚地想把他引开。“你结婚多久了，乔治？来，坐稳一会儿回答我。结婚多久了？”“十二年。”“有没有孩子？来，乔治，坐稳——我问你呢。有没有过孩子？”"

              "simpZh": "棕色硬甲虫不停地撞着昏暗的灯光，发出噗噗的声音。每当米凯利斯听到外面有汽车飞驰而过，他就觉得像是几小时前没停的那辆车。他不愿进车房，因为放尸体的工作台上有污迹，所以他别扭地在办公室里走来走去——到天亮时，他认得里面的每一样东西——还时不时坐到威尔逊旁边，想让他安静一点。"
