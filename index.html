            {

            {

          "paragraphs": [
            {
              "en": "His speaking voice, a <span class=\"vocab-trigger\" data-vocab=\"gruff husky tenor\">gruff husky tenor<\/span>, added to the impression of <span class=\"vocab-trigger\" data-vocab=\"fractiousness\">fractiousness<\/span> he conveyed. There was a touch of <span class=\"vocab-trigger\" data-vocab=\"paternal contempt\">paternal contempt<\/span> in it, even toward people he liked—and there were men at New Haven who had hated his guts. ‘Now, don’t think my opinion on these matters is final,’ he seemed to say, ‘just because I’m stronger and more of a man than you are.’ We were in the same Senior Society, and while we were never intimate I always had the impression that he approved of me and wanted me to like him with some harsh, defiant <span class=\"vocab-trigger\" data-vocab=\"wistfulness\">wistfulness<\/span> of his own.",
              "zh": "他说话的嗓音，是一种粗哑沙涩的男高音，更增添了他给人那种易怒的印象。声音里总带着一丝居高临下的轻蔑，即使对他喜欢的人也是如此——在纽黑文就有人对他恨之入骨。‘别以为我在这些事情上的意见就是最终的，’他好像在说，‘就因为我比你更强壮、更像个男人。’我们同属一个大四的社团，虽然从不算亲密，但我一直觉得他认可我，并且带着一种粗鲁而倔强的渴望，希望我能喜欢他。",
              "simpEn": "His voice was rough and husky, adding to his irritable image. Even with people he liked, he sounded slightly scornful, like a father. Some men at Yale truly hated him. He gave off an attitude of ‘My opinion matters more because I’m stronger.’ Although we were in the same club and not close, I felt he wanted me to like him in a rough, stubborn way.",
              "simpZh": "他声音粗哑，更显得脾气暴躁。就算对喜欢的人，他也带点瞧不起的口气，大学里有人特别恨他。他好像在说：‘就因为我有力气，我比你更像男人，我的意见就说了算。’我们同一个社团但不熟，可我总觉得他希望我喜欢他，用一种粗鲁倔强的方式。"
            },
            {
              "en": "We talked for a few minutes on the sunny porch. ‘I’ve got a nice place here,’ he said, his eyes flashing about restlessly. Turning me around by one arm he moved a broad flat hand along the front vista, including in its sweep a sunken Italian garden, a half acre of deep pungent roses and a snub-nosed motor boat that bumped the tide off shore. ‘It belonged to Demaine the oil man.’ He turned me around again, politely and abruptly. ‘We’ll go inside.’",
              "zh": "我们在洒满阳光的廊上聊了几分钟。‘我这儿地方不错，’他说，眼睛不安分地四处扫视。他一把抓住我的胳膊，把我转过身，摊开一只大手，示意着前方的景致：一个下沉式的意式花园、半英亩香气浓郁的玫瑰，还有一艘短鼻子的摩托艇正随着潮水在岸边碰来碰去。‘以前是石油商德梅恩的，’他再次有礼貌却又唐突地把我转过身来，‘我们进去吧。’",
              "simpEn": "We talked briefly on the sunny porch. ‘I’ve got a nice place,’ he said, his eyes darting around. He turned me around with one arm and waved at the view: a sunken Italian garden, half an acre of strong-smelling roses, and a small motorboat bobbing by the shore. ‘It used to belong to an oil man,’ he added, then turned me again. ‘Let’s go inside.’",
              "simpZh": "我们在洒满阳光的廊上聊了会儿。‘我这儿地方不错，’他说，眼睛到处看。他一把抓住我胳膊，转身指着前面的景致：一个下沉式意式花园、半英亩香喷喷的玫瑰，还有艘小摩托艇在岸边晃。‘以前是石油商人的，’他又礼貌又突然地把我转过去，‘进去吧。’"
            },
            {
              "en": "We walked through a high hallway into a bright <span class=\"vocab-trigger\" data-vocab=\"rosy-colored\">rosy-colored<\/span> space, fragilely bound into the house by <span class=\"vocab-trigger\" data-vocab=\"French windows\">French windows<\/span> at either end. The windows were ajar and gleaming white against the fresh grass outside that seemed to grow a little way into the house. A breeze blew through the room, blew curtains in at one end and out the other like pale flags, twisting them up toward the frosted wedding cake of the ceiling—and then rippled over the wine-colored rug, making a shadow on it as wind does on the sea.",
              "zh": "我们穿过一道高高的门厅，走进一个明亮的玫瑰色空间，两端法式落地窗精巧地将它融入整栋房子。窗户虚掩着，在室外鲜绿的草坪映衬下闪着白光，草坪仿佛要长进屋里来。一阵微风穿过房间，把窗帘从一头吹进来，从另一头吹出去，像浅色的旗帜，把它们卷向天花板上那像覆了糖霜的婚礼蛋糕似的装饰——然后又拂过酒红色的地毯，投下影子，像风吹过海面。",
              "simpEn": "We went inside, through a tall hallway into a bright pinkish room with French windows at both ends. The windows were slightly open, showing the fresh green grass outside that almost seemed to come inside. A breeze blew through, making the curtains wave like pale flags, twisting up toward the fancy ceiling, then rippling over the wine-colored rug like wind on the sea.",
              "simpZh": "我们穿过高门厅，进了一间明亮的粉红色房间，两端都有落地窗。窗户微微开着，外面青草鲜绿，好像要长进屋里。一阵风吹过，窗帘像浅色旗子飘动，被卷向天花板的华丽装饰，然后又拂过酒红色地毯，像海面上的风。"
            },
            {
              "en": "The only completely stationary object in the room was an enormous couch on which two young women were buoyed up as though upon an anchored balloon. They were both in white and their dresses were rippling and fluttering as if they had just been blown back in after a short flight around the house. I must have stood for a few moments listening to the whip and snap of the curtains and the groan of a picture on the wall. Then there was a boom as Tom Buchanan shut the rear windows and the caught wind died out about the room and the curtains and the rugs and the two young women ballooned slowly to the floor.",
              "zh": "房间里唯一完全静止的东西是一张大沙发，上面两个年轻女人像坐在一只锚定的气球上，轻飘飘地浮在那里。她们都穿着白色衣服，裙摆波动飘拂，仿佛刚刚绕着房子飞了一小圈又被吹了回来。我一定站了片刻，听着窗帘噼啪作响，墙上的一幅画低吟叹息。然后砰地一声，汤姆·布坎南关上了后面的窗子，被困住的风在房间里消失了，窗帘、地毯和那两个年轻女人都慢慢地落回了地面。",
              "simpEn": "The only still thing in the room was a huge couch where two young women sat, as if floating on a giant anchored balloon. Both wore white, their dresses fluttering as if they had just flown around the house and blown back in. I listened for a moment to the snapping curtains and a creaking picture. Then Tom shut the rear windows with a bang, the wind died, and the women and curtains slowly settled.",
              "simpZh": "屋里唯一不动的是张大沙发，上面坐着两个年轻女人，好像坐在一个锚定的气球上飘着。两人都穿白衣服，裙摆飘动，像刚在房子周围飞了一圈又被吹回来。我听了一会儿窗帘噼啪声和墙上一幅画的嘎吱声。然后汤姆砰地关上后窗，风停了，窗帘、地毯和两个女人慢慢落了下来。"

            {
              "en": "The younger of the two was a stranger to me. She was extended full length at her end of the divan, completely motionless and with her chin raised a little as if she were balancing something on it which was quite likely to fall. If she saw me out of the corner of her eyes she gave no hint of it—indeed, I was almost surprised into murmuring an apology for having disturbed her by coming in. The other girl, Daisy, made an attempt to rise—she leaned slightly forward with a conscientious expression—then she laughed, an absurd, charming little laugh, and I laughed too and came forward into the room.",
              "zh": "那两个女人中较年轻的一位我从未见过。她全身伸展着躺在沙发的一端，纹丝不动，下巴微微抬起，仿佛在保持某个东西的平衡，而那东西随时可能掉下来。如果她眼角的余光看到了我，她也没有任何表示——实际上，我差点惊讶得喃喃地对她道歉，为我的闯入打扰了她。另一个姑娘，黛西，试图站起来——她稍微向前欠了欠身，脸上带着一丝认真——然后她笑了，是一种荒唐而迷人的轻声一笑，我也笑了，并朝屋里走去。",
              "simpEn": "The younger girl I didn’t know. She lay stretched out motionless on the sofa with her chin slightly raised, as if balancing something that might fall. She didn’t seem to notice me at all. Daisy, the other girl, tried to rise, then laughed a charming little laugh, and I laughed too and walked in.",
              "simpZh": "那个年轻点的女孩我不认识。她一动不动地躺在沙发上，下巴微微抬起，像是顶着什么东西怕掉下来。她好像根本没注意到我。另一个女孩黛西想站起来，欠了欠身，然后笑了，可爱地轻轻一笑，我也笑了，走了进去。"
            },
            {
              "en": "‘I’m p-paralyzed with happiness.’ She laughed again, as if she said something very witty, and held my hand for a moment, looking up into my face, promising that there was no one in the world she so much wanted to see. That was a way she had. She hinted in a murmur that the surname of the balancing girl was Baker. (I’ve heard it said that Daisy’s murmur was only to make people lean toward her; an irrelevant criticism that made it no less charming.)",
              "zh": "“我高兴得瘫痪了。”她又笑起来，好像说了什么非常机智的话，握住我的手片刻，抬头望着我的脸，向我保证这世界上没有谁是她更想见到的。这就是她的方式。她低声向我暗示那个正在做平衡动作的女孩姓贝克。（我听说黛西的低声细语只是为了让人向她倾过身去；这种不相干的评论反而更增添了她的魅力。）",
              "simpEn": "‘I’m p-paralyzed with happiness,’ Daisy said, laughing as if it were very clever. She held my hand and looked up at me, acting like I was the person she most wanted to see. That was just her way. She murmured that the other girl’s last name was Baker. (People said Daisy murmured just to make others lean in; that didn’t make it less charming.)",
              "simpZh": "“我高兴得瘫痪了。”黛西笑着说，好像说得很机智，她握住我的手，抬头看我，好像我是她最想见的人。她就这样。她低声告诉我那个做平衡样子的女孩姓贝克。（据说黛西低声说话就是让人靠近她；但这并不减少她的魅力。）"
            },
            {
              "en": "At any rate Miss Baker’s lips fluttered, she nodded at me almost imperceptibly and then quickly tipped her head back again—the object she was balancing had obviously tottered a little and given her something of a fright. Again a sort of apology arose to my lips. Almost any exhibition of complete self-sufficiency draws a stunned tribute from me.",
              "zh": "不管怎样，贝克小姐的嘴唇动了动，几乎难以察觉地朝我点了点头，然后迅速又把头仰了回去——她正在平衡的那个东西显然晃了一下，吓了她一跳。我又差点脱口而出一句道歉。任何完全自足的姿态，几乎都能令我惊愕地致以敬意。",
              "simpEn": "Miss Baker’s lips moved slightly, she gave a tiny nod, then quickly tilted her head back again. Whatever she was balancing had wobbled and scared her. Once more I almost apologized. Any display of complete self-sufficiency always impresses me.",
              "simpZh": "贝克小姐的嘴唇动了动，微微点了下头，然后马上又仰回去。她正平衡的东西晃了一下，吓了她一跳。我又差点道歉了。任何完全自足的姿态都特别让我佩服。"
            },
            {
              "en": "I looked back at my cousin who began to ask me questions in her low, thrilling voice. It was the kind of voice that the ear follows up and down as if each speech is an arrangement of notes that will never be played again. Her face was sad and lovely with bright things in it, bright eyes and a bright passionate mouth—but there was an excitement in her voice that men who had cared for her found difficult to forget: a singing compulsion, a whispered ‘Listen,’ a promise that she had done gay, exciting things just a while since and that there were gay, exciting things hovering in the next hour.",
              "zh": "我回过头去看我的表妹，她开始用她那低沉而令人心跳加速的声音问我问题。那种声音，耳朵会跟着它上下起伏，仿佛每句话都是由绝不会再重奏的音符组成。她的脸悲戚而可爱，上面有明亮的东西，明亮的眼睛，明亮而热情的嘴唇——但她的声音里带着一种激动，那些曾为她倾心的男人发现很难忘记：一种歌唱般的魔力，一声低语的‘听着’，一个承诺，仿佛她才刚刚做过一些欢乐、刺激的事情，而且下一个小时里还有更多欢乐、刺激的事情在徘徊。",
              "simpEn": "Daisy started asking me questions in her low, thrilling voice. Her voice made you follow every rise and fall, like notes of music never to be repeated. She had a sad, lovely face with bright eyes and a passionate mouth, but her voice held an excitement that men who loved her couldn’t forget—a singing quality, a whispered ‘Listen,’ promising that joyful, thrilling things had just happened and more were coming soon.",
              "simpZh": "黛西开始用她那低沉的、勾人心弦的声音问我问题。她的声音让人跟着上下起伏，像一套再也不会重奏的音符。她的脸忧伤又可爱，有着明亮的眼睛和热情的嘴，但声音里有种激动，喜欢过她的男人都忘不了——一种歌唱般的魔力，一声低低的‘听着’，仿佛她刚做了好玩刺激的事，而且马上还有更好玩刺激的事。"
            },
            {
              "en": "I told her how I had stopped off in Chicago for a day on my way east and how a dozen people had sent their love through me. ‘Do they miss me?’ she cried <span class=\"vocab-trigger\" data-vocab=\"ecstatically\">ecstatically<\/span>. ‘The whole town is <span class=\"vocab-trigger\" data-vocab=\"desolate\">desolate<\/span>. All the cars have the left rear wheel painted black as a <span class=\"vocab-trigger\" data-vocab=\"mourning wreath\">mourning wreath<\/span> and there’s a <span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> wail\"><span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> wail<\/span>\"><span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> wail\"><span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> wail<\/span><\/span> all night along the North Shore.’ ‘How <span class=\"vocab-trigger\" data-vocab=\"gorgeous\">gorgeous<\/span>! Let’s go back, Tom. Tomorrow!’ Then she added irrelevantly, ‘You ought to see the baby.’",
              "zh": "我告诉她我路经芝加哥时停留了一天，十几个人托我转达对她的爱意。‘他们想我吗？’她欣喜若狂地叫道。‘整个城都荒凉了。所有的车都把左后轮漆成黑色当哀悼花环，北岸一整夜都响着不止的哀号。’‘太美了！我们回去吧，汤姆，明天就走！’然后她又不相干地加了一句：‘你该看看宝宝。’",
              "simpEn": "I told her I had stopped in Chicago for a day and many people sent their love. ‘Do they miss me?’ she cried happily. ‘The whole town is empty and sad. All cars have black left rear wheels like mourning wreaths, and there’s crying all night along the North Shore.’ ‘How wonderful! Let’s go back, Tom, tomorrow!’ Then she added, ‘You should see the baby.’",
              "simpZh": "我告诉她我路过芝加哥待了一天，好多人托我问候她。‘他们想我吗？’她高兴地叫。‘全城都荒了，所有车左后轮都漆成黑的当哀悼花环，北岸整晚都在哭。’‘太棒了！我们回去吧，汤姆，明天就走！’然后她突然加了一句：‘你该看看宝宝。’"
            },
            {
              "en": "Tom Buchanan who had been hovering restlessly about the room stopped and rested his hand on my shoulder. ‘What you doing, Nick?’ ‘I’m a bond man.’ ‘Who with?’ I told him. ‘Never heard of them,’ he remarked decisively. This annoyed me. ‘You will,’ I answered shortly. ‘You will if you stay in the East.’ ‘Oh, I’ll stay in the East, don’t you worry,’ he said, glancing at Daisy and then back at me, as if he were alert for something more. ‘I’d be a God Damned fool to live anywhere else.’",
              "zh": "汤姆·布坎南一直在房间里不安分地走来走去，这时停下来，把手搭在我肩上。‘你是做什么的，尼克？’‘我做债券。’‘哪家公司？’我告诉了他。‘从没听说过，’他断然说道。这让我很不爽。‘你会听说的，’我简短地回答，‘如果你待在东部的话。’‘哦，我会待在东部，别担心，’他说着，瞥了黛西一眼，然后又看向我，仿佛在警惕着什么。‘我要是住到别处去那才是个天大的傻瓜。’",
              "simpEn": "Tom, who had been pacing restlessly, stopped and put his hand on my shoulder. ‘What do you do, Nick?’ ‘I’m in bonds.’ ‘With who?’ I told him. ‘Never heard of them,’ he said firmly. I was annoyed. ‘You will if you stay in the East,’ I replied. ‘Oh, I’ll stay in the East, don’t worry,’ he said, looking at Daisy then back at me. ‘I’d be a fool to live anywhere else.’",
              "simpZh": "汤姆不安地在屋里走来走去，停下来把手搭我肩上。‘你做什么的，尼克？’‘我做债券。’‘哪家公司？’我告诉了他。‘没听说过，’他干脆地说。我很不爽。‘会听说的，如果你待在东部。’‘哦，我会待在东部，别担心，’他看了看黛西又看我，‘我住别处就是傻瓜。’"
            },
            {
              "en": "At this point Miss Baker said ‘Absolutely!’ with such suddenness that I started—it was the first word she uttered since I came into the room. Evidently it surprised her as much as it did me, for she yawned and with a series of rapid, deft movements stood up into the room. ‘I’m stiff,’ she complained, ‘I’ve been lying on that sofa for as long as I can remember.’ ‘Don’t look at me,’ Daisy retorted. ‘I’ve been trying to get you to New York all afternoon.’",
              "zh": "就在这时贝克小姐突然喊了一声‘完全正确！’，吓了我一跳——这是她自我进屋以来说的第一句话。显然她也和我一样吃惊，因为她打了个哈欠，然后一连串麻利的动作，站了起来。‘我浑身都僵了，’她抱怨道，‘我在沙发上躺了不知道多久了。’‘别看我，’黛西反驳道，‘我整个下午都在劝你去纽约。’",
              "simpEn": "Just then Miss Baker said ‘Absolutely!’ so suddenly that I jumped—it was the first word she’d spoken since I arrived. She seemed as surprised as I was; she yawned and stood up quickly. ‘I’m stiff,’ she said, ‘I’ve been on that sofa forever.’ ‘Don’t blame me,’ Daisy said. ‘I’ve been trying to get you to New York all afternoon.’",
              "simpZh": "这时贝克小姐突然喊了句‘完全正确！’，吓得我一激灵——这是她来了以后说出的第一句话。她好像也吓了一跳，打了个哈欠，麻利地站起来。‘我浑身僵了，’她说，‘在沙发上好像躺了一辈子。’‘别赖我，’黛西说，‘我一下午都在劝你去纽约。’"
            },
            {
              "en": "‘No, thanks,’ said Miss Baker to the four cocktails just in from the <span class=\"vocab-trigger\" data-vocab=\"pantry\">pantry<\/span>, ‘I’m absolutely in training.’ Her host looked at her <span class=\"vocab-trigger\" data-vocab=\"incredulously\">incredulously<\/span>. ‘You are!’ He took down his drink as if it were a drop in the bottom of a glass. ‘How you ever get anything done is beyond me.’ I looked at Miss Baker wondering what it was she ‘got done.’ I enjoyed looking at her. She was a slender, small-breasted girl, with an erect carriage which she accentuated by throwing her body backward at the shoulders like a young cadet. Her grey sun-strained eyes looked back at me with polite reciprocal curiosity out of a wan, charming discontented face.",
              "zh": "‘不了，谢谢，’贝克小姐对从餐具室刚端来的四杯鸡尾酒说，‘我绝对在训练中。’男主人难以置信地看着她。‘你训练！’他拿起自己的酒，像是杯底的一滴。‘我真搞不懂你是怎么把事情做成的。’我看着贝克小姐，纳闷她‘做成’的是什么事。我乐于看她。她是个苗条、胸部矮小的姑娘，身姿笔挺，像年轻军校生一样把肩膀往后挺，更显得姿态挺拔。她那双被阳光灼伤的灰色眼睛，从一张苍白、迷人且不满的脸上，带着礼貌而相互的好奇回望着我。",
              "simpEn": "‘No, thanks,’ Miss Baker said to the cocktails brought in, ‘I’m strictly in training.’ Tom stared at her in disbelief. ‘You are!’ He drank his own drink like it was a tiny drop. ‘I don’t know how you ever accomplish anything.’ I wondered what she ‘accomplished.’ I liked looking at her—she was slim, small-breasted, and stood very straight, her shoulders back like a young soldier. Her tired grey eyes looked back at me with polite curiosity from a pale, charmingly unhappy face.",
              "simpZh": "‘不了，谢谢，’贝克小姐对刚端来的鸡尾酒说，‘我正在训练。’汤姆不相信地看着她。‘你训练！’他一口喝了酒，像杯底只有一滴似的。‘我真不知道你能做成什么事。’我纳闷她‘做成’了什么。我喜欢看她——她苗条，胸部小小的，站得笔直，像年轻士兵一样肩膀往后挺。她那双被太阳晒累了的灰眼睛，从苍白、迷人又不高兴的脸上带着礼貌的好奇看着我。"
            },
            {
              "en": "It occurred to me now that I had seen her, or a picture of her, somewhere before. ‘You live in West Egg,’ she remarked contemptuously. ‘I know somebody there.’ ‘I don’t know a single——‘ ‘You must know Gatsby.’ ‘Gatsby?’ demanded Daisy. ‘What Gatsby?’ Before I could reply that he was my neighbor dinner was announced; wedging his tense arm <span class=\"vocab-trigger\" data-vocab=\"imperatively\">imperatively<\/span> under mine Tom Buchanan compelled me from the room as though he were moving a <span class=\"vocab-trigger\" data-vocab=\"checker\">checker<\/span> to another square.",
              "zh": "这时我突然想起我曾在哪里见过她，或见过她的照片。‘你住在西卵，’她轻蔑地说，‘我在那儿认识一个人。’‘我一个人都不——’‘你肯定认识盖茨比。’‘盖茨比？’黛西追问，‘哪个盖茨比？’我还来不及回答说他就是我的邻居，晚宴已经宣布开始了；汤姆·布坎南把他紧绷绷的胳膊强硬地插到我臂下，像移动一颗棋子似的把我推出了房间。",
              "simpEn": "I suddenly realized I had seen her or a picture of her somewhere before. ‘You live in West Egg,’ she said with contempt. ‘I know someone there.’ ‘I don’t know a single—’ ‘You must know Gatsby.’ ‘Gatsby?’ Daisy demanded. ‘What Gatsby?’ Before I could say he was my neighbor, dinner was announced. Tom wedged his tense arm under mine and steered me out like moving a checker piece.",
              "simpZh": "我忽然想起我在哪儿见过她或她的照片。‘你住在西卵，’她轻蔑地说，‘我认识那儿一个人。’‘我一个人都不——’‘你肯定认识盖茨比。’‘盖茨比？’黛西追问，‘什么盖茨比？’我还没来得及说他就是我邻居，晚宴开始了。汤姆把紧绷的胳膊猛地插到我臂下，像移动棋子一样把我推了出去。"
            },
            {
              "en": "Slenderly, <span class=\"vocab-trigger\" data-vocab=\"languidly\">languidly<\/span>, their hands set lightly on their hips the two young women preceded us out onto a <span class=\"vocab-trigger\" data-vocab=\"rosy-colored\">rosy-colored<\/span> porch open toward the sunset where four <span class=\"vocab-trigger\" data-vocab=\"candles flickered\">candles flickered<\/span> on the table in the <span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"diminished\">diminished<\/span> wind\"><span class=\"vocab-trigger\" data-vocab=\"diminished\">diminished<\/span> wind<\/span>. ‘Why CANDLES?’ objected Daisy, frowning. She snapped them out with her fingers. ‘In two weeks it’ll be the longest day in the year.’ She looked at us all radiantly. ‘Do you always watch for the longest day of the year and then miss it? I always watch for the longest day in the year and then miss it.’",
              "zh": "两个年轻女人苗条慵懒地走在我们前面，手轻轻搭在髋部，来到一个玫瑰色的走廊上，走廊对着落日敞开，桌上四根蜡烛在减弱的晚风中摇曳。‘为什么要点蜡烛？’黛西皱起眉头反对说。她用手指把蜡烛一一弹灭。‘再过两周就是一年中最长的一天了。’她容光焕发地看着我们大家。‘你们是不是总在等一年中最长的那一天，然后总是错过它？我总是在等一年中最长的那一天，然后总是错过。’",
              "simpEn": "The two young women walked ahead of us, slim and relaxed, hands lightly on their hips, out onto a pinkish porch open to the sunset. Four candles flickered on the table in the dying wind. ‘Why CANDLES?’ Daisy frowned. She snapped them out with her fingers. ‘In two weeks it’ll be the longest day of the year.’ She looked at us brightly. ‘Do you always watch for the longest day and then miss it? I always do.’",
              "simpZh": "两个年轻女人苗条慵懒地走在前头，手轻轻搭在腰上，来到一个朝着日落的粉红色走廊。桌上四根蜡烛在微风里摇晃。‘为什么要点蜡烛？’黛西皱眉头，用手指把它们弹灭了。‘再过两周就是一年里最长的一天了。’她亮晶晶地看着我们。‘你们是不是总等着最长的一天然后错过？我总是等着最长的一天然后错过。’"
            },
            {
              "en": "‘We ought to plan something,’ yawned Miss Baker, sitting down at the table as if she were getting into bed. ‘All right,’ said Daisy. ‘What’ll we plan?’ She turned to me helplessly. ‘What do people plan?’ Before I could answer her eyes fastened with an awed expression on her little finger. ‘Look!’ she complained. ‘I hurt it.’ We all looked—the knuckle was black and blue. ‘You did it, Tom,’ she said accusingly. ‘I know you didn’t mean to but you DID do it. That’s what I get for marrying a brute of a man, a great big <span class=\"vocab-trigger\" data-vocab=\"hulking\">hulking<\/span> physical specimen of a——‘ ‘I hate that word <span class=\"vocab-trigger\" data-vocab=\"hulking\">hulking<\/span>,’ objected Tom crossly, ‘even in kidding.’ ‘<span class=\"vocab-trigger\" data-vocab=\"hulking\">Hulking<\/span>,’ insisted Daisy.",
              "zh": "‘我们该计划点什么，’贝克小姐打着哈欠说，在桌边坐下，好像要上床一般。‘好啊，’黛西说，‘计划什么呢？’她无助地转向我。‘人们都计划些什么？’我还来不及回答，她就带着一种敬畏的表情盯着自己的小指。‘看！’她抱怨道，‘我伤着了。’我们全都看过去——指节青一块紫一块。‘是你干的，汤姆，’她指责道，‘我知道你不是故意的，但确实是你弄的。这就是我嫁给一个粗暴男人的下场，一个大块头、大笨熊的——’‘我讨厌笨熊这个字眼，’汤姆恼怒地反对道，‘就算是开玩笑。’‘大笨熊，’黛西坚持道。",
              "simpEn": "‘We should plan something,’ Miss Baker yawned, sitting down as if getting into bed. ‘Alright,’ said Daisy. ‘What should we plan?’ She turned to me helplessly. ‘What do people plan?’ Before I could answer, she stared in awe at her little finger. ‘Look! I hurt it.’ We all looked—the knuckle was bruised. ‘You did it, Tom,’ she accused. ‘I know you didn’t mean to, but you DID do it. That’s what I get for marrying a brute, a big, hulking—’ ‘I hate that word hulking,’ Tom said crossly, ‘even as a joke.’ ‘Hulking,’ Daisy insisted.",
              "simpZh": "‘我们该计划点什么，’贝克小姐打着哈欠，像上床一样坐下。‘好吧，’黛西说，‘计划什么呢？’她无助地转向我。‘人们都计划什么？’我还没来得及回答，她就害怕地看着自己的小指。‘看！我伤着了。’我们都看——指节青紫了。‘是你弄的，汤姆，’她责备道。‘我知道你不是故意的，但就是你弄的。这就是我嫁给一个野蛮人的下场，一个大块头、大笨熊——’‘我讨厌笨熊这个词，’汤姆生气地说，‘开玩笑也不行。’‘大笨熊，’黛西坚持。"
            },
            {
              "en": "Sometimes she and Miss Baker talked at once, unobtrusively and with a <span class=\"vocab-trigger\" data-vocab=\"bantering inconsequence\">bantering inconsequence<\/span> that was never quite chatter, that was as cool as their white dresses and their <span class=\"vocab-trigger\" data-vocab=\"impersonal eyes\">impersonal eyes<\/span> in the absence of all desire. They were here—and they accepted Tom and me, making only a polite pleasant effort to entertain or to be entertained. They knew that presently dinner would be over and a little later the evening too would be over and casually put away. It was sharply different from the West where an evening was hurried from phase to phase toward its close in a continually disappointed anticipation or else in sheer nervous dread of the moment itself.",
              "zh": "有时候她和贝克小姐会同时说话，不引起注意地、带着一种玩笑般的随意，那种随意绝非一般的闲聊，像她们的白裙子和不含欲望的客观眼神一样冷静。她们就在这儿——她们接受了汤姆和我，只是客客气气地努力去取悦或被取悦。她们知道，一会儿晚餐就会结束，再过一会儿这个夜晚也会结束，被漫不经心地收起来。这与西部截然不同，那里的夜晚总是从一个阶段匆忙赶往另一个阶段直到结束，不是夹杂着不断落空的期待，就是对这个时刻本身怀着纯粹的神经质恐惧。",
              "simpEn": "Sometimes she and Miss Baker spoke together in a light, playful way that wasn’t just idle chatter; it was as cool as their white dresses and their detached eyes. They accepted Tom and me, politely making an effort to entertain or be entertained. They knew dinner would soon end and the evening would end too, casually put away. This was very different from the Midwest, where an evening rushed from one phase to the next, always disappointed or nervously afraid of the moment.",
              "simpZh": "有时她和贝克小姐同时说话，悄没声地，带着一种玩笑般的随意，不像闲聊，像她们的白裙子和不带欲望的眼睛一样冷静。她们接受了汤姆和我，只是客客气气地取悦别人或被人取悦。她们知道晚饭一会儿就结束，夜晚也会结束，随便就收起来了。这跟中西部完全不同，在那边一个晚上总是急急忙忙从一个阶段到下一个，不是失望就是紧张害怕这一刻。"
            },
            {
              "en": "‘You make me feel <span class=\"vocab-trigger\" data-vocab=\"uncivilized\">uncivilized<\/span>, Daisy,’ I confessed on my second glass of corky but rather impressive claret. ‘Can’t you talk about crops or something?’ I meant nothing in particular by this remark but it was taken up in an unexpected way. ‘Civilization’s going to pieces,’ broke out Tom violently. ‘I’ve gotten to be a terrible <span class=\"vocab-trigger\" data-vocab=\"pessimist\">pessimist<\/span> about things. Have you read ‘The Rise of the Coloured Empires’ by this man Goddard?’ ‘Why, no,’ I answered, rather surprised by his tone. ‘Well, it’s a fine book, and everybody ought to read it. The idea is if we don’t look out the white race will be—will be utterly <span class=\"vocab-trigger\" data-vocab=\"submerged\">submerged<\/span>. It’s all scientific stuff; it’s been proved.’",
              "zh": "‘你让我觉得自己很没教养，黛西，’我喝到第二杯略带软木塞味却相当不错的红葡萄酒时坦白道。‘你就不能谈谈庄稼什么的吗？’我这话倒没什么特别的意思，却出乎意料地被接了过去。‘文明正在崩塌，’汤姆激烈地说道，‘我对这些事已经悲观到了极点。你看过戈达德写的《有色帝国的崛起》吗？’‘呃，没有，’我答道，他的语气让我相当吃惊。‘嗯，那是本好书，人人都该看看。核心意思就是如果我们不加小心，白种人就会——就会被彻底淹没。这都是科学，已经被证实了。’",
              "simpEn": "‘You make me feel uncivilized, Daisy,’ I said after my second glass of wine. ‘Can’t you talk about crops or something?’ I didn’t mean anything serious, but Tom jumped in. ‘Civilization is falling apart,’ he burst out. ‘I’ve become a terrible pessimist. Have you read ‘The Rise of the Coloured Empires’ by Goddard?’ I said no, surprised. ‘It’s a fine book, everyone should read it. The idea is if we aren’t careful, the white race will be completely submerged. It’s all scientific; it’s been proven.’",
              "simpZh": "‘你让我觉得自己很没教养，黛西，’我喝了第二杯酒后说。‘你不能谈点庄稼之类的吗？’我没什么特别的意思，但汤姆却激动地接话了。‘文明要完蛋了，’他爆发道，‘我变得特别悲观。你看过戈达德的《有色帝国的崛起》吗？’我惊讶地说没看过。‘是本好书，人人都该看。中心思想就是我们不小心的话，白种人就会被彻底淹没。这些都是科学，已经被证实了。’"
            },
            {
              "en": "‘Tom’s getting very <span class=\"vocab-trigger\" data-vocab=\"profound\">profound<\/span>,’ said Daisy with an expression of <span class=\"vocab-trigger\" data-vocab=\"unthoughtful sadness\">unthoughtful sadness<\/span>. ‘He reads deep books with long words in them. What was that word we——‘ ‘Well, these books are all scientific,’ insisted Tom, glancing at her impatiently. ‘This fellow has worked out the whole thing. It’s up to us who are the <span class=\"vocab-trigger\" data-vocab=\"dominant race\">dominant race<\/span> to watch out or these other races will have control of things.’ ‘We’ve got to beat them down,’ whispered Daisy, winking ferociously toward the <span class=\"vocab-trigger\" data-vocab=\"fervent sun\">fervent sun<\/span>.",
              "zh": "‘汤姆变得非常深刻了，’黛西带着一种不经思考的悲伤表情说，‘他读那些有长词的深奥书籍。我们之前那个词是什么来着——’‘这些书都是科学的，’汤姆不耐烦地瞥了她一眼，坚持道，‘那个人把整件事都搞清楚了。我们这些处于统治地位的种族必须多加小心，否则其他种族就会掌控一切。’‘我们得把他们打趴下，’黛西朝着那轮炽热的太阳恶狠狠地眨了眨眼，低声说道。",
              "simpEn": "‘Tom’s getting very profound,’ Daisy said with a look of absent-minded sadness. ‘He reads deep books with long words. What was that word we—’ ‘These books are all scientific,’ Tom insisted impatiently. ‘This man worked out everything. It’s up to us, the dominant race, to watch out, or other races will take control.’ ‘We’ve got to beat them down,’ Daisy whispered, winking fiercely at the hot sun.",
              "simpZh": "‘汤姆变得特别深刻了，’黛西带着心不在焉的悲伤说，‘他读很深奥的书，里面有很多长词。我们那个词是什么来着——’‘这些书都是科学的，’汤姆不耐烦地坚持，‘那个人把一切都弄清楚了。我们统治种族得小心，不然其他种族就会控制一切。’‘我们得把他们打趴下，’黛西朝着火热的太阳狠狠眨了眨眼，低声说。"
            },
            {
              "en": "There was something <span class=\"vocab-trigger\" data-vocab=\"pathetic\">pathetic<\/span> in his concentration as if his <span class=\"vocab-trigger\" data-vocab=\"complacency\">complacency<\/span>, more acute than of old, was not enough to him any more. When, almost immediately, the telephone rang inside and the butler left the porch Daisy seized upon the momentary interruption and leaned toward me. ‘I’ll tell you a family secret,’ she whispered enthusiastically. ‘It’s about the butler’s nose. Do you want to hear about the butler’s nose?’ ‘That’s why I came over tonight.’ ‘Well, he wasn’t always a butler; he used to be the silver polisher for some people in New York that had a silver service for two hundred people. He had to polish it from morning till night until finally it began to affect his nose——‘ ‘Things went from bad to worse,’ suggested Miss Baker. ‘Yes. Things went from bad to worse until finally he had to give up his position.’",
              "zh": "他集中精神的样子有点可怜，仿佛他那比以往更尖锐的自满已不再能满足他。几乎就在这时，屋里电话响了，管家离开了走廊，黛西立刻抓住这短暂的打断，向我凑过来。‘我告诉你一个家庭秘密，’她激动地低声说，‘是关于管家鼻子的。你想听管家鼻子的故事吗？’‘这就是我今晚过来的原因。’‘嗯，他以前不是管家；他原来是纽约一户人家的银器抛光工，那家人有两百个人的银餐具。他得从早擦到晚，最后鼻子就受了影响——’‘情况越来越糟，’贝克小姐提示道。‘对，越来越糟，直到最后他不得不辞掉那份工。’",
              "simpEn": "There was something sad about Tom’s focus, as if his old self-satisfaction wasn’t enough anymore. Right then, the phone rang inside. Daisy grabbed the interruption and leaned toward me. ‘I’ll tell you a family secret,’ she whispered excitedly. ‘It’s about the butler’s nose. Want to hear?’ ‘That’s why I came.’ ‘Well, he wasn’t always a butler; he polished silver for people with service for 200. He polished from morning to night, and it started to affect his nose—’ ‘Things went from bad to worse,’ Miss Baker offered. ‘Yes, until he had to quit.’",
              "simpZh": "汤姆那专注的样子有点可怜，好像他那点老本的自满已经不够了。就在这时，屋里电话响了。黛西抓住这个打断的机会，凑向我。‘告诉你个家庭秘密，’她兴奋地低语，‘是管家鼻子的故事。想听吗？’‘这就是我来的原因。’‘他以前不是管家；是给人擦银器的，那家人有供二百人用的银餐具。他从早擦到晚，鼻子就开始出问题了——’‘越来越糟，’贝克小姐插嘴。‘对，越来越糟，最后他不得不辞了工作。’"
            },
            {
              "en": "For a moment the last sunshine fell with romantic affection upon her glowing face; her voice compelled me forward breathlessly as I listened—then the glow faded, each light deserting her with lingering regret like children leaving a pleasant street at dusk. The butler came back and murmured something close to Tom’s ear whereupon Tom frowned, pushed back his chair and without a word went inside. As if his absence quickened something within her Daisy leaned forward again, her voice glowing and singing. ‘I love to see you at my table, Nick. You remind me of a—of a rose, an absolute rose. Doesn’t he?’ She turned to Miss Baker for confirmation. ‘An absolute rose?’ This was untrue. I am not even faintly like a rose. She was only extemporizing but a stirring warmth flowed from her as if her heart was trying to come out to you <span class=\"vocab-trigger\" data-vocab=\"concealed\">concealed<\/span> in one of those breathless, thrilling words.",
              "zh": "片刻间，最后一道阳光带着浪漫的爱意照在她容光焕发的脸上；我听着，她的声音令我屏息地向前倾去——然后那光晕褪去了，每一束光都依依不舍地离开了她，就像黄昏时分孩子们离开一条愉快的街道。管家回来了，凑在汤姆耳边说了些什么，汤姆皱起眉，推开椅子，一言不发地走进了屋。仿佛他的缺席触动了她心底的什么，黛西又向我倾过身来，声音闪着光，唱起了歌。‘我喜欢看见你在我的餐桌旁，尼克。你让我想起——想起一朵玫瑰，一朵纯粹的玫瑰。是不是？’她转向贝克小姐寻求确认。‘一朵纯粹的玫瑰？’这根本不是真的。我连一丁点儿像玫瑰的地方都没有。她只是随口说说，但一股搅动人心的暖意从她身上流淌出来，仿佛她的心藏在那一句令人屏息的、令人心动的言语里，试图向你奔来。",
              "simpEn": "For a moment the last sunlight fell romantically on her glowing face. Her voice drew me in breathlessly. Then the light faded, each ray leaving her regretfully like children going home at dusk. The butler returned and whispered to Tom, who frowned, pushed back his chair, and silently went inside. As if his absence moved her, Daisy leaned forward again, her voice glowing. ‘I love seeing you at my table, Nick. You remind me of a rose, an absolute rose.’ She asked Miss Baker to agree. ‘An absolute rose?’ It wasn’t true. I’m nothing like a rose. She was making it up, but a warm feeling flowed from her, as if her heart was reaching out through those thrilling words.",
              "simpZh": "最后的阳光浪漫地照在她发光的脸上。她的声音让我屏息倾听。然后光褪去了，每一缕光都依依不舍地离开她，像黄昏时孩子们离开好玩的街道。管家回来在汤姆耳边低语，汤姆皱眉头，推开椅子，一声不吭地进去了。好像他的离开触动了黛西，她又倾过身来，声音闪闪发光。‘我喜欢你在我的餐桌旁，尼克。你让我想起一朵玫瑰，一朵纯粹的玫瑰。’她问贝克小姐。‘一朵纯粹的玫瑰？’不对，我一点也不像玫瑰。她不过是随口说的，但一股暖流从她身上涌出，好像她的心藏在那句令人屏息的激动话语里想奔向你。"
            },
            {
              "en": "Then suddenly she threw her napkin on the table and excused herself and went into the house. Miss Baker and I exchanged a short glance consciously devoid of meaning. I was about to speak when she sat up alertly and said ‘Sh!’ in a warning voice. A subdued <span class=\"vocab-trigger\" data-vocab=\"impassioned\">impassioned<\/span> murmur was audible in the room beyond and Miss Baker leaned forward, unashamed, trying to hear. The murmur trembled on the verge of coherence, sank down, mounted excitedly, and then ceased altogether. ‘This Mr. Gatsby you spoke of is my neighbor——’ I said. ‘Don’t talk. I want to hear what happens.’ ‘Is something happening?’ I inquired innocently. ‘You mean to say you don’t know?’ said Miss Baker, honestly surprised. ‘I thought everybody knew.’ ‘I don’t.’ ‘Why——’ she said hesitantly, ‘Tom’s got some woman in New York.’",
              "zh": "然后她突然把餐巾扔在桌上，说了声对不起，便走进屋去。贝克小姐和我交换了一个心照不宣、毫无意义的短暂眼神。我正要开口说话，她却机警地坐直了身子，发出了警告的一声‘嘘！’。隔壁房间里传来一阵压抑而激动的小声说话声，贝克小姐毫不害臊地倾过身子，试图听清。那低语在可辨的边缘颤抖，然后低沉下去，又激动地升高，最终完全停止了。‘你说的那位盖茨比先生是我的邻居——’我说。‘别说话，我想听发生了什么。’‘是出了什么事吗？’我天真地问。‘你是说你不知道？’贝克小姐着实吃惊地说，‘我以为人人都知道呢。’‘我不知道。’‘呃——’她犹豫地说，‘汤姆在纽约有个女人。’",
              "simpEn": "Then Daisy threw her napkin down, excused herself, and went inside. Miss Baker and I exchanged a blank glance. I was about to speak when she sat up sharply and said ‘Sh!’ A low, passionate murmur came from the next room, and Miss Baker leaned forward unashamed to listen. The murmur trembled, fell, rose excitedly, then stopped. ‘This Mr. Gatsby you mentioned is my neighbor—’ I began. ‘Don’t talk. I want to hear.’ ‘Is something happening?’ I asked innocently. ‘You mean you don’t know?’ Miss Baker seemed honestly surprised. ‘I thought everyone knew.’ ‘I don’t.’ ‘Well,’ she hesitated, ‘Tom’s got a woman in New York.’",
              "simpZh": "然后黛西扔下餐巾，说了声对不起就进屋了。贝克小姐和我交换了一个空洞的短暂眼神。我正要开口，她却猛地坐直，警告地‘嘘！’。隔壁传来压低而激动的声音，贝克小姐毫不害臊地倾身去听。那声音颤抖着快要能听清了，又低下去，激动地升高，然后完全停了。‘你说的那个盖茨比先生是我邻居——’我说。‘别说话，我想听听。’‘出什么事了吗？’我天真地问。‘你是说你不知道？’贝克小姐真的很惊讶，‘我以为人人都知道。’‘我不知道。’‘呃——’她犹豫道，‘汤姆在纽约有个女人。’"
            },
            {
              "en": "‘Got some woman?’ I repeated blankly. Miss Baker nodded. ‘She might have the decency not to telephone him at dinner-time. Don’t you think?’ Almost before I had grasped her meaning there was the flutter of a dress and the crunch of leather boots and Tom and Daisy were back at the table. ‘It couldn’t be helped!’ cried Daisy with tense gayety. She sat down, glanced searchingly at Miss Baker and then at me and continued: ‘I looked outdoors for a minute and it’s very romantic outdoors. There’s a bird on the lawn that I think must be a nightingale come over on the Cunard or White Star Line. He’s singing away——’ her voice sang ‘——It’s romantic, isn’t it, Tom?’ ‘Very romantic,’ he said, and then miserably to me: ‘If it’s light enough after dinner I want to take you down to the stables.’",
              "zh": "‘有个女人？’我茫然地重复道。贝克小姐点了点头。‘她总该有点体面，别在吃饭时间打电话给他吧。你不觉得吗？’我还没来得及完全理解她的意思，一阵裙摆的窸窣和皮靴的脆响传来，汤姆和黛西回到了桌边。‘实在没办法！’黛西带着紧绷的快活喊道。她坐下来，用搜索的目光看了看贝克小姐，又看了看我，继续说：‘我刚才到外面去了一分钟，外面浪漫极了。草坪上有只鸟，我想一定是乘着冠达或白星公司的船过来的夜莺。它唱得正欢——’她唱了起来，‘——很浪漫，是不是，汤姆？’‘非常浪漫，’他说，然后苦着脸对我：‘晚饭后如果天还够亮，我想带你去马厩看看。’",
              "simpEn": "‘Got some woman?’ I repeated blankly. Miss Baker nodded. ‘She could at least not call him at dinner, don’t you think?’ Just then, Daisy and Tom returned. ‘It couldn’t be helped!’ Daisy cried with forced cheerfulness. She sat down, looked hard at Miss Baker and me, and said, ‘I looked outside and it’s so romantic. There’s a bird I think is a nightingale from a big ship, singing away—’ Her voice sang. ‘—It’s romantic, isn’t it, Tom?’ ‘Very romantic,’ he said, then miserably to me: ‘If it’s still light after dinner, I want to take you to the stables.’",
              "simpZh": "‘有个女人？’我愣愣地重复。贝克小姐点点头。‘她至少该体面点，别在晚饭时间打电话吧？’我还没来得及明白，黛西和汤姆就回来了。‘没办法啊！’黛西带着勉强的欢乐叫道。她坐下，使劲看了看贝克小姐和我，又说：‘我刚才去外面看了看，外面浪漫极了。有只鸟，我想是坐大船来的夜莺，正唱着——’她的声音唱起来，‘——很浪漫，是不是，汤姆？’‘非常浪漫，’他说，然后苦着脸对我说：‘晚饭后要是天还亮，我想带你去马厩。’"
            },
            {
              "en": "The telephone rang inside, startlingly, and as Daisy shook her head decisively at Tom the subject of the stables, in fact all subjects, <span class=\"vocab-trigger\" data-vocab=\"vanished\">vanished<\/span> into air. Among the broken fragments of the last five minutes at table I remember the candles being lit again, pointlessly, and I was conscious of wanting to look squarely at every one and yet to avoid all eyes. I couldn’t guess what Daisy and Tom were thinking but I doubt if even Miss Baker who seemed to have mastered a certain hardy skepticism was able utterly to put this fifth guest’s <span class=\"vocab-trigger\" data-vocab=\"shrill\">shrill<\/span> metallic urgency out of mind. To a certain temperament the situation might have seemed intriguing—my own instinct was to telephone immediately for the police.",
              "zh": "屋里电话又响了，令人心惊，黛西坚决地对汤姆摇了摇头，于是马厩的话题，事实上所有的话题，都消散在了空中。在餐桌最后五分钟那些破碎的片段里，我记得蜡烛又被无谓地点燃，我意识到自己既想正视每个人，又想回避所有的目光。我猜不出黛西和汤姆在想什么，但我怀疑就连似乎磨练出了一副坚硬怀疑态度的贝克小姐，也无法完全将那第五位客人尖锐刺耳的急切声响抛诸脑后。对某些性情的人来说，这情景或许很引人入胜——我自己的本能却是立即打电话叫警察。",
              "simpEn": "The phone rang again, startling everyone. Daisy firmly shook her head at Tom, and the stables subject vanished, along with all others. I remember the candles being lit again, pointlessly, and I wanted both to look at everyone squarely and to avoid all eyes. I couldn’t guess what Daisy and Tom were thinking, and I doubt even the skeptical Miss Baker could ignore that fifth guest’s shrill metallic urgency. To some, the situation might seem interesting—my instinct was to call the police.",
              "simpZh": "电话又响了，吓人一跳。黛西坚决地对汤姆摇了摇头，马厩的话题，所有话题都消失了。我只记得蜡烛又被无谓地点燃，我想直视每个人又想避开所有目光。我猜不出黛西和汤姆在想什么，就连一向怀疑的贝克小姐恐怕也没法完全忘记那第五位客人刺耳的金属般急迫的声音。对某些人来说这情形可能很有趣——我的第一反应是打电话叫警察。"
            },
            {
              "en": "The horses, needless to say, were not mentioned again. Tom and Miss Baker, with several feet of <span class=\"vocab-trigger\" data-vocab=\"twilight\">twilight<\/span> between them strolled back into the library, as if to a <span class=\"vocab-trigger\" data-vocab=\"vigil\">vigil<\/span> beside a perfectly <span class=\"vocab-trigger\" data-vocab=\"tangible\">tangible<\/span> body, while trying to look pleasantly interested and a little deaf I followed Daisy around a chain of connecting verandas to the porch in front. In its deep <span class=\"vocab-trigger\" data-vocab=\"gloom\">gloom<\/span> we sat down side by side on a wicker settee. Daisy took her face in her hands, as if feeling its lovely shape, and her eyes moved gradually out into the velvet dusk. I saw that <span class=\"vocab-trigger\" data-vocab=\"turbulent\">turbulent<\/span> emotions possessed her, so I asked what I thought would be some sedative questions about her little girl.",
              "zh": "不用说，马再也没有被提起。汤姆和贝克小姐，两人之间隔着几英尺的暮色，漫步走回书房，仿佛去守着一个清晰可触的尸体，而我则尽量装出愉快而感兴趣的样子，又稍微装聋，跟着黛西绕了一串相连的阳台，来到前面的门廊。在深深的阴暗里，我们并排坐在一张柳条长椅上。黛西双手捧住脸，仿佛在感受那可爱的轮廓，她的眼睛慢慢地移入天鹅绒般的暮色中。我看出激烈的情绪占据了她，于是我问了一些自以为能安抚她的话，问起了她的小女儿。",
              "simpEn": "The horses were never mentioned again. Tom and Miss Baker, with several feet of twilight between them, strolled back to the library, like keeping watch over a body. Trying to look interested and a bit deaf, I followed Daisy through connecting verandas to the front porch. In the deep gloom, we sat side by side on a wicker settee. Daisy held her face, feeling its shape, and her eyes moved out into the dark. I saw she was upset, so I asked calming questions about her little girl.",
              "simpZh": "马再也没有被提起。汤姆和贝克小姐隔着几步暮色，慢慢走回了书房，像是在守着一具实实在在的尸体。我尽量做出感兴趣又有点聋的样子，跟着黛西穿过相连的阳台，来到前面的走廊。在深深的阴暗里，我们并排坐在一张柳条长椅上。黛西双手捧着脸，像在摸它的美丽形状，眼睛慢慢移向天鹅绒般的暮色中。我看她很激动，就问了些安慰的问题，问她的小女儿。"
            },
            {
              "en": "‘We don’t know each other very well, Nick,’ she said suddenly. ‘Even if we are cousins. You didn’t come to my wedding.’ ‘I wasn’t back from the war.’ ‘That’s true.’ She hesitated. ‘Well, I’ve had a very bad time, Nick, and I’m pretty cynical about everything.’ Evidently she had reason to be. I waited but she didn’t say any more, and after a moment I returned rather feebly to the subject of her daughter. ‘I suppose she talks, and—eats, and everything.’ ‘Oh, yes.’ She looked at me absently. ‘Listen, Nick; let me tell you what I said when she was born. Would you like to hear?’ ‘Very much.’",
              "zh": "‘我们彼此还不太了解，尼克，’她突然说，‘虽然我们是亲戚。你没来参加我的婚礼。’‘那时我还没从战场上回来。’‘这倒是。’她犹豫了一下。‘唉，我过得很糟糕，尼克，我对一切都相当悲观了。’她显然有理由这样。我等着，但她没再多说，过了一会儿，我相当无力地又把话题转回她女儿身上。‘我想她会说话，会——吃饭什么的了吧。’‘哦，是的。’她心不在焉地看着我。‘听着，尼克，让我告诉你她出生时我说的话。你想听吗？’‘很想。’",
              "simpEn": "‘We don’t know each other very well, Nick,’ she said suddenly. ‘Even if we’re cousins. You didn’t come to my wedding.’ ‘I was still overseas.’ ‘That’s true.’ She paused. ‘Well, I’ve had a bad time, Nick, and I’m pretty cynical.’ She clearly had reasons. I waited, but she stayed silent. Feebly, I went back to her daughter. ‘I suppose she talks and eats and everything.’ ‘Oh, yes.’ She looked at me absently. ‘Listen, Nick; let me tell you what I said when she was born. Want to hear?’ ‘Very much.’",
              "simpZh": "‘我们不太了解对方，尼克，’她突然说，‘虽然是亲戚。你没来我的婚礼。’‘我在战场上还没回来。’‘也是。’她犹豫了一下。‘唉，我过得很糟，尼克，对什么都看透了。’她肯定有原因。我没说话，她也没再说。过了一会儿，我没底气地又提起她女儿。‘我想她会说话、吃东西什么的了吧。’‘哦，是的。’她心不在焉地看着我。‘听着，尼克，我告诉你她出生时我说的话。你想听吗？’‘很想。’"
            },
            {
              "en": "‘It’ll show you how I’ve gotten to feel about—things. Well, she was less than an hour old and Tom was God knows where. I woke up out of the ether with an utterly <span class=\"vocab-trigger\" data-vocab=\"abandoned\">abandoned<\/span> feeling and asked the nurse right away if it was a boy or a girl. She told me it was a girl, and so I turned my head away and wept. ‘All right,’ I said, ‘I’m glad it’s a girl. And I hope she’ll be a fool—that’s the best thing a girl can be in this world, a beautiful little fool.’ ‘You see I think everything’s terrible anyhow,’ she went on in a convinced way. ‘Everybody thinks so—the most advanced people. And I KNOW. I’ve been everywhere and seen everything and done everything.’",
              "zh": "‘这能让你明白我对——事情的感受。嗯，她出生还不到一个小时，汤姆不知去了哪里。我从麻醉中醒来，感到一种彻底被抛弃的感觉，马上问护士是男孩还是女孩。她告诉我是个女孩，于是我把头扭过去，哭了。‘好吧，’我说，‘我很高兴是个女孩。但愿她将来是个傻瓜——那是一个女孩在这个世界上最好的出路，一个漂亮的小傻瓜。’‘你看，我觉得一切都很糟糕，’她用一种坚信不疑的语气继续说，‘大家都这么想——那些最先进的人也这么想。而我是知道的。我什么地方都去过，什么都见过，什么都做过。’",
              "simpEn": "‘It’ll show you how I feel about things. She was less than an hour old and Tom was God knows where. I woke up from the anesthetic feeling completely alone and asked if it was a boy or girl. She said a girl, so I turned away and cried. ‘Alright,’ I said, ‘I’m glad it’s a girl. And I hope she’ll be a fool—that’s the best thing a girl can be, a beautiful little fool.’ ‘You see, I think everything is terrible anyway,’ she went on firmly. ‘Everyone thinks so—the most advanced people. And I know. I’ve been everywhere, seen everything, done everything.’",
              "simpZh": "‘这会让你明白我对事情的感受。她出生不到一小时，汤姆不知道跑哪儿去了。我从麻醉中醒来，感到彻底被抛弃，马上问护士是男是女。她说是女孩，我就扭过头哭了。‘好吧，’我说，‘我很高兴是女孩。我希望她将来是个傻瓜——那是一个女孩最好的出路，一个漂亮的小傻瓜。’‘你看，我觉得一切都很糟，’她坚定地继续说，‘大家都这么想——最先进的人也这么想。而我知道。我哪儿都去过，什么都见过，什么都做过。’"
            },
            {
              "en": "Her eyes flashed around her in a defiant way, rather like Tom’s, and she laughed with thrilling <span class=\"vocab-trigger\" data-vocab=\"scorn\">scorn<\/span>. ‘Sophisticated—God, I’m sophisticated!’ The instant her voice broke off, ceasing to compel my attention, my belief, I felt the basic insincerity of what she had said. It made me uneasy, as though the whole evening had been a trick of some sort to exact a contributory emotion from me. I waited, and sure enough, in a moment she looked at me with an absolute smirk on her lovely face as if she had asserted her membership in a rather distinguished secret society to which she and Tom belonged.",
              "zh": "她的眼睛以一种不服气的神情四下闪烁，很像汤姆，她带着令人激动的轻蔑笑了笑。‘老于世故——天哪，我真老于世故！’她的声音一停，不再强求我的注意力和信任，我就感觉到她说的话根本是不真诚的。这让我不安，仿佛整个晚上都是某种骗局，想从我这里榨出一点配合的感情。我等着，果然，不一会儿她就带着一副绝对的假笑看着我可爱的脸上，仿佛她刚刚宣称了自己是某个她和汤姆所属的尊贵秘密社团的成员。",
              "simpEn": "Her eyes flashed around defiantly, much like Tom’s, and she laughed with thrilling scorn. ‘Sophisticated—God, I’m sophisticated!’ The moment her voice stopped, I felt the basic insincerity of what she said. It made me uneasy, as if the whole evening had been a trick to get an emotional contribution from me. I waited, and sure enough, she soon gave me a full smirk, as if announcing she and Tom belonged to some special secret club.",
              "simpZh": "她的眼睛不服气地扫来扫去，很像汤姆，她轻蔑地笑了笑。‘老于世故——天哪，我真老于世故！’她声音一停，我就觉得她说的一点也不真诚。这让我不安，好像整个晚上都是个圈套，想从我这里骗点感情出来。我等着，果然，她马上对我露出十足的假笑，好像宣布她和汤姆属于某个秘密的高等俱乐部。"
            },
            {
              "en": "Inside, the crimson room bloomed with light. Tom and Miss Baker sat at either end of the long couch and she read aloud to him from the ‘Saturday Evening Post’—the words, murmurous and uninflected, running together in a soothing tune. The lamp-light, bright on his boots and dull on the autumn-leaf yellow of her hair, glinted along the paper as she turned a page with a flutter of slender muscles in her arms. When we came in she held us silent for a moment with a lifted hand. ‘To be continued,’ she said, tossing the magazine on the table, ‘in our very next issue.’",
              "zh": "屋里，深红色的房间灯火通明。汤姆和贝克小姐分坐在长沙发的两头，她正大声给他朗读《星期六晚邮报》——那些喃喃的、没有抑扬的话语，汇成一支抚慰的调子。灯光在他的靴子上明晃晃的，照在她秋叶黄的头发上却暗淡柔和，她翻过一页时，光在纸上闪烁，臂上纤细的肌肉微微颤动。我们进来时，她抬起一只手让我们安静了片刻。‘未完待续，’她说，把杂志扔到桌上，‘下期继续。’",
              "simpEn": "Inside, the red room glowed with light. Tom and Miss Baker sat on opposite ends of the couch; she was reading aloud from a magazine in a soft, steady murmur. The lamp shone bright on his boots and soft on her autumn-leaf hair, glinting on the page as she turned it. When we entered, she raised a hand for silence. ‘To be continued,’ she said, tossing the magazine down, ‘in our very next issue.’",
              "simpZh": "屋里，深红色的房间灯火辉煌。汤姆和贝克小姐坐在长沙发两头，她正用平缓的声音给他读一本杂志。灯光在他的靴子上很亮，在她秋叶黄的头发上很柔和，她翻页时纸面上闪着光。我们进来时，她抬了抬手让我们安静。‘未完待续，’她说着把杂志扔在桌上，‘下期再见。’"
            },
            {
              "en": "Her body asserted itself with a <span class=\"vocab-trigger\" data-vocab=\"restless\">restless<\/span> movement of her knee, and she stood up. ‘Ten o’clock,’ she remarked, apparently finding the time on the ceiling. ‘Time for this good girl to go to bed.’ ‘Jordan’s going to play in the tournament tomorrow,’ explained Daisy, ‘over at Westchester.’ ‘Oh,—you’re JORdan Baker.’ I knew now why her face was familiar—its pleasing <span class=\"vocab-trigger\" data-vocab=\"contemptuous\">contemptuous<\/span> expression had looked out at me from many rotogravure pictures of the sporting life at Asheville and Hot Springs and Palm Beach. I had heard some story of her too, a critical, unpleasant story, but what it was I had forgotten long ago.",
              "zh": "她的身体随着膝盖不安分地一动，站起身来。‘十点了，’她说，显然是从天花板上看出了时间，‘这个乖女孩该上床了。’‘乔丹明天要参加锦标赛，’黛西解释道，‘在韦斯切斯特那边。’‘哦——你是乔丹麦。’我现在知道为什么她的脸如此面熟了——那副愉快而轻蔑的表情，曾多次从阿什维尔、温泉和棕榈滩的体育生活画报上注视着我。我也听说过她的一些事，一件苛刻而不愉快的轶事，但究竟是什么我早忘了。",
              "simpEn": "With a restless knee, she stood up. ‘Ten o’clock,’ she said, glancing at the ceiling. ‘Time for this good girl to go to bed.’ ‘Jordan’s playing in a tournament tomorrow,’ Daisy explained, ‘at Westchester.’ ‘Oh—you’re JORdan Baker.’ Now I remembered why her face was familiar—that amused, scornful expression had looked at me from many sports photos. I’d also heard a critical story about her, but I had long forgotten it.",
              "simpZh": "她膝盖不安分地动了动，站了起来。‘十点了，’她看着天花板说，‘乖女孩该睡了。’‘乔丹明天要打锦标赛，’黛西解释，‘在韦斯切斯特。’‘哦——你是乔丹·贝克。’我现在想起她为什么面熟了——那副带着愉快轻蔑的神情，曾多次从体育画报的照片里看着我。我也听说过她的一些不好的故事，但早忘了。"
            },
            {
              "en": "‘Good night,’ she said softly. ‘Wake me at eight, won’t you.’ ‘If you’ll get up.’ ‘I will. Good night, Mr. Carraway. See you anon.’ ‘Of course you will,’ confirmed Daisy. ‘In fact I think I’ll arrange a marriage. Come over often, Nick, and I’ll sort of—oh—fling you together. You know—lock you up accidentally in linen closets and push you out to sea in a boat, and all that sort of thing——‘ ‘Good night,’ called Miss Baker from the stairs. ‘I haven’t heard a word.’",
              "zh": "‘晚安，’她轻声说，‘明天八点叫醒我，行吗？’‘只要你肯起床。’‘我会的。晚安，卡拉韦先生。回头见。’‘你当然会见到，’黛西确认道，‘其实我想我会安排一桩婚事。常来玩，尼克，我会想法子——哦——把你们撮合到一起。你知道——把你们不小心锁在亚麻衣柜里，或者用小船把你们推到海里去，诸如此类——’‘晚安，’贝克小姐从楼梯上喊道，‘我什么都没听见。’",
              "simpEn": "‘Good night,’ she said softly. ‘Wake me at eight, won’t you?’ ‘If you’ll get up.’ ‘I will. Good night, Mr. Carraway. See you soon.’ ‘Of course you will,’ Daisy said. ‘In fact, I think I’ll arrange a marriage. Come over often, Nick, and I’ll sort of throw you together—lock you in linen closets or push you out to sea in a boat, that kind of thing.’ ‘Good night,’ called Miss Baker from the stairs. ‘I heard nothing.’",
              "simpZh": "‘晚安，’她轻声说，‘明天八点叫醒我，行吗？’‘只要你肯起来。’‘我会的。晚安，卡拉韦先生。回头见。’‘一定会，’黛西说，‘其实我想安排一桩婚事。常来，尼克，我会设法把你们撮合到一起——把你们锁在衣柜里，或者用船把你们推到海里去之类的。’‘晚安，’贝克小姐从楼梯上喊，‘我什么也没听见。’"
            },
            {
              "en": "‘She’s a nice girl,’ said Tom after a moment. ‘They oughtn’t to let her run around the country this way.’ ‘Who oughtn’t to?’ inquired Daisy coldly. ‘Her family.’ ‘Her family is one aunt about a thousand years old. Besides, Nick’s going to look after her, aren’t you, Nick? She’s going to spend lots of week-ends out here this summer. I think the home influence will be very good for her.’ Daisy and Tom looked at each other for a moment in silence. ‘Is she from New York?’ I asked quickly. ‘From Louisville. Our white girlhood was passed together there. Our beautiful white——‘ ‘Did you give Nick a little heart to heart talk on the veranda?’ demanded Tom suddenly.",
              "zh": "‘她是个好女孩，’汤姆过了一会儿说，‘他们不该让她这样在全国到处乱跑。’‘谁不该？’黛西冷冷地问。‘她家里人。’‘她家里人就一个活了差不多一千年的姑妈。再说，尼克会照看她的，是吧，尼克？她这个夏天会有很多周末来这儿住。我想家庭的影响会对她很有好处。’黛西和汤姆对视了片刻，沉默着。‘她是纽约人吗？’我赶紧问道。‘路易斯维尔的。我们洁白的少女时代一起在那里度过。我们美丽的白色——’‘你在阳台上跟尼克推心置腹谈过了吗？’汤姆突然质问道。",
              "simpEn": "‘She’s a nice girl,’ Tom said. ‘They shouldn’t let her run around the country like this.’ ‘Who shouldn’t?’ Daisy asked coldly. ‘Her family.’ ‘Her family is one ancient aunt. Besides, Nick’s going to look after her, aren’t you, Nick? She’ll spend many weekends here this summer. I think home influence will be good for her.’ Daisy and Tom looked at each other silently. ‘Is she from New York?’ I asked quickly. ‘Louisville. Our pure girlhood was together there. Our beautiful white—’ ‘Did you have a heart-to-heart talk with Nick on the veranda?’ Tom suddenly demanded.",
              "simpZh": "‘她是个好女孩，’汤姆说，‘他们不该让她这样到处乱跑。’‘谁不该？’黛西冷冷地问。‘她家人。’‘她家人就一个老掉牙的姑妈。再说，尼克会照顾她的，是吧，尼克？她夏天会经常来这儿过周末。家庭影响对她有好处。’黛西和汤姆默默对视了一会儿。‘她是纽约人吗？’我赶紧问。‘路易斯维尔的。我们洁白的少女时代一起在那里度过。我们美丽的白色——’‘你在阳台上跟尼克推心置腹谈过了吗？’汤姆突然质问。"
            },
            {
              "en": "‘Did I?’ She looked at me. ‘I can’t seem to remember, but I think we talked about the Nordic race. Yes, I’m sure we did. It sort of crept up on us and first thing you know——‘ ‘Don’t believe everything you hear, Nick,’ he advised me. I said lightly that I had heard nothing at all, and a few minutes later I got up to go home. They came to the door with me and stood side by side in a cheerful square of light. As I started my motor Daisy peremptorily called ‘Wait! I forgot to ask you something, and it’s important. We heard you were engaged to a girl out West.’ ‘That’s right,’ corroborated Tom kindly. ‘We heard that you were engaged.’ ‘It’s libel. I’m too poor.’ ‘But we heard it,’ insisted Daisy, surprising me by opening up again in a flower-like way. ‘We heard it from three people so it must be true.’",
              "zh": "‘谈过了吗？’她看着我。‘我好像不记得了，但我想我们聊了北欧种族。对，我肯定聊了。这个话题不知怎么就悄悄溜了出来，然后你瞧——’‘别听见什么就信什么，尼克，’他劝我。我轻松地说我什么也没听见，几分钟后我起身回家。他们送我到门口，并排站在一个欢快的方形灯光里。我发动车子时，黛西专横地叫道：‘等等！我忘了问你一件事，很重要。我们听说你跟西部的一个女孩订了婚。’‘没错，’汤姆和蔼地证实道，‘我们听说你订婚了。’‘这是诽谤。我太穷了。’‘可我们听说了，’黛西坚持道，她又像花一样绽开了，令我吃惊，‘我们是听三个人说的，那肯定是真的。’",
              "simpEn": "‘Did I?’ She looked at me. ‘I can’t remember, but I think we talked about the Nordic race. Yes, I’m sure we did. It just sort of crept up on us.’ ‘Don’t believe everything you hear, Nick,’ Tom advised. I said I’d heard nothing, and soon I got up to leave. They came to the door with me, standing side by side in the bright square of light. As I started the car, Daisy called, ‘Wait! I forgot to ask something important. We heard you’re engaged to a girl out West.’ ‘That’s right,’ Tom confirmed. ‘We heard you were engaged.’ ‘It’s a lie. I’m too poor.’ ‘But we heard it,’ Daisy insisted, blooming again. ‘We heard it from three people, so it must be true.’",
              "simpZh": "‘谈过了吗？’她看着我。‘我不太记得，但我想我们聊了北欧种族。对，肯定聊了。这事不知怎么出来的。’‘别听见风就是雨，尼克，’汤姆劝我。我轻松地说我啥也没听见，一会儿后我起身回家。他们送我到门口，并排站在明亮的灯光下。我发动车子时，黛西叫道：‘等等！忘了问你一件重要的事。我们听说你在西部和一个女孩订婚了。’‘对，’汤姆和善地证明，‘我们听说你订婚了。’‘这是造谣，我太穷了。’‘可我们听说了，’黛西坚持，她又像花一样绽放了，令我吃惊，‘我们是听三个人说的，那肯定是真的。’"
            },
            {
              "en": "Of course I knew what they were referring to, but I wasn’t even vaguely engaged. The fact that gossip had published the banns was one of the reasons I had come east. You can’t stop going with an old friend on account of rumors and on the other hand I had no intention of being rumored into marriage. Their interest rather touched me and made them less <span class=\"vocab-trigger\" data-vocab=\"remotely\">remotely<\/span> rich—nevertheless, I was confused and a little disgusted as I drove away. It seemed to me that the thing for Daisy to do was to rush out of the house, child in arms—but apparently there were no such intentions in her head.",
              "zh": "我当然知道他们指的是什么，但我压根儿没有订过婚。谣言已经把结婚预告都公布了，这是我来到东部的原因之一。你不能因为谣言就断绝与老朋友的来往，另一方面我也不打算被谣言逼进婚姻里。他们的关心倒有些让我感动，使他们显得不那么遥不可及的富有——然而，我开车离开时，还是有些困惑和些许厌恶。在我看来，黛西应该抱着孩子冲出那幢房子——但显然她脑子里完全没有这样的打算。",
              "simpEn": "I knew what they were talking about, but I wasn’t engaged at all. That gossip was one reason I moved east. You can’t drop a friend over rumors, and I wasn’t going to be pushed into marriage by them. Their concern touched me a little, making them seem less far above me, but I was confused and somewhat disgusted as I drove away. I felt Daisy should rush out with her child, but clearly she had no such plan.",
              "simpZh": "我知道他们在说什么，但我压根没订婚。谣言都传得像真的，这也是我搬到东部的原因之一。你不能因为谣言就和一个老朋友绝交，我也不想被谣言逼进婚姻。他们的关心让我有点感动，显得不那么遥不可及，但我开车离开时又困惑又有点反感。我觉得黛西应该抱着孩子冲出来，可她显然没那个意思。"
            },
            {
              "en": "As for Tom, the fact that he ‘had some woman in New York’ was really less surprising than that he had been depressed by a book. Something was making him <span class=\"vocab-trigger\" data-vocab=\"nibble at the edge\">nibble at the edge<\/span> of <span class=\"vocab-trigger\" data-vocab=\"stale ideas\">stale ideas<\/span> as if his <span class=\"vocab-trigger\" data-vocab=\"sturdy physical egotism\">sturdy physical egotism<\/span> no longer nourished his <span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart\"><span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart<\/span>\"><span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart\"><span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart<\/span><\/span>\"><span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart\"><span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart<\/span>\"><span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart\"><span class=\"vocab-trigger\" data-vocab=\"peremptory\">peremptory<\/span> heart<\/span><\/span><\/span>.",
              "zh": "至于汤姆，他‘在纽约有个女人’这件事，其实比他因为一本书而沮丧更不令人惊讶。有什么东西正让他啃噬着陈旧思想的边缘，仿佛他健壮身体的自大已不再能滋养他那专横的心。",
              "simpEn": "As for Tom, the fact that he had a mistress was less surprising than him being upset by a book. Something was making him pick at stale ideas, as if his physical pride no longer fed his arrogant heart.",

            },
            {
              "en": "Already it was <span class=\"vocab-trigger\" data-vocab=\"deep summer\">deep summer<\/span> on <span class=\"vocab-trigger\" data-vocab=\"roadhouse roofs\">roadhouse roofs<\/span> and in front of wayside garages, where new red <span class=\"vocab-trigger\" data-vocab=\"gas-pumps\">gas-pumps<\/span> sat out in pools of light, and when I reached my estate at West Egg I ran the car under its shed and sat for a while on an <span class=\"vocab-trigger\" data-vocab=\"abandoned\">abandoned<\/span> <span class=\"vocab-trigger\" data-vocab=\"grass roller\">grass roller<\/span> in the yard. The wind had blown off, leaving a <span class=\"vocab-trigger\" data-vocab=\"loud bright night\">loud bright night<\/span> with <span class=\"vocab-trigger\" data-vocab=\"wings beating\">wings beating<\/span> in the trees and a <span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> organ sound\"><span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> organ sound<\/span>\"><span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> organ sound\"><span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span> organ sound<\/span><\/span> as the <span class=\"vocab-trigger\" data-vocab=\"full bellows of the earth\">full bellows of the earth<\/span> blew the frogs full of life. The <span class=\"vocab-trigger\" data-vocab=\"silhouette\">silhouette<\/span> of a moving cat wavered across the moonlight and turning my head to watch it I saw that I was not alone—fifty feet away a figure had emerged from the shadow of my neighbor’s <span class=\"vocab-trigger\" data-vocab=\"mansion\">mansion<\/span> and was standing with his hands in his pockets regarding the <span class=\"vocab-trigger\" data-vocab=\"silver pepper of the stars\">silver pepper of the stars<\/span>.",
              "zh": "旅馆的屋顶和路旁车库前早已是盛夏的景象，新的红色加油泵坐在灯光池塘里，等我回到西卵的住处时，我把车开进车棚，在院子里一辆废弃的草坪滚筒上坐了一会儿。风已经停了，留下一个喧闹而明亮的夜晚，树上有翅膀拍动的声音，地球那巨大的风箱吹得青蛙饱满的鸣叫持续不断。一只猫的剪影摇摇晃晃地掠过月光，我转过头去看它，却发现我并非独自一人——五十英尺开外，一个人影从我邻居宅邸的阴影中走了出来，双手插在口袋里，凝望着那洒满银粉似的星辰。",

              "simpZh": "路边旅馆屋顶和加油站前已经是盛夏景象，新的红色加油泵在灯光下亮着。我回到西卵，把车开进车棚，坐在院里一个废弃的压草滚子上。风停了，夜晚明亮而喧闹，树间有翅膀扑腾的声音，青蛙叫得像风琴一样持续不断。一只猫的影子在月光下晃动，我转头去看，发现我并不孤单——五十英尺外，一个人从邻居大宅的影子里出来，双手插兜，凝望着银色的星光。"
            },
            {
              "en": "Something in his leisurely movements and the secure position of his feet upon the lawn suggested that it was Mr. Gatsby himself, come out to determine what share was his of our local heavens. I decided to call to him. Miss Baker had mentioned him at dinner, and that would do for an introduction. But I didn’t call to him for he gave a sudden <span class=\"vocab-trigger\" data-vocab=\"intimation\">intimation<\/span> that he was content to be alone—he stretched out his arms toward the dark water in a <span class=\"vocab-trigger\" data-vocab=\"curious\">curious<\/span> way, and far as I was from him I could have sworn he was trembling. Involuntarily I glanced seaward—and distinguished nothing except a single green light, minute and far away, that might have been the end of a dock. When I looked once more for Gatsby he had <span class=\"vocab-trigger\" data-vocab=\"vanished\">vanished<\/span>, and I was alone again in the <span class=\"vocab-trigger\" data-vocab=\"unquiet darkness\">unquiet darkness<\/span>.",
              "zh": "他那悠闲的动作和双脚稳稳踏在草坪上的姿态，表明那正是盖茨比先生本人，出来确定他在这片当地的天空中拥有几分。我决定叫他一声。贝克小姐在晚宴上提起过他，这足以充当引荐。但我没有叫他，因为他突然隐隐约约地流露出一种宁愿独处的神情——他朝着那片黑茫茫的海水以一种奇特的方式伸出双臂，虽然我离他很远，但我几乎可以发誓他在颤抖。我不由自主地朝海的方向望去——除了远处一盏微小的、可能是一座码头尽头的孤零零的绿灯外，什么也分辨不出。当我再次转头寻找盖茨比时，他已经消失不见了，我重又独自置身于这不宁静的黑暗中。",
              "simpEn": "His easy movements and firmly planted feet told me this was Mr. Gatsby himself, out to see his share of our local sky. I thought of calling out—Miss Baker had mentioned him, so that would be an introduction. But I didn’t, because he suddenly seemed to want to be alone. He stretched his arms out toward the dark water in a curious way, and even from far away I could swear he was trembling. I looked toward the sea without thinking—and saw nothing but a single green light, tiny and far away, maybe the end of a dock. When I looked back, Gatsby was gone, and I was alone in the restless darkness.",
              "simpZh": "他悠闲的动作和稳稳站在草坪上的样子，让我觉得那就是盖茨比本人，出来看看这片天空里有几分属于他。我想叫他一声——贝克小姐在晚饭时提过他，这样就算有个介绍了。但我没叫，因为他突然流露出想独自待着的意味——他朝着黑沉沉的海水以一种奇怪的方式伸出了双臂，虽然离得远，我可以发誓他在发抖。我不由自主地朝海那边望去——除了远处一盏微小的、可能是个码头尽头的孤零零的绿灯，什么也看不见。再回头看盖茨比时，他已经不见了，我又独自一人留在这不安宁的黑暗里。"

              "en": "The interior was <span class=\"vocab-trigger\" data-vocab=\"unprosperous\">unprosperous<\/span> and bare; the only car visible was the dust-covered wreck of a Ford which <span class=\"vocab-trigger\" data-vocab=\"crouched\">crouched<\/span> in a dim corner. It had occurred to me that this <span class=\"vocab-trigger\" data-vocab=\"shadow of a garage\">shadow of a garage<\/span> must be a <span class=\"vocab-trigger\" data-vocab=\"blind\">blind<\/span> and that <span class=\"vocab-trigger\" data-vocab=\"sumptuous\">sumptuous<\/span> and romantic apartments were <span class=\"vocab-trigger\" data-vocab=\"concealed\">concealed<\/span> overhead when the <span class=\"vocab-trigger\" data-vocab=\"proprietor\">proprietor<\/span> himself appeared in the door of an office, wiping his hands on a piece of waste. He was a blonde, <span class=\"vocab-trigger\" data-vocab=\"spiritless\">spiritless<\/span> man, <span class=\"vocab-trigger\" data-vocab=\"anaemic\">anaemic<\/span>, and faintly handsome. When he saw us a damp gleam of hope sprang into his light blue eyes.",
              "zh": "室内一片空荡，透着萧条；唯一可见的车是一辆布满灰尘的福特牌破车，蜷缩在阴暗的角落里。我不禁想，这个影子般的修车厂一定是个幌子，楼上隐藏着豪华浪漫的公寓，就在这时，老板本人从办公室门口出现了，正拿一团废棉纱擦手。他是个金发、无精打采、贫血的瘦弱男人，带着一丝微弱的俊朗。看到我们时，他那淡蓝色的眼睛里闪过一丝潮湿的希望。",
              "simpEn": "Inside it was empty and poor; the only car was a dusty, broken-down Ford lying in a dark corner. I thought maybe this tiny garage was just a cover, with fancy hidden apartments above, but then the owner showed up, wiping his hands on a rag. He was blond, lifeless, pale, and a little handsome. Seeing us, a weak hope lit his eyes.",
              "simpZh": "修车厂里面空空的，很破落；只有一辆灰扑扑的破福特停在暗角里。我正想这惨兮兮的修车厂大概是个幌子，楼上藏着豪华公寓，老板就出现了，拿破布擦着手。他金发，没精神，脸色苍白，稍微有点帅。看见我们时，他淡蓝色的眼睛里闪过一点湿湿的希望。"
            },
            {
              "en": "‘Hello, Wilson, old man,’ said Tom, slapping him <span class=\"vocab-trigger\" data-vocab=\"jovially\">jovially<\/span> on the shoulder. ‘How’s business?’ ‘I can’t complain,’ answered Wilson <span class=\"vocab-trigger\" data-vocab=\"unconvincingly\">unconvincingly<\/span>. ‘When are you going to sell me that car?’ ‘Next week; I’ve got my man working on it now.’ ‘Works pretty slow, don’t he?’ ‘No, he doesn’t,’ said Tom coldly. ‘And if you feel that way about it, maybe I’d better sell it somewhere else after all.’ ‘I don’t mean that,’ explained Wilson quickly. ‘I just meant——‘ His voice faded off and Tom glanced impatiently around the garage.",
              "zh": "‘你好啊，威尔逊，老兄，’汤姆快活地拍了拍他的肩膀说，‘生意怎么样？’‘还行吧，’威尔逊说得毫无说服力。‘你什么时候把那辆车卖给我？’‘下周；我已经让我的人在弄了。’‘他干活可真慢，是吧？’‘不，他并不懒，’汤姆冷冷地说，‘如果你这样想，也许我该卖到别处去。’‘我不是那个意思，’威尔逊连忙解释，‘我只是——’他的声音逐渐消失，汤姆不耐烦地扫视着车库。",
              "simpEn": "‘Hello, Wilson, old man,’ Tom said, slapping him cheerfully. ‘How’s business?’ ‘Can’t complain,’ Wilson said, not sounding convinced. ‘When will you sell me that car?’ ‘Next week; my man is working on it now.’ ‘Works pretty slow, doesn’t he?’ ‘No, he doesn’t,’ Tom said coldly. ‘If you feel that way, maybe I’ll sell it elsewhere.’ ‘I didn’t mean that,’ Wilson said quickly, his voice fading. Tom looked around impatiently.",
              "simpZh": "‘嗨，威尔逊，老伙计，’汤姆高兴地拍拍他肩膀，‘生意怎么样？’‘还行吧，’威尔逊说得不咋可信。‘你什么时候把那车卖给我？’‘下周；我找人在弄了。’‘他干活挺慢的啊？’‘不，他不慢，’汤姆冷冷地说，‘如果你觉着这样，也许我该卖别处去。’‘我不是那意思，’威尔逊赶紧说，声音越来越小。汤姆不耐烦地扫了眼车库。"
            },
            {
              "en": "Then I heard footsteps on a stairs and in a moment the thickish figure of a woman blocked out the light from the office door. She was in the middle thirties, and <span class=\"vocab-trigger\" data-vocab=\"faintly stout\">faintly stout<\/span>, but she carried her surplus flesh <span class=\"vocab-trigger\" data-vocab=\"sensuously\">sensuously<\/span> as some women can. Her face, above a spotted dress of dark blue <span class=\"vocab-trigger\" data-vocab=\"crepe-de-chine\">crepe-de-chine<\/span>, contained no <span class=\"vocab-trigger\" data-vocab=\"facet\">facet<\/span> or gleam of beauty but there was an immediately <span class=\"vocab-trigger\" data-vocab=\"perceptible\">perceptible<\/span> <span class=\"vocab-trigger\" data-vocab=\"vitality\">vitality<\/span> about her as if the nerves of her body were continually <span class=\"vocab-trigger\" data-vocab=\"smouldering\">smouldering<\/span>. She smiled slowly and walking through her husband as if he were a ghost shook hands with Tom, looking him <span class=\"vocab-trigger\" data-vocab=\"flush\">flush<\/span> in the eye. Then she wet her lips and without turning around spoke to her husband in a soft, coarse voice: ‘Get some chairs, why don’t you, so somebody can sit down.’",
              "zh": "然后我听到了楼梯上的脚步声，转眼间一个粗壮的女人身影挡住了办公室门的光线。她三十五六岁，稍有发福，却像有些女人那样把多余的肉感带得很有风韵。她那张脸，在一件深蓝色双绉的斑点连衣裙上方，丝毫谈不上艳丽或光辉，但立刻就能让人感觉到一股生命力，仿佛她体内的神经一直在暗暗燃烧。她慢慢微笑着，穿过她丈夫仿佛他是鬼魂一般，和汤姆握手，直视着他的眼睛。然后她抿了抿嘴唇，头也不回地用轻柔而粗哑的嗓音对她丈夫说：‘去拿几把椅子来，好歹让人能坐下。’",
              "simpEn": "Then I heard footsteps on stairs and a plump woman blocked the office doorway. She was in her mid-thirties, a little heavy, but she moved in a sexy way. Her face, over a blue spotted dress, wasn't beautiful at all, but you immediately felt her intense energy, as if her nerves were always burning. She smiled slowly, ignored her husband like a ghost, and shook Tom's hand, looking straight into his eyes. Then she licked her lips and, without turning, told her husband in a soft, rough voice to get some chairs.",
              "simpZh": "然后我听见楼梯上有脚步声，很快一个丰满的女人堵住了办公室门口的光。她三十五六岁，微胖，但走起路来很风骚。脸上架在一件蓝底斑点的连衣裙上，一点也不漂亮，但你能立刻感到她身上那股子活力，好像身体里的神经一直在暗暗灼烧。她慢慢笑着，像穿过鬼魂一样对她丈夫视而不见，和汤姆握了手，直勾勾地看着他眼睛。然后她舔了舔嘴唇，头也不回地用又柔又粗的声音叫丈夫去搬椅子。"
            }
          ],

          "sectionId": 4,

          "paragraphs": [
            {
              "en": "‘Oh, sure,’ agreed Wilson hurriedly and went toward the little office, <span class=\"vocab-trigger\" data-vocab=\"mingling\">mingling<\/span> immediately with the cement color of the walls. A white <span class=\"vocab-trigger\" data-vocab=\"ashen\">ashen<\/span> dust veiled his dark suit and his pale hair as it veiled everything in the <span class=\"vocab-trigger\" data-vocab=\"vicinity\">vicinity<\/span>—except his wife, who moved close to Tom. ‘I want to see you,’ said Tom intently. ‘Get on the next train.’ ‘All right.’ ‘I’ll meet you by the news-stand on the lower level.’ She nodded and moved away from him just as George Wilson emerged with two chairs from his office door.",
              "zh": "‘哦，好的，’威尔逊连忙答应，朝小办公室走去，立刻融入墙壁的水泥色之中。一层白灰尘笼罩了他的深色西装和浅色头发，如同笼罩了周围的一切——除了他妻子，她已贴近汤姆。‘我要见你，’汤姆热切地说，‘坐下一班火车。’‘好吧。’‘我在地下层的报摊旁等你。’她点点头，从他身边移开，正好乔治·威尔逊从办公室门口搬着两把椅子出来。",
              "simpEn": "‘Oh, sure,’ Wilson said quickly and disappeared toward the office, blending into the grey walls. White dust covered his suit and hair like everything nearby—except his wife, who moved close to Tom. ‘I want to see you,’ Tom said intensely. ‘Get on the next train.’ ‘All right.’ ‘I’ll meet you by the news-stand on the lower level.’ She nodded and moved away just as George came out with two chairs.",
              "simpZh": "‘哦，好的，’威尔逊赶紧答应，走去小办公室，立刻跟灰色墙壁混成一体。白灰尘盖住了他的西服和浅色头发，也盖住了周围所有东西——除了他老婆，她已经贴近汤姆。‘我要见你，’汤姆急切地说，‘坐下一班车。’‘好。’‘我在下层报摊那等你。’她点点头，从他身边走开，正好乔治搬着两把椅子出来。"
            },
            {
              "en": "We waited for her down the road and out of sight. It was a few days before the Fourth of July, and a grey, <span class=\"vocab-trigger\" data-vocab=\"scrawny\">scrawny<\/span> Italian child was setting <span class=\"vocab-trigger\" data-vocab=\"torpedoes\">torpedoes<\/span> in a <span class=\"vocab-trigger\" data-vocab=\"row\">row<\/span> along the railroad track. ‘Terrible place, isn’t it,’ said Tom, exchanging a frown with Doctor Eckleburg. ‘Awful.’ ‘It does her good to get away.’ ‘Doesn’t her husband object?’ ‘Wilson? He thinks she goes to see her sister in New York. He’s so <span class=\"vocab-trigger\" data-vocab=\"dumb\">dumb<\/span> he doesn’t know he’s alive.’",
              "zh": "我们沿着路往前，等到了她看不见的地方。当时离独立日还有几天，一个瘦瘦的意大利小孩在铁轨旁排了一排鞭炮。‘这地方真糟糕，是吧？’汤姆对埃克堡医生交换了一个皱眉。‘糟透了。’‘让她离开这儿有好处。’‘她丈夫不反对吗？’‘威尔逊？他以为她去看纽约的姐姐。他蠢得连自己活着都不知道。’",
              "simpEn": "We waited for her further down the road. It was a few days before the Fourth of July, and a skinny Italian kid was setting firecrackers along the tracks. ‘Terrible place, isn’t it,’ said Tom, frowning up at Doctor Eckleburg. ‘Awful.’ ‘Getting away does her good.’ ‘Doesn’t her husband mind?’ ‘Wilson? He thinks she visits her sister in New York. He’s too dumb to know he’s alive.’",
              "simpZh": "我们在前边的路上等她，离了视线。那几天快到七月四号了，一个瘦瘦的意大利小孩在铁轨边排了一溜鞭炮。‘这地方真烂，是吧？’汤姆朝着埃克堡医生的方向皱皱眉。‘巨烂。’‘让她离开这儿有好处。’‘她老公不反对？’‘威尔逊？他以为她去纽约看姐姐。他蠢到不知道自己活着。’"
            },
            {
              "en": "So Tom Buchanan and his girl and I went up together to New York—or not quite together, for Mrs. Wilson sat <span class=\"vocab-trigger\" data-vocab=\"discreetly\">discreetly<\/span> in another car. Tom <span class=\"vocab-trigger\" data-vocab=\"deferred\">deferred<\/span> that much to the <span class=\"vocab-trigger\" data-vocab=\"sensibilities\">sensibilities<\/span> of those East Eggers who might be on the train.",
              "zh": "于是汤姆·布坎南、他的女人和我一起去了纽约——或者说并没有完全在一起，因为威尔逊太太谨慎地坐在另一节车厢里。汤姆这样做算是尊重了车上可能出现的东卵人的敏感。",
              "simpEn": "So Tom, his girl, and I all went to New York—but not exactly together, because Mrs. Wilson sat separately in another car, so as not to disturb any East Egg people who might be on the train.",
              "simpZh": "就这样汤姆、他的女人和我一起去了纽约——不过并没有真正在一起，因为威尔逊太太小心地坐在另一节车厢里，为的是不惊动车上的东卵人。"
            },
            {
              "en": "She had changed her dress to a brown figured <span class=\"vocab-trigger\" data-vocab=\"muslin\">muslin<\/span> which stretched tight over her rather wide hips as Tom helped her to the platform in New York. At the news-stand she bought a copy of ‘Town Tattle’ and a moving-picture magazine and, in the station drug store, some cold cream and a small <span class=\"vocab-trigger\" data-vocab=\"flask\">flask<\/span> of perfume. Upstairs, in the <span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"solemn\">solemn<\/span> echoing drive\"><span class=\"vocab-trigger\" data-vocab=\"solemn\">solemn<\/span> echoing drive<\/span>\"><span class=\"vocab-trigger\" data-vocab=\"<span class=\"vocab-trigger\" data-vocab=\"solemn\">solemn<\/span> echoing drive\"><span class=\"vocab-trigger\" data-vocab=\"solemn\">solemn<\/span> echoing drive<\/span><\/span> she let four taxi cabs drive away before she selected a new one, lavender-colored with grey <span class=\"vocab-trigger\" data-vocab=\"upholstery\">upholstery<\/span>, and in this we slid out from the mass of the station into the glowing sunshine.",
              "zh": "她换了件棕色的印花棉布裙，在汤姆扶她上纽约站台时，裙子紧紧地绷在她相当宽的臀部上。在报摊，她买了一本《Town Tattle》和一本电影杂志，还在车站药房买了冷霜和一小瓶香水。到了楼上，在肃穆的、回音缭绕的车道上，她一连放走了四辆出租车，最后才选了一辆丁香色的、灰色内饰的新车，我们坐着它从车站的人海中滑出，驶入灿烂的阳光中。",
              "simpEn": "She had changed into a brown patterned cotton dress that stretched tight over her wide hips as Tom helped her onto the platform. She bought a gossip magazine, a movie magazine, cold cream, and a small perfume bottle. Upstairs she let four cabs go before picking a lavender one with grey seats, and we slid out of the station into bright sunshine.",
              "simpZh": "她换了件棕色印花棉布裙，汤姆扶她上站台时，裙子把她宽宽的屁股绷得紧紧的。她买了一份八卦杂志和一本电影杂志，还有冷霜和一小瓶香水。到了楼上，她放走了四辆出租车才选了一辆淡紫色的，灰色座椅，我们坐着它从车站人群里滑出来，开进了亮晃晃的阳光里。"

            {
              "en": "But immediately she turned sharply from the window and leaning forward tapped on the front glass. ‘I want to get one of those dogs,’ she said <span class=\"vocab-trigger\" data-vocab=\"earnestly\">earnestly<\/span>. ‘I want to get one for the apartment. They’re nice to have—a dog.’ We backed up to a grey old man who bore an absurd <span class=\"vocab-trigger\" data-vocab=\"resemblance\">resemblance<\/span> to John D. Rockefeller. In a basket, swung from his neck, <span class=\"vocab-trigger\" data-vocab=\"cowered\">cowered<\/span> a dozen very recent <span class=\"vocab-trigger\" data-vocab=\"puppies\">puppies<\/span> of an <span class=\"vocab-trigger\" data-vocab=\"indeterminate\">indeterminate<\/span> breed.",
              "zh": "但她突然从窗边转过身来，前倾着敲了敲前窗玻璃。‘我想买一只那种狗，’她认真地说，‘我想为公寓弄一只。有只狗挺好的。’我们倒车至一个灰色老人旁边，他长得可笑地像约翰·D·洛克菲勒。脖子上挂着一个篮子，里面蜷着十来只刚出生不久、品种不明的小狗。",
              "simpEn": "Then she suddenly turned from the window and tapped on the glass. ‘I want one of those dogs,’ she said seriously. ‘I want one for the apartment. A dog is nice to have.’ We stopped beside a grey old man who looked ridiculously like John D. Rockefeller. From a basket hanging around his neck, a dozen tiny newborn puppies of mixed breed cowered.",
              "simpZh": "可她突然从窗边转过来，敲了敲前车窗。‘我想买一只那种狗，’她认真地说，‘想在公寓养一只。有狗挺好的。’我们倒车到一个灰色老头旁边，他长得可笑地像洛克菲勒。脖子挂着个篮子，里面缩着十来只刚生下不久、不知什么品种的小狗。"

            {
              "en": "‘What kind are they?’ asked Mrs. Wilson eagerly as he came to the taxi-window. ‘All kinds. What kind do you want, lady?’ ‘I’d like to get one of those police dogs; I don’t suppose you got that kind?’ The man peered doubtfully into the basket, plunged in his hand and drew one up, <span class=\"vocab-trigger\" data-vocab=\"wriggling\">wriggling<\/span>, by the back of the neck. ‘That’s no police dog,’ said Tom. ‘No, it’s not exactly a polICE dog,’ said the man with disappointment in his voice. ‘It’s more of an airedale.’ He passed his hand over the brown wash-rag of a back. ‘Look at that coat. Some coat. That’s a dog that’ll never bother you with catching cold.’",
              "zh": "‘它们是什么品种？’老人来到车窗前时，威尔逊太太热切地问。‘什么品种都有。您想要什么样的，女士？’‘我想要一只那种警犬；估计你们没有吧？’那人怀疑地朝篮子里看了看，伸手进去抓出一只，捏着后颈把它提起来，那狗扭动着。‘那不是警犬，’汤姆说。‘对，确切地说不是警——犬，’那人失望地说，‘更像是只艾尔谷犬。’他伸手抚过那条像褐色抹布似的脊背。‘看这皮毛，好皮毛。这狗永远不会让你操心得感冒。’",
              "simpEn": "‘What kind are they?’ Myrtle asked excitedly. ‘All kinds. What kind do you want?’ ‘I’d like a police dog, but I suppose you don’t have that.’ The man looked in the basket, grabbed one and pulled it up by the neck. ‘That’s no police dog,’ Tom said. ‘No, not exactly a police dog,’ the man said, disappointed. ‘It’s more of an Airedale.’ He stroked its rough back. ‘Look at that coat. A dog that will never catch cold.’",
              "simpZh": "‘它们什么品种？’梅特尔急切地问。‘啥品种都有。您想要什么，女士？’‘我想要只那种警犬；估计你们没吧？’那老头往篮子里瞧了瞧，伸手抓出一只，提着脖子拎起来，那狗扭来扭去。‘这不是警犬，’汤姆说。‘对，不完全是警犬，’那人失望地说，‘更像个艾尔谷犬。’他摸了摸那像旧抹布似的背。‘看这皮毛，好皮毛。这狗绝对不会感冒。’"

            {
              "en": "‘I think it’s cute,’ said Mrs. Wilson enthusiastically. ‘How much is it?’ ‘That dog?’ He looked at it <span class=\"vocab-trigger\" data-vocab=\"admiringly\">admiringly<\/span>. ‘That dog will cost you ten dollars.’ The airedale—undoubtedly there was an airedale concerned in it somewhere though its feet were startlingly white—changed hands and settled down into Mrs. Wilson’s lap, where she <span class=\"vocab-trigger\" data-vocab=\"fondled\">fondled<\/span> the <span class=\"vocab-trigger\" data-vocab=\"weather-proof\">weather-proof<\/span> coat with <span class=\"vocab-trigger\" data-vocab=\"rapture\">rapture<\/span>.",
              "zh": "‘我觉得它很可爱，’威尔逊太太热情地说，‘多少钱？’‘这只狗？’他赞赏地看着它，‘这只狗卖你十美元。’那只艾尔谷犬——无疑里头肯定有艾尔谷的血统，尽管它的脚爪白得惊人——易了主人，在威尔逊太太的膝上安顿下来，她欣喜若狂地抚摸着那防水的皮毛。",
              "simpEn": "‘I think it’s cute,’ Myrtle said enthusiastically. ‘How much?’ ‘That dog?’ He looked at it proudly. ‘That dog will cost you ten dollars.’ The Airedale—there was definitely some Airedale in it, even with its weird white feet—was handed over and settled in Myrtle’s lap, where she joyfully petted its rough coat.",
              "simpZh": "‘我觉得挺可爱的，’梅特尔热情地说，‘多少钱？’‘这只狗？’他欣赏地看着它，‘这只狗十块钱。’那艾尔谷犬——肯定有艾尔谷种，虽然它的白爪子挺扎眼——被递了过来，窝在梅特尔腿上，她欣喜若狂地抚摸着它那厚实的毛。"
