        {
          "sectionId": 8,
          "heading": "Final Encounters: Jordan and Tom",
          "paragraphs": [
            {
              "en": "There was one thing to be done before I left, an awkward, unpleasant thing that perhaps had better have been let alone. But I wanted to leave things in order and not just trust that <span class=\"vocab-trigger\" data-vocab=\"obliging and indifferent sea\">obliging and indifferent sea<\/span> to sweep my <span class=\"vocab-trigger\" data-vocab=\"refuse\">refuse<\/span> away. I saw Jordan Baker and talked over and around what had happened to us together and what had happened afterward to me, and she lay perfectly still listening in a big chair. She was dressed to play golf and I remember thinking she looked like a good illustration, her chin raised a little, <span class=\"vocab-trigger\" data-vocab=\"jauntily\">jauntily<\/span>, her hair the color of an autumn leaf, her face the same brown tint as the fingerless glove on her knee. When I had finished she told me without comment that she was engaged to another man. I doubted that though there were several she could have married at a nod of her head but I pretended to be surprised. For just a minute I wondered if I wasn’t making a mistake, then I thought it all over again quickly and got up to say goodbye.",
              "zh": "我离开之前还有一件事得办，一件尴尬、不愉快的事，也许本来最好置之不理。可是我想把事情理清，而不是一味依赖那乐于助人却漠然无情的海水，让它把我那些垃圾冲走。我见到了乔丹·贝克，跟她谈了我们之间发生的事，以及后来发生在我身上的事，她躺在一张大椅子里，一动不动地听着。她穿了一身打高尔夫球的衣服，我记得我当时想，她看起来真像一幅精美的插图，下巴微微扬起，显出一副潇洒的样子，头发颜色像秋天的叶子，脸上的肤色和她膝上那副没有指套的手套一样是褐色的。等我说完，她告诉我，没有任何评论，她已经跟另一个男人订婚了。我对此表示怀疑，因为有好几个人她只要点一下头就可以嫁给他们的，但我假装很惊讶。有那么片刻，我在想自己是不是犯了个错，然后我又飞快地把整件事想了一遍，站起来告别。",
              "simpEn": "There was one thing to do before I left, an awkward, unpleasant thing that maybe I should have left alone. But I wanted to leave things tidy, not just rely on the helpful but uncaring sea to wash my mess away. I saw Jordan Baker and talked about what had happened between us and what had happened to me afterward. She lay completely still in a big chair, listening. She was dressed for golf, and I remember thinking she looked like a perfect illustration, her chin lifted a bit in a confident way, her hair the color of an autumn leaf, her face the same brown shade as the fingerless glove on her knee. When I finished, she told me without emotion that she was engaged to another man. I doubted it, though there were several men she could have married just by nodding, but I pretended to be surprised. For just a minute I wondered if I was making a mistake, then I quickly thought it all over again and got up to say goodbye.",
              "simpZh": "走前还有一件事要办，一件尴尬、不愉快的事，也许本来不该管。可我想把事情整理好，不光是靠那好心又冷漠的海水冲走我的垃圾。我见了乔丹·贝克，谈了我们的过去和后来我发生的事。她一动不动地靠在大椅子里听着。她穿着高尔夫球衣，我记得当时想她看起来像幅好插画，下巴微扬，很潇洒，头发是秋叶的颜色，脸和她膝盖上无指手套一样的棕色。我说完后，她没表情地告诉我她跟别人订婚了。我怀疑，因为有几个人她一点头就能嫁，但我假装惊讶。就一分钟我想自己是不是错了，接着又快速想了想，站起来告别。"
            },
            {
              "en": "‘Nevertheless you did throw me over,’ said Jordan suddenly. ‘You threw me over on the telephone. I don’t give a damn about you now but it was a new experience for me and I felt a little dizzy for a while.’ We shook hands. ‘Oh, and do you remember—’ she added, ‘——a conversation we had once about driving a car?’ ‘Why—not exactly.’ ‘You said a bad driver was only safe until she met another bad driver? Well, I met another bad driver, didn’t I? I mean it was careless of me to make such a wrong guess. I thought you were rather an honest, straightforward person. I thought it was your secret pride.’ ‘I’m thirty,’ I said. ‘I’m five years too old to lie to myself and call it honor.’ She didn’t answer. Angry, and half in love with her, and <span class=\"vocab-trigger\" data-vocab=\"tremendously\">tremendously<\/span> sorry, I turned away.",
              "zh": "“可是你还是把我甩了，”乔丹突然说。“你在电话上甩了我。我现在对你一点也不在乎了，不过这对我来说是种新鲜的经历，我当时头昏了一阵子。”我们握了握手。“哦，你还记不记得——”她又说，“——我们有一次关于开车的谈话？”“怎么——记不太清了。”“你说一个糟糕的司机只有遇到另一个糟糕的司机时才不安全？嗯，我遇到了另一个糟糕的司机，对不对？我意思是，我太粗心了，竟然猜得这么错。我以为你是个相当诚实、直来直去的人。我以为那是你暗自引以为傲的事。”“我三十岁了，”我说。“我太老了，不能再自己骗自己，把它叫做荣誉了。”她没有回答。我既生气，又对她半怀爱意，同时又极其难过，转身走了。",
              "simpEn": "‘Nevertheless, you did dump me,’ said Jordan suddenly. ‘You dumped me over the telephone. I don't care about you at all now, but it was a new experience for me, and I felt a little dizzy for a while.’ We shook hands. ‘Oh, and do you remember—’ she added, ‘—a conversation we once had about driving a car?’ ‘Why, not exactly.’ ‘You said a bad driver was only safe until she met another bad driver? Well, I met another bad driver, didn't I? I mean it was careless of me to guess so wrong. I thought you were an honest, straightforward person. I thought it was your secret pride.’ ‘I'm thirty,’ I said. ‘I'm five years too old to lie to myself and call it honor.’ She didn't answer. Angry, and half in love with her, and terribly sorry, I turned away.",
              "simpZh": "“可你还是甩了我，”乔丹突然说。“你在电话里甩了我。我现在根本不在乎你了，但这对我来说是新鲜经历，我晕了一阵子。”我们握了手。“哦，你还记不记得——”她补充，“——我们有次关于开车的谈话？”“怎么——不太记得。”“你说一个烂司机只有碰到另一个烂司机才不安全？嗯，我碰到了另一个烂司机，对不对？我是说，我太粗心了，猜得这么离谱。我以为你是个挺诚实、直爽的人。我以为那是你暗地里的骄傲。”“我三十岁了，”我说。“我已经过了五岁，不能再骗自己把它叫做荣誉。”她没回答。又气，又半爱着她，又极其抱歉，我转身走了。"
            },
            {
              "en": "One afternoon late in October I saw Tom Buchanan. He was walking ahead of me along Fifth Avenue in his alert, aggressive way, his hands out a little from his body as if to fight off interference, his head moving sharply here and there, adapting itself to his restless eyes. Just as I slowed up to avoid overtaking him he stopped and began frowning into the windows of a jewelry store. Suddenly he saw me and walked back holding out his hand. ‘What’s the matter, Nick? Do you object to shaking hands with me?’ ‘Yes. You know what I think of you.’ ‘You’re crazy, Nick,’ he said quickly. ‘Crazy as hell. I don’t know what’s the matter with you.’ ‘Tom,’ I inquired, ‘what did you say to Wilson that afternoon?’",
              "zh": "十月下旬的一个下午，我看见了汤姆·布坎南。他走在我前面，沿着第五大道，步伐警觉而咄咄逼人，两手微微离开身体，仿佛要挡开干扰，头忽左忽右地转动，适应着那双不安分的眼睛。正当我放慢脚步，不想追上他的时候，他停了下来，开始对着珠宝店的玻璃橱窗皱眉头。突然他看见了我，便往回走几步，伸出他的手。“怎么了，尼克？你难道不愿意跟我握手吗？”“是的。你知道我对你怎么看。”“你疯了，尼克，”他连忙说。“疯得厉害。我真不知道你有什么毛病。”“汤姆，”我问道，“那天下午你跟威尔逊说了什么？”",
              "simpEn": "One afternoon in late October I saw Tom Buchanan. He was walking ahead of me on Fifth Avenue in his alert, pushy way, his hands slightly out from his body as if to fight off anything in his way, his head moving sharply here and there, matching his restless eyes. Just as I slowed down to avoid catching up with him, he stopped and started frowning into a jewelry store window. Suddenly he saw me and walked back, holding out his hand. 'What's the matter, Nick? Do you object to shaking hands with me?' 'Yes. You know what I think of you.' 'You're crazy, Nick,' he said quickly. 'Crazy as hell. I don't know what's wrong with you.' 'Tom,' I asked, 'what did you say to Wilson that afternoon?'",
              "simpZh": "十月下旬一个下午，我看见汤姆·布坎南。他走在我前面第五大道上，步子警觉、咄咄逼人，两手略离身体，像要挡开干扰，头左右转，配着那双不安分的眼睛。我放慢不想追上他时，他停下来对着珠宝店橱窗皱眉头。突然他看见我，往回走伸出手。“怎么了，尼克？你不愿意和我握手吗？”“对。你知道我怎么看你。”“你疯了，尼克，”他忙说。“疯透了。我不知道你有什么毛病。”“汤姆，”我问，“那天下午你跟威尔逊说了什么？”"
            },
            {
              "en": "He stared at me without a word and I knew I had guessed right about those missing hours. I started to turn away but he took a step after me and grabbed my arm. ‘I told him the truth,’ he said. ‘He came to the door while we were getting ready to leave and when I sent down word that we weren’t in he tried to force his way upstairs. He was crazy enough to kill me if I hadn’t told him who owned the car. His hand was on a revolver in his pocket every minute he was in the house——’ He broke off defiantly. ‘What if I did tell him? That fellow had it coming to him. He threw dust into your eyes just like he did in Daisy’s but he was a tough one. He ran over Myrtle like you’d run over a dog and never even stopped his car.’",
              "zh": "他盯着我，一句话不说，我知道关于那失去的几个小时我猜对了。我转身要走，他跟了一步抓住我的胳膊。“我跟他说了实话，”他说。“我们正准备离开的时候，他闯到了门口，我让人传话说我们不在，他就要强行上楼。他疯得厉害，要是我不告诉他谁的车，他准会杀了我。他在屋子里的时候，手在口袋里一直握着左轮手枪——”他挑战般地打住了。“就算我告诉了他又怎样？那家伙是活该。他往你眼里撒灰，就像他当初对黛西一样，可他是条硬汉子。他碾过默特尔，就像你碾过一条狗，连车都没停。”",
              "simpEn": "He stared at me without a word, and I knew I had guessed right about those missing hours. I started to turn away, but he stepped after me and grabbed my arm. 'I told him the truth,' he said. 'He came to the door while we were getting ready to leave, and when I sent word that we weren't in, he tried to force his way upstairs. He was crazy enough to kill me if I hadn't told him who owned the car. His hand was on a revolver in his pocket the whole time he was in the house—' He broke off defiantly. 'What if I did tell him? That fellow had it coming. He threw dust in your eyes just like he did in Daisy's, but he was a tough one. He ran over Myrtle like you'd run over a dog and never even stopped his car.'",
              "simpZh": "他盯着我不说话，我知道我猜对了那几小时的事。我转身要走，他跟上来抓住我胳膊。“我跟他说了实话，”他说。“我们准备走时他来到门口，我传话说我们不在，他就要硬闯上楼。他疯得厉害，要是不告诉他车是谁的，他准杀了我。他在屋里时手一直在口袋里握着枪——”他挑战式地停住。“就算我说了又怎样？那家伙活该。他往你眼里撒灰，就像对黛西那样，可他是个狠角色。他撞了默特尔，就像撞条狗，连车都没停。”"

    "simple": "whispered temptations"
  },
  "transitory enchanted moment": {
    "zh": "短暂而迷人的瞬间",
    "explain": "A brief, magical period of time.",
    "simple": "short magical moment"
  },
  "compelled": {
    "zh": "被迫；不由自主地",
    "explain": "Forced or driven to do something.",
    "simple": "forced"
  },
  "aesthetic contemplation": {
    "zh": "审美的沉思",
    "explain": "Deep thought about beauty.",
    "simple": "thinking deeply about beauty"
  },
  "commensurate": {
    "zh": "相称的；相当的",
    "explain": "In proportion; equal in size or extent.",
    "simple": "equal to"
  },
  "obscurity": {
    "zh": "朦胧；隐没",
    "explain": "The state of being unknown or dim.",
    "simple": "darkness, unknown"
  },
  "orgastic future": {
    "zh": "极乐的未来",
    "explain": "A future of intense joy and fulfillment.",
    "simple": "intensely joyful future"
  },
  "borne back ceaselessly": {
    "zh": "不停地被推回",
    "explain": "Carried back without stopping.",
    "simple": "carried back endlessly"
  }
};
  (function() {
    const errorBox = document.getElementById("error-message");
    function showError(msg) {
      errorBox.textContent = "❌ " + msg;
      errorBox.style.display = "block";
    }
    const dataEl = document.getElementById("bookDataScript");
    if (!dataEl) { showError("bookDataScript element not found"); return; }
    let bookData;
    try {
      bookData = JSON.parse(dataEl.textContent);
    } catch (e) {
      showError("JSON parse error: " + e.message);
      return;
    }
    if (!bookData.chapters || !Array.isArray(bookData.chapters)) {
      showError("bookData.chapters missing or not an array");
      return;
    }

    let currentChapterIndex = null;
    let currentChapter = null;
    let currentSection = 0;
    let currentQuiz = [];
    let isSimplified = false;
    let readingMode = 'sections';
    let currentVocabTrigger = null;

    const READING_MODE_KEY = bookData.title + "_readingMode";
    const PROGRESS_KEY = bookData.title + "_progress";

    const placeholderQuiz = [{ text: "This section has no quiz yet.", answer: true }];

    function detectReadingMode(ch) {
      const stored = localStorage.getItem(READING_MODE_KEY);
      if (stored && ['sections','full','pages'].includes(stored)) readingMode = stored;
      else if (ch.sections && ch.sections.length > 0) readingMode = 'sections';
      else readingMode = 'full';
    }

    const readingModeSelect = document.getElementById('readingModeSelect');
    readingModeSelect.addEventListener('change', () => {
      readingMode = readingModeSelect.value;
      localStorage.setItem(READING_MODE_KEY, readingMode);
      if (currentChapter) renderWithMode();
    });

    function populateChapterSelector() {
      const select = document.getElementById("chapterSelect");
      select.innerHTML = "";
      bookData.chapters.forEach((ch, idx) => {
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = "Ch. " + ch.id + ": " + ch.title;
        select.appendChild(opt);
      });
      select.addEventListener("change", (e) => loadChapter(parseInt(e.target.value)));
    }

    function loadChapter(index) {
      currentChapterIndex = index;
      currentChapter = bookData.chapters[index];
      currentSection = 0;
      document.querySelector(".title").textContent = "📖 " + bookData.title + " – Ch. " + currentChapter.id;
      detectReadingMode(currentChapter);
      readingModeSelect.value = readingMode;
      renderWithMode();
      saveFullProgress();
    }

    function renderWithMode() {
      const ch = currentChapter;
      if (!ch) return;
      if (readingMode === 'sections' && ch.sections && ch.sections.length > 0) {
        renderSectionsMode();
      } else if (readingMode === 'pages') {
        renderPagesMode();
      } else {
        renderFullMode();
      }
    }

    function renderFullMode() {
      document.getElementById('sectionTabs').innerHTML = '';
      document.getElementById('sectionProgress').textContent = '';
      const paragraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      renderParagraphs(paragraphs);
      const quiz = currentChapter.quiz || [];
      renderQuiz(quiz);
    }

    function renderPagesMode() {
      document.getElementById('sectionTabs').innerHTML = '';
      const paragraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      const pageSize = 6;
      const totalPages = Math.ceil(paragraphs.length / pageSize);
      document.getElementById('sectionProgress').textContent = '📄 Page 1 of ' + totalPages + ' (auto-split)';
      const enDiv = document.getElementById('enContent');
      const zhDiv = document.getElementById('zhContent');
      enDiv.innerHTML = ''; zhDiv.innerHTML = '';
      paragraphs.forEach((p, i) => {
        if (i > 0 && i % pageSize === 0) {
          const pageBreakEn = document.createElement('div');
          pageBreakEn.className = 'page-break';
          pageBreakEn.textContent = '📄 Page ' + (Math.floor(i/pageSize)+1);
          enDiv.appendChild(pageBreakEn);
          const pageBreakZh = document.createElement('div');
          pageBreakZh.className = 'page-break';
          pageBreakZh.textContent = '📄 Page ' + (Math.floor(i/pageSize)+1);
          zhDiv.appendChild(pageBreakZh);
        }
        const enP = document.createElement('p');
        enP.innerHTML = isSimplified ? (p.simpEn || '').replace(/<[^>]*>/g, '') : p.en;
        enDiv.appendChild(enP);
        const zhP = document.createElement('p');
        zhP.textContent = isSimplified ? p.simpZh : p.zh;
        zhDiv.appendChild(zhP);
      });
      const quiz = currentChapter.quiz || [];
      renderQuiz(quiz);
    }

    function renderSectionsMode() {
      const sections = currentChapter.sections;
      if (!sections || sections.length === 0) {
        renderFullMode();
        return;
      }
      const tabContainer = document.getElementById('sectionTabs');
      tabContainer.innerHTML = '';
      sections.forEach((sec, idx) => {
        const tab = document.createElement('button');
        tab.className = 'section-tab';
        if (idx === currentSection) tab.classList.add('active');
        tab.textContent = (idx+1) + '. ' + sec.heading;
        tab.setAttribute('role', 'tab');
        tab.setAttribute('aria-selected', idx === currentSection ? 'true' : 'false');
        tab.setAttribute('tabindex', idx === currentSection ? '0' : '-1');
        tab.addEventListener('click', () => {
          currentSection = idx;
          renderSectionsMode();
          saveFullProgress();
        });
        tabContainer.appendChild(tab);
      });
      const tabs = Array.from(tabContainer.querySelectorAll('.section-tab'));
      tabContainer.addEventListener('keydown', (e) => {
        const idx = tabs.indexOf(document.activeElement);
        if (idx === -1) return;
        if (e.key === 'ArrowRight' && idx < tabs.length-1) {
          e.preventDefault();
          tabs[idx+1].focus();
          tabs[idx+1].click();
        } else if (e.key === 'ArrowLeft' && idx > 0) {
          e.preventDefault();
          tabs[idx-1].focus();
          tabs[idx-1].click();
        }
      });

      document.getElementById('sectionProgress').textContent = 'Section ' + (currentSection+1) + ' of ' + sections.length;

      const sec = sections[currentSection];
      renderParagraphs(sec.paragraphs);
      renderQuiz(sec.quiz || []);
    }

    function renderParagraphs(paragraphs) {
      const enDiv = document.getElementById('enContent');
      const zhDiv = document.getElementById('zhContent');
      enDiv.innerHTML = '';
      zhDiv.innerHTML = '';
      paragraphs.forEach(p => {
        const enP = document.createElement('p');
        enP.innerHTML = isSimplified ? (p.simpEn || '').replace(/<[^>]*>/g, '') : p.en;
        enDiv.appendChild(enP);
        const zhP = document.createElement('p');
        zhP.textContent = isSimplified ? p.simpZh : p.zh;
        zhDiv.appendChild(zhP);
      });
    }

    function renderQuiz(quizArr) {
      const tfContainer = document.getElementById('tfQuestions');
      tfContainer.innerHTML = '';
      const quizToUse = (quizArr && quizArr.length) ? quizArr : placeholderQuiz;
      quizToUse.forEach((q,i) => {
        const div = document.createElement('div'); div.style.margin='0.5rem 0';
        div.innerHTML = (i+1) + ". " + q.text + " <select class='tf-sel'><option value=''>选</option><option value='true'>True</option><option value='false'>False</option></select>";
        tfContainer.appendChild(div);
      });
      document.getElementById('tfFeedback').textContent = '';
    }

    document.getElementById('simplifyToggle').addEventListener('click', () => {
      isSimplified = !isSimplified;
      document.getElementById('simpActiveLabel').classList.toggle('active', isSimplified);
      if (currentChapter) renderWithMode();
      document.getElementById('simplifyToggle').textContent = isSimplified ? '📖 切换回原文' : '📖 切换简化版';
      hidePopup();
    });

    const popup = document.getElementById('vocabPopup');
    function showPopup(trigger, vocabKey) {
      const def = vocabDefinitions[vocabKey];
      if (!def) return;
      document.getElementById('popupZh').textContent = def.zh;
      document.getElementById('popupExplain').textContent = '📘 ' + def.explain;
      document.getElementById('popupSimple').textContent = '💬 Simple: ' + def.simple;
      const rect = trigger.getBoundingClientRect();
      let top = rect.bottom + 8, left = rect.left;
      if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
      if (top + 180 > window.innerHeight) top = rect.top - 180;
      popup.style.top = top + 'px'; popup.style.left = left + 'px';
      popup.classList.add('show'); currentVocabTrigger = trigger;
    }
    function hidePopup() { popup.classList.remove('show'); currentVocabTrigger = null; }
    document.addEventListener('click', function(e) {
      const trig = e.target.closest('.vocab-trigger');
      if (trig && trig !== currentVocabTrigger) {
        e.stopPropagation();
        showPopup(trig, trig.getAttribute('data-vocab'));
      } else if (trig === currentVocabTrigger) hidePopup();
      else if (!e.target.closest('#vocabPopup')) hidePopup();
    });
    document.getElementById('closePopup').addEventListener('click', (e) => { e.stopPropagation(); hidePopup(); });
    window.addEventListener('scroll', () => { if (currentVocabTrigger) hidePopup(); });

    document.getElementById('speakBtn').addEventListener('click', () => {
      if (!window.speechSynthesis) return alert('浏览器不支持朗读。');
      speechSynthesis.cancel();
      const paragraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      const text = paragraphs.map(p => p.en.replace(/<[^>]*>/g, '')).join(' ');
      const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9;
      speechSynthesis.speak(u);
    });

    document.getElementById('checkTfBtn').addEventListener('click', () => {
      const quizArr = currentChapter.sections && readingMode==='sections' ? (currentChapter.sections[currentSection]?.quiz || []) : (currentChapter.quiz || []);
      const quizToUse = quizArr.length ? quizArr : placeholderQuiz;
      let correct = 0;
      document.querySelectorAll('.tf-sel').forEach((sel, i) => {
        const val = sel.value;
        if ((val === 'true' && quizToUse[i].answer) || (val === 'false' && !quizToUse[i].answer)) {
          sel.style.border = '2px solid green';
          correct++;
        } else sel.style.border = '2px solid red';
      });
      document.getElementById('tfFeedback').textContent = '✅ 正确 ' + correct + ' / ' + quizToUse.length;
    });

    function saveFullProgress() {
      const state = {
        chapterIndex: currentChapterIndex,
        sectionIndex: (readingMode === 'sections' && currentChapter.sections) ? currentSection : 0,
        readingMode: readingMode
      };
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(state));
      updateProgressIndicator();
    }

    function updateProgressIndicator() {
      const saved = localStorage.getItem(PROGRESS_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          const ch = bookData.chapters[state.chapterIndex];
          if (ch) {
            let info = '📌 上次读到: Ch. ' + ch.id;
            if (ch.sections && state.sectionIndex) info += ' · ' + ch.sections[state.sectionIndex].heading;
            info += ' | ' + (state.chapterIndex+1) + '/' + bookData.chapters.length + ' 章';
            document.getElementById('progressBox').textContent = info;
          }
        } catch(e) {}
      }
    }

    function restoreProgress() {
      const saved = localStorage.getItem(PROGRESS_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          const chIndex = state.chapterIndex;
          if (chIndex >= 0 && chIndex < bookData.chapters.length) {
            document.getElementById('chapterSelect').value = chIndex;
            readingMode = state.readingMode || 'sections';
            readingModeSelect.value = readingMode;
            loadChapter(chIndex);
            if (readingMode === 'sections' && bookData.chapters[chIndex].sections) {
              currentSection = state.sectionIndex || 0;
              renderSectionsMode();
            }
            return;
          }
        } catch(e) {}
      }
      loadChapter(0);
    }

    populateChapterSelector();
    restoreProgress();
    updateProgressIndicator();
  })();
</script>
